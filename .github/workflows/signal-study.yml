name: Build signal study

# Backtests the SignalForge VERDICT (the live BUY/SELL engine) across the whole
# ticker universe on Polygon daily bars — same vendor the app trades off — and
# writes signal-study.json (pooled profitability, strategy-variant comparison, and
# trade segmentation). Self-contained like pattern-study.yml.
#
# Requires the repo secret POLYGON_API_KEY (the REST key). No fallback vendor by
# design: errors rather than overwriting a good study with an empty one. Paced for
# the free tier's 5 req/min (override with POLYGON_PACE_MS).
#
# Weekly cron + manual dispatch only — deliberately NOT on push, so a merge never
# bumps it out of the shared 'pages' concurrency group. Its slot (Sun 09:23) is
# clear of fundamentals (06:17) and pattern-study (07:23).

on:
  schedule:
    - cron: "23 9 * * 0"   # weekly, Sunday 09:23 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run offline unit tests
        run: node --test scripts/*.test.mjs

      - name: Build signal-study.json (Polygon daily)
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: node scripts/signal-study.mjs

      - name: Commit signal-study.json if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal-study.json
          if git diff --cached --quiet; then
            echo "signal-study.json unchanged — nothing to commit."
          else
            git commit -m "chore: refresh signal-study.json"
            # Land on main, rebasing onto any concurrent bot push (the sibling
            # data workflows can push between our checkout and this step).
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push race (attempt $i) — retrying"; sleep 3
            done
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (repo root, incl. fresh signal-study.json)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
