name: Build pattern study

# Measures the "Uptrend Convergence with Breakout" pattern's edge across the whole
# ticker universe using KEYLESS Stooq daily bars (no secret needed), writes
# pattern-study.json, commits it, and deploys Pages so the app can read it
# same-origin. Self-contained like fundamentals.yml.

on:
  schedule:
    - cron: "23 7 * * 0"   # weekly, Sunday 07:23 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/pattern-study.mjs"
      - "scripts/engine.mjs"
      - ".github/workflows/pattern-study.yml"

permissions:
  contents: write   # to commit pattern-study.json
  pages: write
  id-token: write

# Share the 'pages' group with the other deploy workflows so they never clash.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run offline unit tests
        run: node --test scripts/*.test.mjs

      - name: Build pattern-study.json (Stooq daily, keyless)
        run: node scripts/pattern-study.mjs

      - name: Commit pattern-study.json if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage first, THEN check the staged diff — `git diff --quiet` alone ignores
          # untracked files, so a never-before-committed file would never persist.
          git add pattern-study.json
          if git diff --cached --quiet; then
            echo "pattern-study.json unchanged — nothing to commit."
          else
            git commit -m "chore: refresh pattern-study.json"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (repo root, incl. fresh pattern-study.json)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
