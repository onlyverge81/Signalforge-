name: Shadow backtest study (research, on-demand)

# The IN-SAMPLE "team-minus-nuisance" read: run the engine's OWN backtest across the survivorship-free
# Polygon universe for the FULL team and for each team with a suspect vote removed (MACD / Pat / ADX),
# and compare aggregate trade quality. Points the flashlight; the OOS shadow-* ledger is the verdict.
# Manual dispatch only. Requires secret POLYGON_API_KEY.

on:
  workflow_dispatch:
    inputs:
      cap:
        description: "Max universe size (SBT_MAX) — each name runs 6 backtests, keep modest"
        required: false
        default: "60"
      commit:
        description: "Commit shadow-backtest-study.json to the branch this runs on (default: artifact only)"
        required: false
        default: "false"

permissions:
  contents: write   # only used when the `commit` input is true; harmless otherwise

jobs:
  study:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run offline unit tests
        run: node --test scripts/*.test.mjs
      - name: Run shadow backtest study
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          SBT_MAX: ${{ github.event.inputs.cap }}
        run: node scripts/shadow-backtest-study.mjs
      - name: Upload shadow-backtest-study.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shadow-backtest-study
          path: shadow-backtest-study.json
          if-no-files-found: warn
      - name: Commit shadow-backtest-study.json to this branch (opt-in)
        if: github.event.inputs.commit == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f shadow-backtest-study.json ] && git add shadow-backtest-study.json || true
          if git diff --cached --quiet; then
            echo "shadow-backtest-study.json unchanged — nothing to commit."
          else
            git commit -m "chore: refresh shadow-backtest-study.json (in-sample research snapshot)"
            for i in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}" && break
              echo "push race (attempt $i) — retrying"; sleep 3
            done
          fi
