name: Build SEC fundamentals

# Fetches SEC EDGAR primary filings SERVER-SIDE (no CORS, proper User-Agent),
# distills them into fundamentals.json, commits it, and deploys Pages — all in
# one self-contained job. Self-contained on purpose: a commit made with
# GITHUB_TOKEN does NOT trigger other workflows, so this job deploys the fresh
# data itself rather than relying on pages.yml to notice the commit.
#
# Requires Settings → Pages → Source = "GitHub Actions".

on:
  schedule:
    - cron: "17 6 * * *"   # daily, 06:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/fundamentals.yml"

permissions:
  contents: write   # to commit the refreshed fundamentals.json
  pages: write
  id-token: write

# Share the 'pages' group with pages.yml so the two never deploy at once.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run offline unit tests
        run: node --test scripts/*.test.mjs

      - name: Build fundamentals.json from SEC EDGAR
        env:
          SEC_USER_AGENT: "SignalForge fundamentals builder (${{ github.repository }})"
          # Polygon (price vendor by charter) ranks the active roster by dollar volume
          # to pick the top ~500 names; without it the build falls back to tickers.txt.
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: node scripts/build-fundamentals.mjs

      # Merit-evidence harness: reconstruct point-in-time merit from the SEC XBRL
      # history + Polygon adjusted monthly prices, and write study.json (the gate
      # Phase 2 reads). Best-effort — skips cleanly if POLYGON_API_KEY is unset.
      - name: Build study.json (merit evidence)
        env:
          SEC_USER_AGENT: "SignalForge study builder (${{ github.repository }})"
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: node scripts/build-study.mjs || echo "study build skipped (non-fatal)"

      - name: Commit refreshed data if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage first, THEN check the staged diff. `git diff --quiet` alone ignores
          # untracked files, so a never-before-committed fundamentals.json was always
          # seen as "no change" and never persisted — only living in the deploy
          # artifact, so any later pages.yml deploy dropped it (blank AUTOPSY).
          git add fundamentals.json
          [ -f study.json ] && git add study.json || true
          if git diff --cached --quiet; then
            echo "fundamentals.json / study.json unchanged — nothing to commit."
          else
            git commit -m "chore: refresh SEC fundamentals.json + study.json"
            # Land on main, rebasing onto any concurrent bot push (the sibling
            # data workflows can push between our checkout and this step).
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push race (attempt $i) — retrying"; sleep 3
            done
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (repo root, incl. fresh fundamentals.json)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
