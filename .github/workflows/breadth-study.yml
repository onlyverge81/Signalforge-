name: Breadth (show-of-hands) study (research, on-demand)

# The "Show of Hands" breadth-consensus harness: at each bar, count how many of the engine's instruments
# agree, and ask whether a SUM of agreeing instruments separates clear forward expectancy from noise — and
# whether VOLUME (RVOL) helps. THE REFRAME (the thesis): the ~13 votes are NOT 13 independent witnesses
# (they collapse to ~3 economic axes), so a naive headcount can be one correlated camp shouting. The study
# climbs a ladder of SETS — raw-13 / expanded-~23 (the HEADCOUNT) vs proven-subset / cross-camp agreement
# (the QUORUM OF INDEPENDENTS) — and reports forward-return curves, the quorum threshold, and the volume
# rule-in/out. Manual dispatch only — prints a rollup to the job log + uploads the JSON. IN-SAMPLE
# measurement, NOT a promotion and NOT wired into any gate. Requires secret POLYGON_API_KEY.

on:
  workflow_dispatch:
    inputs:
      cap:
        description: "Max universe size (BREADTH_MAX)"
        required: false
        default: "40"
      universe:
        description: "Universe screen: 'liquid' (default) or 'full' (survivorship-free bias cross-check)"
        required: false
        default: "liquid"
      commit:
        description: "Commit breadth-study.json to the branch this runs on (default: artifact only)"
        required: false
        default: "false"

permissions:
  contents: write   # only used when the `commit` input is true; harmless otherwise

jobs:
  study:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run offline unit tests
        run: node --test scripts/*.test.mjs
      - name: Run breadth study
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          BREADTH_MAX: ${{ github.event.inputs.cap }}
          BREADTH_UNIVERSE: ${{ github.event.inputs.universe == 'full' && 'full' || '' }}
          POLYGON_PACE_MS: "0"
        run: node scripts/breadth-study.mjs
      - name: Upload breadth-study.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: breadth-study
          path: breadth-study.json
          if-no-files-found: warn
      - name: Commit breadth-study.json to this branch (opt-in)
        if: github.event.inputs.commit == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage first, THEN check the staged diff — `git diff --quiet` ignores untracked files,
          # so a never-before-committed file would never persist otherwise.
          [ -f breadth-study.json ] && git add breadth-study.json || true
          if git diff --cached --quiet; then
            echo "breadth-study.json unchanged — nothing to commit."
          else
            git commit -m "chore: refresh breadth-study.json (research snapshot, display-only)"
            # Push to the SAME branch this workflow was dispatched on — NEVER main.
            for i in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}" && break
              echo "push race (attempt $i) — retrying"; sleep 3
            done
          fi
