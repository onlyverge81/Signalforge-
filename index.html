<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#080b14"/>
<title>SignalForge Lite — Live</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#080b14;color:#dce6f0;font-family:ui-monospace,Menlo,Consolas,monospace;-webkit-text-size-adjust:100%}
input,select,button{font-family:inherit;outline:none}
select option{background:#0d1120;color:#dce6f0}
a{color:#00bcd4;text-decoration:none}
.card{background:#0d1120;border:1px solid #1a2035;border-radius:6px;padding:16px;margin-bottom:14px}
.lbl{font-size:10px;color:#546e7a;letter-spacing:2px;margin-bottom:8px;display:block}
.inp{background:#080b14;border:1px solid #1a2035;color:#dce6f0;padding:10px 12px;border-radius:4px;font-size:13px;width:100%}
.btn{background:linear-gradient(135deg,#00e676,#00bcd4);border:none;color:#000;padding:13px 0;font-size:12px;font-weight:700;letter-spacing:3px;border-radius:4px;width:100%;cursor:pointer}
.pill{background:#080b14;border:1px solid #1a2035;color:#78909c;padding:6px 11px;border-radius:3px;font-size:10px;margin:0 4px 4px 0;cursor:pointer}
.pill.on{background:rgba(0,230,118,0.1);border-color:#00e676aa;color:#00e676}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#546e7a;padding:11px 14px;font-size:11px;letter-spacing:1px;cursor:pointer;white-space:nowrap}
.tab.on{border-bottom-color:#00e676;color:#00e676}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cell{background:#060810;padding:12px;border-radius:4px}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
var h = React.createElement;
var useState = React.useState;
var useRef = React.useRef;
var useEffect = React.useEffect;function sma(p,n){ if(p.length<n) return null; var s=0; for(var i=p.length-n;i<p.length;i++)s+=p[i]; return s/n; }
function ema(p,n){ if(p.length<n) return null; var k=2/(n+1),e=0,i; for(i=0;i<n;i++)e+=p[i]; e/=n; for(i=n;i<p.length;i++)e=p[i]*k+e*(1-k); return e; }
function rsi(p,n){ n=n||14; if(p.length<n+1)return null; var g=0,l=0; for(var i=p.length-n;i<p.length;i++){var d=p[i]-p[i-1]; if(d>0)g+=d; else l-=d;} var rs=(g/n)/((l/n)||0.0001); return Math.round((100-100/(1+rs))*10)/10; }
function macd(p){ var e12=ema(p,12),e26=ema(p,26); if(e12==null||e26==null)return null; return {macd:e12-e26}; }
function bb(p,n){ n=n||20; if(p.length<n)return null; var sl=p.slice(-n),mu=0,i; for(i=0;i<n;i++)mu+=sl[i]; mu/=n; var sd=0; for(i=0;i<n;i++)sd+=(sl[i]-mu)*(sl[i]-mu); sd=Math.sqrt(sd/n); return {upper:mu+2*sd,middle:mu,lower:mu-2*sd}; }
function stoch(data,n){ n=n||14; if(data.length<n)return null; var sl=data.slice(-n),lo=Infinity,hi=-Infinity; for(var i=0;i<sl.length;i++){if(sl[i].low<lo)lo=sl[i].low; if(sl[i].high>hi)hi=sl[i].high;} return Math.round((sl[sl.length-1].close-lo)/((hi-lo)||1)*1000)/10; }
function atr(data,n){ n=n||14; if(data.length<2)return 0; var sl=data.slice(-Math.min(n+1,data.length)),t=0,c=0; for(var i=0;i<sl.length;i++){ if(i===0){t+=sl[i].high-sl[i].low;} else {var a=sl[i].high-sl[i].low,b=Math.abs(sl[i].high-sl[i-1].close),d=Math.abs(sl[i].low-sl[i-1].close); t+=Math.max(a,b,d);} c++; } return t/c; }
function obvCalc(data){ if(data.length<16)return null; var obv=0,series=[0]; for(var i=1;i<data.length;i++){ if(data[i].close>data[i-1].close)obv+=data[i].volume; else if(data[i].close<data[i-1].close)obv-=data[i].volume; series.push(obv);} var r=0,pr=0,i2; for(i2=series.length-5;i2<series.length;i2++)r+=series[i2]; r/=5; for(i2=series.length-15;i2<series.length-5;i2++)pr+=series[i2]; pr/=10; return {obv:obv,rising:r>pr}; }
function vwapCalc(data){ if(!data.length)return null; var pv=0,vol=0,sl=data.slice(-20); for(var i=0;i<sl.length;i++){var tp=(sl[i].high+sl[i].low+sl[i].close)/3; pv+=tp*sl[i].volume; vol+=sl[i].volume;} return vol>0?pv/vol:null; }

function computeSignal(ctx){
  var votes=[];
  if(ctx.R!=null)votes.push({d:ctx.R<40?1:ctx.R>60?-1:0,w:2});
  if(ctx.M)votes.push({d:ctx.M.macd>0?1:-1,w:2.5});
  if(ctx.s5&&ctx.s10)votes.push({d:ctx.s5>ctx.s10?1:-1,w:1.5});
  if(ctx.s20&&ctx.s50)votes.push({d:ctx.s20>ctx.s50?1:-1,w:2});
  votes.push({d:ctx.trend==="UPTREND"?1:ctx.trend==="DOWNTREND"?-1:0,w:2});
  if(ctx.S!=null)votes.push({d:ctx.S<25?1:ctx.S>75?-1:0,w:1.5});
  if(ctx.B)votes.push({d:ctx.last.close<ctx.B.lower?1:ctx.last.close>ctx.B.upper?-1:0,w:1.5});
  if(ctx.OBV)votes.push({d:ctx.OBV.rising?1:-1,w:2});
  if(ctx.VWAP)votes.push({d:ctx.last.close>ctx.VWAP?1:-1,w:1.5});
  var bull=0,bear=0,weighted=0;
  for(var i=0;i<votes.length;i++){ if(votes[i].d>0){bull++;weighted+=votes[i].w;} else if(votes[i].d<0){bear++;weighted-=votes[i].w;} }
  var conflict=Math.min(bull,bear),penalty=conflict*0.8;
  var net=weighted>0?weighted-penalty:weighted+penalty;
  var signal="HOLD";
  if(net>=5&&bull>=3&&bull>bear)signal="BUY";
  else if(net<=-5&&bear>=3&&bear>bull)signal="SELL";
  var total=bull+bear,agree=total>0?Math.max(bull,bear)/total:0;
  var conf=Math.min(95,Math.max(35,Math.round(40+Math.abs(net)*3+agree*15)));
  return {signal:signal,score:Math.round(net*10)/10,bull:bull,bear:bear,confidence:conf};
}

function analyze(data){
  var closes=data.map(function(d){return d.close;});
  var last=data[data.length-1];
  var R=rsi(closes),M=macd(closes),B=bb(closes),S=stoch(data),A=atr(data);
  var s5=sma(closes,5),s10=sma(closes,10),s20=sma(closes,20),s50=sma(closes,Math.min(50,closes.length));
  var OBV=obvCalc(data),VWAP=vwapCalc(data);
  var chg=(last.close-closes[0])/closes[0]*100;
  var trend=chg>2?"UPTREND":chg<-2?"DOWNTREND":"SIDEWAYS";
  var strength=Math.abs(chg)>8?"STRONG":Math.abs(chg)>3?"MODERATE":"WEAK";
  var r=computeSignal({R:R,M:M,s5:s5,s10:s10,s20:s20,s50:s50,trend:trend,S:S,B:B,last:last,OBV:OBV,VWAP:VWAP});
  var e=last.close;
  var sl=r.signal==="BUY"?e-A*1.5:e+A*1.5;
  var tp=r.signal==="BUY"?e+A*2:e-A*2;
  return {
    signal:r.signal,confidence:r.confidence,score:r.score,trend:trend,strength:strength,
    bull:r.bull,bear:r.bear,
    entry:e,sl:sl,tp:tp,atr:A,
    rsi:R,stoch:S,macd:M?M.macd:null,bb:B,obv:OBV,vwap:VWAP,
    s5:s5,s10:s10,s20:s20,
    close:last.close,date:last.date
  };
}function fmt(v){ if(v==null||isNaN(v))return "\u2014"; var d=Math.abs(v)>=100?2:4; return "$"+Number(v).toFixed(d); }

function App(){
  var tk=useState("AAPL"),ticker=tk[0],setTicker=tk[1];
  var rs=useState("D"),resolution=rs[0],setResolution=rs[1];
  var ak=useState(localStorage.getItem("sf_finnhub_key")||""),apiKey=ak[0],setApiKey=ak[1];
  var ft=useState(false),fetching=ft[0],setFetching=ft[1];
  var er=useState(""),error=er[0],setError=er[1];
  var an=useState(null),analysis=an[0],setAnalysis=an[1];
  var rw=useState([]),rows=rw[0],setRows=rw[1];
  var mt=useState(null),meta=mt[0],setMeta=mt[1];
  var tb=useState("live"),tab=tb[0],setTab=tb[1];

  function doFetch(){
    var key=(apiKey||"").trim();
    if(!key){setError("Enter your free Finnhub API key first.");return;}
    var sym=(ticker||"").trim().toUpperCase();
    if(!sym){setError("Enter a ticker symbol.");return;}
    setFetching(true); setError("");
    try{localStorage.setItem("sf_finnhub_key",key);}catch(e){}
    var now=Math.floor(Date.now()/1000);
    var spans={"1":2,"5":7,"15":20,"30":40,"60":90,"D":730,"W":1825};
    var from=now-(spans[resolution]||730)*24*3600;
    var url="https://finnhub.io/api/v1/stock/candle?symbol="+encodeURIComponent(sym)+"&resolution="+resolution+"&from="+from+"&to="+now+"&token="+encodeURIComponent(key);
    fetch(url).then(function(res){
      if(!res.ok){
        if(res.status===401||res.status===403)throw new Error("Invalid API key, or this symbol needs a paid plan. Free tier: US stocks (AAPL), forex (OANDA:EUR_USD), crypto (BINANCE:BTCUSDT).");
        if(res.status===429)throw new Error("Rate limit hit (60/min free). Wait and retry.");
        throw new Error("Finnhub HTTP "+res.status);
      }
      return res.json();
    }).then(function(j){
      if(j.s==="no_data")throw new Error('No data for "'+sym+'". US stocks: AAPL, Crypto: BINANCE:BTCUSDT, Forex: OANDA:EUR_USD');
      if(j.s!=="ok"||!j.t||!j.t.length)throw new Error('No candles returned for "'+sym+'".');
      var candles=[];
      for(var i=0;i<j.t.length;i++){
        var c=j.c[i]; if(!c||c<=0)continue;
        candles.push({date:new Date(j.t[i]*1000).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"}),open:(j.o[i]||c),high:(j.h[i]||c),low:(j.l[i]||c),close:c,volume:(j.v&&j.v[i])||0});
      }
      if(candles.length<10)throw new Error("Only "+candles.length+" candles \u2014 try Daily/Weekly resolution.");
      setRows(candles);
      setAnalysis(analyze(candles));
      setMeta({sym:sym,when:new Date().toLocaleTimeString(),count:candles.length});
      setFetching(false);
      setTab("signals");
    }).catch(function(e){
      setError(e.message||"Live fetch failed.");
      setFetching(false);
    });
  }

  function tcol(t){ return t==="UPTREND"?"#00e676":t==="DOWNTREND"?"#ff5252":"#ffd740"; }
  function scol(s){ return s==="BUY"?"#00e676":s==="SELL"?"#ff5252":"#ffd740"; }

  var header=h("div",{style:{background:"#0b0e1c",borderBottom:"1px solid #1a2035",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}},
    h("div",{style:{display:"flex",alignItems:"baseline",gap:8}},
      h("span",{style:{fontSize:20,fontWeight:700,letterSpacing:2,color:"#00e676"}},"SIGNAL",h("span",{style:{color:"#00bcd4"}},"FORGE")),
      h("span",{style:{fontSize:9,color:"#37474f",letterSpacing:2}},"LITE \u00b7 LIVE")
    ),
    meta?h("span",{style:{fontSize:9,color:"#00e676"}},"\u25cf "+meta.sym+" \u00b7 "+meta.when):null
  );

  var tabs=h("div",{style:{display:"flex",borderBottom:"1px solid #1a2035",background:"#0b0e1c"}},
    [["live","\u26a1 LIVE"],["signals","\u25c8 SIGNALS"]].map(function(t){
      return h("button",{key:t[0],className:"tab"+(tab===t[0]?" on":""),onClick:function(){setTab(t[0]);}},t[1]);
    })
  );

  var liveTab=tab==="live"?h("div",null,
    h("div",{className:"card",style:{border:"1px solid rgba(0,230,118,0.25)"}},
      h("span",{className:"lbl"},"\u26a1 LIVE MARKET DATA \u2014 via Finnhub"),
      h("div",{style:{fontSize:11,color:"#90a4ae",lineHeight:1.8,marginBottom:14}},"Pulls real market data and runs the full signal analysis instantly. Free Finnhub key required (60 calls/min, no card)."),
      h("span",{className:"lbl"},"FINNHUB API KEY"),
      h("input",{className:"inp",type:"password",value:apiKey,onChange:function(e){setApiKey(e.target.value);},placeholder:"Paste your free Finnhub key\u2026"}),
      h("div",{style:{fontSize:10,color:"#546e7a",lineHeight:1.9,marginTop:8}},"No key? ",h("a",{href:"https://finnhub.io/register",target:"_blank"},"finnhub.io/register")," \u2192 sign up free \u2192 copy key. Saved on this device only.")
    ),
    h("div",{className:"grid2"},
      h("div",{className:"card"},
        h("span",{className:"lbl"},"TICKER"),
        h("input",{className:"inp",style:{fontSize:15},value:ticker,onChange:function(e){setTicker(e.target.value.toUpperCase());},placeholder:"AAPL"}),
        h("div",{style:{marginTop:8}},["AAPL","TSLA","NVDA","BINANCE:BTCUSDT","OANDA:EUR_USD"].map(function(s){
          return h("button",{key:s,className:"pill"+(ticker===s?" on":""),onClick:function(){setTicker(s);}},s.replace("BINANCE:","").replace("OANDA:",""));
        }))
      ),
      h("div",{className:"card"},
        h("span",{className:"lbl"},"RESOLUTION"),
        h("select",{className:"inp",value:resolution,onChange:function(e){setResolution(e.target.value);}},
          [["1","1 Min"],["5","5 Min"],["15","15 Min"],["30","30 Min"],["60","1 Hour"],["D","Daily"],["W","Weekly"]].map(function(o){return h("option",{key:o[0],value:o[0]},o[1]);})
        )
      )
    ),
    error?h("div",{style:{background:"rgba(255,82,82,0.08)",border:"1px solid rgba(255,82,82,0.3)",borderRadius:6,padding:12,color:"#ff8a80",fontSize:11,marginBottom:14,lineHeight:1.7}},"\u26a0 "+error):null,
    h("button",{className:"btn",style:{opacity:fetching?0.6:1},onClick:doFetch,disabled:fetching},fetching?"\u23f3 FETCHING\u2026":"\u2b07  FETCH LIVE DATA & ANALYZE"),
    meta?h("div",{style:{textAlign:"center",fontSize:10,color:"#00e676",marginTop:10}},"\u2713 "+meta.sym+" \u00b7 "+meta.count+" candles \u00b7 "+meta.when):null,
    h("div",{style:{fontSize:9,color:"#37474f",textAlign:"center",marginTop:8,lineHeight:1.6}},"US stocks: AAPL \u00b7 Crypto: BINANCE:BTCUSDT \u00b7 Forex: OANDA:EUR_USD")
  ):null;var sigTab=null;
  if(tab==="signals"){
    if(!analysis){
      sigTab=h("div",{style:{textAlign:"center",padding:"60px 0",color:"#1e2a3a"}},
        h("div",{style:{fontSize:50}},"\u25c7"),
        h("div",{style:{letterSpacing:3,fontSize:12,marginTop:14}},"NO ANALYSIS YET"),
        h("button",{className:"btn",style:{width:"auto",padding:"10px 30px",marginTop:20},onClick:function(){setTab("live");}},"\u2190 FETCH LIVE DATA")
      );
    } else {
      var a=analysis;
      sigTab=h("div",null,
        h("div",{className:"card",style:{background:"linear-gradient(135deg,#0e1320,#0b1025)"}},
          h("div",{style:{fontSize:10,color:"#37474f",letterSpacing:1,marginBottom:8}},ticker+" \u00b7 "+rows.length+" candles"),
          h("div",{style:{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}},
            h("span",{style:{display:"inline-flex",alignItems:"center",gap:6,padding:"5px 20px",borderRadius:4,fontSize:15,fontWeight:700,letterSpacing:3,color:scol(a.signal),background:scol(a.signal)+"1f",border:"1px solid "+scol(a.signal)+"55"}},(a.signal==="BUY"?"\u25b2":a.signal==="SELL"?"\u25bc":"\u25c6")+" "+a.signal),
            h("span",{style:{fontSize:11,color:"#546e7a"}},"TREND: ",h("span",{style:{color:tcol(a.trend)}},a.trend)," \u00b7 "+a.strength)
          ),
          h("div",{style:{marginTop:12}},
            h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,color:"#546e7a",marginBottom:4}},h("span",null,"CONFIDENCE"),h("span",{style:{color:scol(a.signal),fontWeight:700}},a.confidence+"%")),
            h("div",{style:{background:"#1a1f2e",borderRadius:2,height:5}},h("div",{style:{height:"100%",borderRadius:2,width:a.confidence+"%",background:scol(a.signal)}}))
          ),
          h("div",{style:{marginTop:12,textAlign:"right"}},
            h("div",{style:{fontSize:22,fontWeight:700}},fmt(a.close)),
            h("div",{style:{fontSize:9,color:"#37474f"}},a.date)
          )
        ),
        h("div",{className:"card"},
          h("span",{className:"lbl"},"\u25c8 TRADE LEVELS"),
          h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:10}},
            [["ENTRY",a.entry,"#00bcd4"],["STOP LOSS",a.sl,"#ff5252"],["TAKE PROFIT",a.tp,"#00e676"]].map(function(x){
              return h("div",{key:x[0],className:"cell",style:{borderLeft:"3px solid "+x[2]}},
                h("div",{style:{fontSize:9,color:"#546e7a",letterSpacing:2,marginBottom:4}},x[0]),
                h("div",{style:{fontSize:16,fontWeight:700,color:x[2]}},fmt(x[1]))
              );
            })
          ),
          h("div",{style:{marginTop:10,fontSize:11,color:"#546e7a",display:"flex",gap:20,flexWrap:"wrap"}},
            h("span",null,"ATR: "+fmt(a.atr)),
            h("span",null,"SCORE: ",h("span",{style:{color:a.score>0?"#00e676":a.score<0?"#ff5252":"#ffd740",fontWeight:700}},(a.score>0?"+":"")+a.score)),
            h("span",null,"CONFLUENCE: ",h("span",{style:{color:"#00e676"}},a.bull+"\u2191"),"/",h("span",{style:{color:"#ff5252"}},a.bear+"\u2193"))
          )
        ),
        h("div",{className:"card"},
          h("span",{className:"lbl"},"\u25c8 INDICATORS"),
          h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}},
            [
              ["RSI 14",a.rsi==null?"\u2014":a.rsi,a.rsi>70?"#ff5252":a.rsi<30?"#00e676":"#ffd740"],
              ["STOCH",a.stoch==null?"\u2014":a.stoch,a.stoch>75?"#ff5252":a.stoch<25?"#00e676":"#ffd740"],
              ["MACD",a.macd==null?"\u2014":(a.macd>0?"+":"")+a.macd.toFixed(3),a.macd>0?"#00e676":"#ff5252"],
              ["SMA 5/10",a.s5?fmt(a.s5):"\u2014",a.s5>a.s10?"#00e676":"#ff5252"],
              ["OBV",a.obv?(a.obv.rising?"RISING":"FALLING"):"\u2014",a.obv&&a.obv.rising?"#00e676":"#ff5252"],
              ["VWAP",a.vwap?fmt(a.vwap):"\u2014",a.vwap&&a.close>a.vwap?"#00e676":"#ff5252"]
            ].map(function(x){
              return h("div",{key:x[0],className:"cell"},
                h("div",{style:{fontSize:9,color:"#546e7a",letterSpacing:1,marginBottom:4}},x[0]),
                h("div",{style:{fontSize:14,fontWeight:700,color:x[2]}},x[1])
              );
            })
          )
        ),
        h("div",{style:{fontSize:9,color:"#37474f",textAlign:"center",lineHeight:1.7,padding:"4px 0 14px"}},"Lite version \u2014 live signals + indicators. Backtest, validation, sweep & value grading remain in the full engine.")
      );
    }
  }

  return h("div",{style:{minHeight:"100vh"}},header,tabs,
    h("div",{style:{maxWidth:920,margin:"0 auto",padding:"18px 14px"}},liveTab,sigTab)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
