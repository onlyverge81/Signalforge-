// ─── CSV Parser ────────────────────────────────────────────────────────────
function parseCSV(raw) {
  try {
    const lines = raw.trim().split(/\r?\n/).filter(Boolean);
    if (lines.length < 2) return [];
    const hdr = lines[0].toLowerCase().split(",").map(h => h.trim());
    const fi = kws => hdr.findIndex(h => kws.some(k => h.includes(k)));
    const ci = fi(["close","price","last"]);
    if (ci < 0) return [];
    const di=fi(["date","time"]),oi=fi(["open"]),hi=fi(["high"]),li=fi(["low"]),vi=fi(["vol"]);
    return lines.slice(1).map(line => {
      const c = line.split(",");
      const close = parseFloat(c[ci]);
      return {
        date:   di>=0 ? (c[di]||"").trim() : "",
        open:   parseFloat(c[oi]) || close,
        high:   parseFloat(c[hi]) || close,
        low:    parseFloat(c[li]) || close,
        close,
        volume: parseInt(c[vi]) || 0,
      };
    }).filter(d => !isNaN(d.close) && d.close > 0);
  } catch { return []; }
}

// ─── Data-integrity audit ───────────────────────────────────────────────────
// The whole engine — signal, ATR stops, backtest, t-stat gate — trusts these
// OHLCV bars blindly. A single unadjusted split or a frozen feed silently flips
// the live signal and swings the backtest, with no error thrown. This scans the
// parsed series for the defects real feeds carry and reports them, so the UI can
// mute a signal built on corrupted inputs — the same principle as edge muting.
// Pure & defensive: never throws, returns {issues:[{level,code,msg}], suspect}.
function auditData(rows){
  const issues=[];
  if(!rows||rows.length<5) return {issues,suspect:false};
  const n=rows.length;
  const add=(level,code,msg)=>issues.push({level,code,msg});

  // 1) Malformed bars: high<low, or open/close outside the [low,high] range.
  let bad=0;
  for(const d of rows){
    if(d.high<d.low) bad++;
    else if(d.close>d.high+1e-9||d.close<d.low-1e-9||d.open>d.high+1e-9||d.open<d.low-1e-9) bad++;
  }
  if(bad) add("SEVERE","ohlc", bad+" bar"+(bad>1?"s have":" has")+" impossible OHLC values (high<low, or open/close outside the range) — the feed is malformed.");

  // 2) Date order / duplicates / gaps (only when dates parse).
  const ts=rows.map(d=>Date.parse(d.date));
  if(ts.every(t=>!isNaN(t))){
    let dup=0,back=0;
    for(let i=1;i<n;i++){ if(ts[i]===ts[i-1])dup++; else if(ts[i]<ts[i-1])back++; }
    if(dup) add("WARN","dupdate", dup+" duplicate timestamp"+(dup>1?"s":"")+" — the same bar appears more than once.");
    if(back) add("WARN","unordered", back+" out-of-order bar"+(back>1?"s":"")+" — dates aren't monotonic, but every indicator assumes chronological order.");
    const gaps=[]; for(let i=1;i<n;i++){const dt=ts[i]-ts[i-1]; if(dt>0)gaps.push(dt);}
    if(gaps.length){
      const med=gaps.slice().sort((a,b)=>a-b)[Math.floor(gaps.length/2)];
      let big=0; for(const g of gaps) if(g>med*3.5 && g>med+1.5*864e5) big++; // >3.5× typical spacing AND >~1.5d
      if(big) add("WARN","gap", big+" gap"+(big>1?"s":"")+" in the series (missing bars vs the typical spacing) — backtest windows may straddle holes.");
    }
  } else {
    add("WARN","nodates","Bars have no parseable dates — gap and ordering checks were skipped.");
  }

  // 3) Discontinuities, sized against the instrument's OWN volatility.
  //    A reverting spike = bad print (flag even when modest). A persistent
  //    >35% jump = likely an unadjusted split/dividend. Genuine 20-30% news
  //    gaps (persistent, sub-35%) are left alone to avoid false alarms.
  const rets=[]; for(let i=1;i<n;i++){ if(rows[i-1].close>0) rets.push(Math.abs((rows[i].close-rows[i-1].close)/rows[i-1].close)); }
  const sorted=rets.slice().sort((a,b)=>a-b);
  const medAbs=sorted.length?sorted[Math.floor(sorted.length/2)]:0;
  const candLimit=Math.max(0.18, medAbs*6);
  const splitLimit=Math.max(0.35, medAbs*8);
  let split=0,outlier=0;
  for(let i=1;i<n;i++){
    const c0=rows[i-1].close,c1=rows[i].close; if(!(c0>0))continue;
    const r=(c1-c0)/c0; if(Math.abs(r)<=candLimit) continue;
    const r2=(i+1<n&&c1>0)?(rows[i+1].close-c1)/c1:0;
    const reverts=Math.sign(r2)===-Math.sign(r)&&Math.abs(r2)>=Math.abs(r)*0.6;
    if(reverts) outlier++;
    else if(Math.abs(r)>splitLimit) split++;
  }
  if(split)   add("SEVERE","jump", split+" price discontinuit"+(split>1?"ies":"y")+" far beyond this instrument's normal range — typically an unadjusted split/dividend; it distorts trend, ATR stops and the backtest.");
  if(outlier) add("SEVERE","outlier", outlier+" single-bar spike"+(outlier>1?"s that revert":" that reverts")+" — a bad print/tick rather than a real move.");

  // 4) Stale / frozen feed: a run of identical closes.
  let run=1,maxRun=1;
  for(let i=1;i<n;i++){ if(rows[i].close===rows[i-1].close){ run++; if(run>maxRun)maxRun=run; } else run=1; }
  if(maxRun>=5)      add("SEVERE","frozen","A frozen stretch of "+maxRun+" identical closes — a stale feed; the volatility and signals computed across it are meaningless.");
  else if(maxRun>=3) add("WARN","flat","A flat stretch of "+maxRun+" identical closes — possibly thin or stale data.");

  return {issues, suspect:issues.some(i=>i.level==="SEVERE")};
}

// ─── Technical Analysis ────────────────────────────────────────────────────
const sma = (p,n) => p.length<n ? null : p.slice(-n).reduce((a,b)=>a+b,0)/n;
function ema(p,n) {
  if (p.length<n) return null;
  const k=2/(n+1); let e=p.slice(0,n).reduce((a,b)=>a+b,0)/n;
  for (let i=n;i<p.length;i++) e=p[i]*k+e*(1-k); return e;
}
function rsi(p,n=14) {
  if (p.length<n+1) return null;
  let g=0,l=0;
  for (let i=p.length-n;i<p.length;i++) { const d=p[i]-p[i-1]; d>0?g+=d:l-=d; }
  const rs=(g/n)/((l/n)||.0001);
  return parseFloat((100-100/(1+rs)).toFixed(1));
}
function macd(p) {
  const e12=ema(p,12),e26=ema(p,26); if(!e12||!e26) return null;
  const m=e12-e26; return {macd:parseFloat(m.toFixed(4)),ema12:e12,ema26:e26};
}
function bb(p,n=20) {
  if (p.length<n) return null;
  const sl=p.slice(-n),mu=sl.reduce((a,b)=>a+b,0)/n;
  const sd=Math.sqrt(sl.reduce((a,b)=>a+Math.pow(b-mu,2),0)/n);
  return {upper:mu+2*sd,middle:mu,lower:mu-2*sd};
}
function stoch(data,n=14) {
  if (data.length<n) return null;
  const sl=data.slice(-n),lo=Math.min(...sl.map(d=>d.low)),hi=Math.max(...sl.map(d=>d.high));
  return parseFloat(((sl[sl.length-1].close-lo)/((hi-lo)||1)*100).toFixed(1));
}
function atr(data,n=14) {
  if (data.length<2) return 0;
  const trs=data.slice(-Math.min(n+1,data.length)).map((d,i,a)=>{
    if(i===0) return d.high-d.low;
    return Math.max(d.high-d.low,Math.abs(d.high-a[i-1].close),Math.abs(d.low-a[i-1].close));
  });
  return trs.reduce((a,b)=>a+b,0)/trs.length;
}
function adxCalc(data,n=14){
  if(data.length<n*2)return null;
  const tr=[],plusDM=[],minusDM=[];
  for(let i=1;i<data.length;i++){
    const h=data[i].high,l=data[i].low,ph=data[i-1].high,pl=data[i-1].low,pc=data[i-1].close;
    tr.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
    const up=h-ph,dn=pl-l;
    plusDM.push(up>dn&&up>0?up:0);
    minusDM.push(dn>up&&dn>0?dn:0);
  }
  const smooth=arr=>{let s=arr.slice(0,n).reduce((a,b)=>a+b,0);const out=[s];for(let i=n;i<arr.length;i++){s=s-s/n+arr[i];out.push(s);}return out;};
  const trS=smooth(tr),pS=smooth(plusDM),mS=smooth(minusDM);
  const dx=[];
  for(let i=0;i<trS.length;i++){
    const pdi=100*pS[i]/(trS[i]||1),mdi=100*mS[i]/(trS[i]||1);
    dx.push(100*Math.abs(pdi-mdi)/((pdi+mdi)||1));
  }
  if(dx.length<n)return null;
  const adx=dx.slice(-n).reduce((a,b)=>a+b,0)/n;
  const li=trS.length-1;
  const pdi=100*pS[li]/(trS[li]||1),mdi=100*mS[li]/(trS[li]||1);
  return{adx:+adx.toFixed(1),plusDI:+pdi.toFixed(1),minusDI:+mdi.toFixed(1)};
}
function obvCalc(data){
  if(data.length<16)return null;
  let obv=0;const series=[0];
  for(let i=1;i<data.length;i++){
    if(data[i].close>data[i-1].close)obv+=data[i].volume;
    else if(data[i].close<data[i-1].close)obv-=data[i].volume;
    series.push(obv);
  }
  const recent=series.slice(-5).reduce((a,b)=>a+b,0)/5;
  const prior=series.slice(-15,-5).reduce((a,b)=>a+b,0)/10;
  return{obv,rising:recent>prior};
}
function vwapCalc(data){
  if(!data.length)return null;
  let pv=0,vol=0;
  data.slice(-20).forEach(d=>{const tp=(d.high+d.low+d.close)/3;pv+=tp*d.volume;vol+=d.volume;});
  return vol>0?+(pv/vol).toFixed(4):null;
}
function patterns(data) {
  const out=[],n=data.length; if(n<3) return out;
  const [c,b,a]=[data[n-1],data[n-2],data[n-3]];
  const body=d=>Math.abs(d.close-d.open), range=d=>d.high-d.low;
  if(b.close<b.open&&c.close>c.open&&c.open<=b.close&&c.close>=b.open)
    out.push({name:"Bullish Engulfing",type:"BULLISH",desc:"Bullish candle fully engulfs prior bearish — strong reversal signal."});
  if(b.close>b.open&&c.close<c.open&&c.open>=b.close&&c.close<=b.open)
    out.push({name:"Bearish Engulfing",type:"BEARISH",desc:"Bearish candle fully engulfs prior bullish — strong reversal signal."});
  if(range(c)>0&&body(c)/range(c)<0.08)
    out.push({name:"Doji",type:"NEUTRAL",desc:"Open and close nearly equal — indecision, potential reversal ahead."});
  const lw=Math.min(c.open,c.close)-c.low, uw=c.high-Math.max(c.open,c.close);
  if(body(c)>0&&lw>2*body(c)&&uw<body(c))
    out.push({name:"Hammer",type:"BULLISH",desc:"Long lower wick — buyers rejected lows, bullish reversal."});
  if(body(c)>0&&uw>2*body(c)&&lw<body(c))
    out.push({name:"Shooting Star",type:"BEARISH",desc:"Long upper wick — sellers rejected highs, bearish reversal."});
  if([a,b,c].every(d=>d.close>d.open)&&b.close>a.close&&c.close>b.close)
    out.push({name:"Three White Soldiers",type:"BULLISH",desc:"Three consecutive bullish candles — strong upward momentum."});
  if([a,b,c].every(d=>d.close<d.open)&&b.close<a.close&&c.close<b.close)
    out.push({name:"Three Black Crows",type:"BEARISH",desc:"Three consecutive bearish candles — strong downward pressure."});
  return out;
}
function divergence(closes,n=10) {
  if(closes.length<n+15) return null;
  const rsiAt=i=>rsi(closes.slice(0,i+1));
  const recentP=closes.slice(-n),recentR=closes.slice(0,-n).map((_,i,a)=>rsiAt(i)).filter(Boolean);
  if(recentR.length<3) return null;
  const pUp=recentP[recentP.length-1]>recentP[0];
  const rUp=recentR[recentR.length-1]>recentR[0];
  if(pUp&&!rUp) return{type:"BEARISH",desc:"Price making higher highs but RSI declining — momentum weakening, potential reversal."};
  if(!pUp&&rUp)  return{type:"BULLISH",desc:"Price making lower lows but RSI rising — selling pressure fading, potential bottom."};
  return null;
}

// ─── SFA12: SignalForge Average tracker (composite of SMA5/10/20 + trend %) ──
// Independent indicator — a single bold line that rides the SMA bundle, plus a
// momentum readout (average of the three SMAs' % move over a `lookback` window;
// the 12-candle default is what names it SFA12). The series begins at candle 30
// so it coincides with the ANALYSIS-START marker. This does NOT feed the live
// signal — analyze() casts an optional shadow vote separately for the Old-vs-New
// comparison panel only.
function sfa12Series(rows, startIdx=30, lookback=12){
  const closes=rows.map(d=>d.close);
  // comp[i] = (SMA5+SMA10+SMA20)/3 at candle i, or null until SMA20 exists (i>=19)
  const comp=[];
  for(let i=0;i<closes.length;i++){
    if(i<19){ comp.push(null); continue; }
    const sl=closes.slice(0,i+1);
    comp.push((sma(sl,5)+sma(sl,10)+sma(sl,20))/3);
  }
  // % change of an n-period SMA over `lookback` candles ending at candle i
  const pctAt=(i,n)=>{
    if(i-lookback<19) return null;
    const a=sma(closes.slice(0,i-lookback+1),n), b=sma(closes.slice(0,i+1),n);
    if(a==null||b==null||a===0) return null;
    return (b-a)/a*100;
  };
  // Tracker line points — only from startIdx (=30) onward, to align with the marker
  const series=[];
  for(let i=startIdx;i<closes.length;i++){ if(comp[i]!=null) series.push({i,value:comp[i]}); }
  // Latest-candle readout
  const li=closes.length-1, sl=closes.slice(0,li+1);
  const s5=sma(sl,5), s10=sma(sl,10), s20=sma(sl,20);
  const p5=pctAt(li,5), p10=pctAt(li,10), p20=pctAt(li,20);
  const pct=(p5!=null&&p10!=null&&p20!=null)?parseFloat(((p5+p10+p20)/3).toFixed(2)):null;
  let state="SIDEWAYS";
  if(s5!=null&&s10!=null&&s20!=null&&pct!=null){
    if(s5>s10&&s10>s20&&pct>0) state="UPTREND";
    else if(s5<s10&&s10<s20&&pct<0) state="DOWNTREND";
  }
  return { value: comp[li], pct, state, lookback, series };
}

// ─── Shared signal logic: weighted votes + confluence + conflict penalty ─────
// Used by BOTH analyze() and scoreAt() so live signals and backtest stay identical.
// Each indicator casts a directional vote (+1 bullish / -1 bearish / 0 neutral)
// with a reliability weight. Final signal requires confluence (3+ aligned) AND
// a strong enough weighted score, with conflicting votes dampening the result.
function computeSignal(ctx, extraVotes=[]) {
  const {R,M,s5,s10,s20,s50,trend,S,B,last,pats,div,volSig,ADX,OBV,VWAP} = ctx;
  const votes=[];
  if(R!=null)  votes.push({n:"RSI",   dir:R<40?1:R>60?-1:0, w:2});
  if(M)        votes.push({n:"MACD",  dir:M.macd>0?1:-1,     w:2.5});
  if(s5&&s10)  votes.push({n:"MA",    dir:s5>s10?1:-1,       w:1.5});
  if(s20&&s50) votes.push({n:"MAlong",dir:s20>s50?1:-1,      w:2});
  votes.push({n:"Trend", dir:trend==="UPTREND"?1:trend==="DOWNTREND"?-1:0, w:2});
  if(S!=null)  votes.push({n:"Stoch", dir:S<25?1:S>75?-1:0,  w:1.5});
  if(B)        votes.push({n:"BB",    dir:last.close<B.lower?1:last.close>B.upper?-1:0, w:1.5});
  // Patterns: each contributes a weighted vote
  pats.forEach(p=>votes.push({n:"Pat", dir:p.type==="BULLISH"?1:p.type==="BEARISH"?-1:0, w:1.5}));
  // Divergence: high-reliability reversal signal
  if(div) votes.push({n:"Div", dir:div.type==="BULLISH"?1:-1, w:2.5});
  // Volume confirmation (only meaningful with a trend)
  if(volSig==="CONFIRMING"&&trend==="UPTREND")   votes.push({n:"Vol",dir:1,w:1});
  if(volSig==="CONFIRMING"&&trend==="DOWNTREND") votes.push({n:"Vol",dir:-1,w:1});
  // ADX confirmer — weight scales with trend strength
  if(ADX) votes.push({n:"ADX", dir:ADX.plusDI>ADX.minusDI?1:-1, w:ADX.adx>25?3:ADX.adx>20?1.5:0.5});
  if(OBV) votes.push({n:"OBV", dir:OBV.rising?1:-1, w:2});
  if(VWAP)votes.push({n:"VWAP",dir:last.close>VWAP?1:-1, w:1.5});
  // Optional extra votes (default none ⇒ live engine + backtest unchanged).
  // Used only for the SFA12 "New Logic" shadow comparison.
  if(extraVotes.length) votes.push(...extraVotes);

  const active=votes.filter(v=>v.dir!==0);
  const bull=active.filter(v=>v.dir>0).length;
  const bear=active.filter(v=>v.dir<0).length;
  const weighted=active.reduce((a,v)=>a+v.dir*v.w,0);
  const conflict=Math.min(bull,bear);
  const penalty=conflict*0.8;
  const net=weighted>0?weighted-penalty:weighted+penalty;

  // Confluence requirement: 3+ aligned indicators AND strong weighted score
  let signal="HOLD";
  if(net>=5 && bull>=3 && bull>bear) signal="BUY";
  else if(net<=-5 && bear>=3 && bear>bull) signal="SELL";

  // Confidence: scale net score, capped, factoring how lopsided the vote is
  const total=bull+bear;
  const agreement=total>0?Math.max(bull,bear)/total:0;
  const confidence=Math.min(95,Math.max(35,Math.round(40+Math.abs(net)*3+agreement*15)));

  return {signal, score:parseFloat(net.toFixed(1)), bull, bear, conflict, confidence};
}

function analyze(data, ticker, market, strategy, slMult, tpMult) {
  const SLM = slMult || 1.5;
  const TPM = tpMult || 2.0;
  const closes=data.map(d=>d.close), vols=data.map(d=>d.volume);
  const last=data[data.length-1];
  const R=rsi(closes), M=macd(closes), B=bb(closes), S=stoch(data), A=atr(data);
  const s5=sma(closes,Math.min(5,closes.length));
  const s10=sma(closes,Math.min(10,closes.length));
  const s20=sma(closes,Math.min(20,closes.length));
  const s50=sma(closes,Math.min(50,closes.length));
  const pats=patterns(data);
  const div=divergence(closes);
  const ADX=adxCalc(data);
  const OBV=obvCalc(data);
  const VWAP=vwapCalc(data);

  // Trend
  const chg=(last.close-closes[0])/closes[0]*100;
  const trend=chg>2?"UPTREND":chg<-2?"DOWNTREND":"SIDEWAYS";
  const strength=Math.abs(chg)>8?"STRONG":Math.abs(chg)>3?"MODERATE":"WEAK";

  // Volume
  const avgV=vols.slice(0,-3).reduce((a,b)=>a+b,0)/Math.max(vols.length-3,1);
  const recV=vols.slice(-3).reduce((a,b)=>a+b,0)/3;
  const volSig=recV>avgV*1.15?"CONFIRMING":recV<avgV*0.85?"DIVERGING":"NEUTRAL";

  // Score via shared weighted+confluence logic
  const ctx={R,M,s5,s10,s20,s50,trend,S,B,last,pats,div,volSig,ADX,OBV,VWAP};
  const sigResult=computeSignal(ctx);
  const score=sigResult.score;
  const signal=sigResult.signal;
  const confidence=sigResult.confidence;

  // SFA12 tracker (independent indicator — does NOT affect the live result above).
  const sfa12=sfa12Series(data);
  // Old-vs-New shadow comparison: re-run the SAME engine WITH SFA12 cast as one
  // weighted vote. This is preview-only; it never feeds `signal`/levels/backtest.
  const sfa12Vote={n:"SFA12", dir: sfa12.state==="UPTREND"?1 : sfa12.state==="DOWNTREND"?-1 : 0, w:2}; // w tunable
  const pick=o=>({signal:o.signal,confidence:o.confidence,score:o.score,bull:o.bull,bear:o.bear});
  let sfa12Compare=null;
  if(sfa12.pct!=null){ // only once the lookback has filled (enough candles)
    const sigNew=computeSignal(ctx, sfa12Vote.dir===0?[]:[sfa12Vote]);
    sfa12Compare={ old:pick(sigResult), new:pick(sigNew), vote:sfa12Vote, changed: sigResult.signal!==sigNew.signal };
  }

  // Levels
  const sup=Math.min(...data.slice(-Math.min(20,data.length)).map(d=>d.low));
  const res=Math.max(...data.slice(-Math.min(20,data.length)).map(d=>d.high));
  const e=last.close;
  const sl=signal==="BUY"?e-A*SLM:e+A*SLM;
  const tp1=signal==="BUY"?e+A*TPM:e-A*TPM;
  const tp2=signal==="BUY"?e+A*TPM*1.75:e-A*TPM*1.75;
  const rr=parseFloat((Math.abs(tp1-e)/Math.abs(sl-e)).toFixed(1));

  const rsiLabel=R?R>70?"OVERBOUGHT":R<30?"OVERSOLD":"NEUTRAL":"N/A";

  return {
    signal,confidence,trend,strength,
    entry:parseFloat(e.toFixed(4)),sl:parseFloat(sl.toFixed(4)),
    tp1:parseFloat(tp1.toFixed(4)),tp2:parseFloat(tp2.toFixed(4)),rr,
    support:parseFloat(sup.toFixed(4)),resistance:parseFloat(res.toFixed(4)),
    score,
    sfa12, sfa12Compare,
    confluence:{bull:sigResult.bull,bear:sigResult.bear,conflict:sigResult.conflict},
    indicators:{
      rsi:{v:R,label:rsiLabel},
      stoch:{v:S,label:S>75?"OVERBOUGHT":S<25?"OVERSOLD":"NEUTRAL"},
      macd:{sig:M?(M.macd>0?"BULLISH":"BEARISH"):"N/A",desc:M?"MACD "+(M.macd>=0?"+":"")+M.macd.toFixed(3):"Insufficient data"},
      ma:{sig:s5&&s10?(s5>s10?"BULLISH":"BEARISH"):"N/A",s5,s10,s20,s50},
      bb:{sig:B?(last.close>B.upper?"BEARISH":last.close<B.lower?"BULLISH":"NEUTRAL"):"N/A",v:B},
      vol:{sig:volSig,recent:recV,avg:avgV},
      atr:parseFloat(A.toFixed(4)),
      adx:ADX?{sig:ADX.adx>25?(ADX.plusDI>ADX.minusDI?"BULLISH":"BEARISH"):"NEUTRAL",adx:ADX.adx,plusDI:ADX.plusDI,minusDI:ADX.minusDI}:null,
      obv:OBV?{sig:OBV.rising?"BULLISH":"BEARISH",rising:OBV.rising,v:OBV.obv}:null,
      vwap:VWAP?{sig:last.close>VWAP?"BULLISH":"BEARISH",v:VWAP}:null,
    },
    patterns:pats, divergence:div,
    levels:[
      {price:parseFloat(sup.toFixed(4)),type:"SUPPORT",strength:"STRONG"},
      {price:parseFloat(res.toFixed(4)),type:"RESISTANCE",strength:"STRONG"},
      ...(B?[
        {price:parseFloat(B.lower.toFixed(4)),type:"SUPPORT",strength:"MODERATE"},
        {price:parseFloat(B.upper.toFixed(4)),type:"RESISTANCE",strength:"MODERATE"},
      ]:[]),
    ],
    risks:[
      "Support at "+fmt(sup)+" — breach would invalidate bullish thesis",
      volSig==="DIVERGING"?"Volume declining — weakening conviction in current move":"Monitor for volume confirmation on breakout",
      R&&R>70?"RSI overbought at "+R+" — momentum may stall soon":R&&R<30?"RSI oversold at "+R+" — bounce possible":"RSI "+R+" — no extreme readings",
    ],
    reasoning:
      ticker+" ("+market+") shows a "+strength.toLowerCase()+" "+trend.toLowerCase()+" over the "+data.length+"-candle period. "+
      (M?M.macd>0?"MACD positive ("+M.macd.toFixed(3)+") — bullish momentum active. ":"MACD negative ("+M.macd.toFixed(3)+") — bearish pressure. ":"")+
      (R?"RSI "+R+" ("+rsiLabel+"). ":"")+
      (div?div.desc+" ":"")+
      (pats.length?pats[0].name+" pattern detected. ":"")+
      "Score "+score+" → "+signal+" at "+confidence+"% confidence using "+strategy+".",
    bias:
      signal==="BUY"?"Test of resistance near "+fmt(res)+" expected. Volume confirmation required. Trail stop as price moves in your favour.":
      signal==="SELL"?"Retest of support near "+fmt(sup)+" expected. Any rallies should be treated as selling opportunities.":
      "Consolidation between "+fmt(sup)+"–"+fmt(res)+" likely. Wait for a decisive breakout with volume before entering.",
  };
}

// ─── Market Outlook → Correction Period Price ──────────────────────────────
// Pulls the three major US markets via liquid ETF proxies (DIA=Dow,
// SPY=S&P 500, QQQ=Nasdaq-100), SUMS their realtime daily Gain/Loss %, applies
// that combined % to the stock's realtime price for a dollar delta, then
// projects a "Market Correction Period Price": ADD the delta in an uptrend,
// SUBTRACT it in a downtrend. Every % here is close-to-prev-close, so the live
// projection and the historical backtest share one consistent definition.
const OUTLOOK_PROXIES=[["DIA","Dow"],["SPY","S&P 500"],["QQQ","Nasdaq"]];

// [{date,close,pct}] where pct = % change vs the previous close (first bar null).
function idxPctSeries(candles){
  const out=[];
  for(let i=0;i<candles.length;i++){
    const c=candles[i].close, p=i>0?candles[i-1].close:null;
    out.push({date:candles[i].date, close:c, pct:p?(c-p)/p*100:null});
  }
  return out;
}

// Live projection + a directional-accuracy backtest.
//   stock : analysed candle array (needs .date/.close)
//   trend : analysis.trend ("UPTREND" | "DOWNTREND" | "SIDEWAYS") for the live call
//   idx   : { DIA:[candles], SPY:[candles], QQQ:[candles] }
function buildOutlook(stock, trend, idx, opts){
  if(!stock||stock.length<2||!idx) return null;
  const proxies=(opts&&opts.proxies)||OUTLOOK_PROXIES;
  const liveMoves=(opts&&opts.liveMoves)||null;
  const syms=proxies.map(p=>p[0]);
  if(syms.some(s=>!idx[s]||idx[s].length<2)) return null;
  const series={}; syms.forEach(s=>series[s]=idxPctSeries(idx[s]));

  // ── Live: SUM each proxy's latest close-to-prev-close % ──
  const markets=proxies.map(([sym,label])=>{
    const sr=series[sym], last=sr[sr.length-1];
    const lm=liveMoves&&liveMoves[sym];
    // Prefer the live snapshot's real session % (with a known timestamp); fall back
    // to the last bar's close-to-prevclose when no live move is available.
    const pct=(lm&&lm.pct!=null)?lm.pct:last.pct;
    return {sym,label,pct,price:(lm&&lm.value!=null)?lm.value:last.close};
  });
  if(markets.some(m=>m.pct==null)) return null;
  const combined=markets.reduce((a,m)=>a+m.pct,0);
  const price=stock[stock.length-1].close;
  const delta=price*combined/100;
  // Projection moves in the TREND's direction by the SIZE of the combined market
  // move — so use |delta|. (delta itself stays signed for the "Dollar delta"
  // readout.) Building up/down from signed delta double-counts the sign on a down
  // market, which flipped the downtrend price ABOVE spot. See header copy above.
  const mag=Math.abs(delta);
  const up=price+mag, down=price-mag;
  const active=trend==="UPTREND"?"UP":trend==="DOWNTREND"?"DOWN":"NEUTRAL";
  const correctionPrice=active==="UP"?up:active==="DOWN"?down:null;

  // ── Backtest: directional accuracy of the projection vs the NEXT bar ──
  // Per-bar trend = close vs trailing SMA20 (every historical bar gets a
  // direction). For each bar i that has a combined% for its date, an SMA20, and
  // a next bar:  predMove = (trendUp?+1:-1) * close[i] * combined/100 ; a hit is
  // sign(predMove) === sign(close[i+1]-close[i]). Baseline = trend-only direction
  // (ignores the market overlay) so we can see whether the overlay adds anything.
  const maps={}; syms.forEach(s=>{maps[s]=new Map(); series[s].forEach(r=>{if(r.pct!=null)maps[s].set(r.date,r.pct);});});
  const closes=stock.map(d=>d.close);
  let n=0,hits=0,baseHits=0,errSum=0,pctErrSum=0;
  for(let i=20;i<stock.length-1;i++){
    const sma20=sma(closes.slice(0,i+1),20); if(sma20==null) continue;
    const date=stock[i].date;
    let comb=0,ok=true;
    for(const s of syms){ const v=maps[s].get(date); if(v==null){ok=false;break;} comb+=v; }
    if(!ok) continue;
    const trendUp=closes[i]>=sma20;
    const predMove=(trendUp?1:-1)*closes[i]*comb/100;
    const projected=closes[i]+predMove;
    const actualMove=closes[i+1]-closes[i];
    if(predMove===0||actualMove===0) continue;
    n++;
    if(Math.sign(predMove)===Math.sign(actualMove)) hits++;
    if((trendUp?1:-1)===Math.sign(actualMove)) baseHits++;
    errSum+=Math.abs(projected-closes[i+1]);
    pctErrSum+=Math.abs(projected-closes[i+1])/closes[i+1]*100;
  }
  const acc=n?hits/n*100:null, baseline=n?baseHits/n*100:null;
  const backtest=n?{n,acc,baseline,edge:acc-baseline,avgErr:errSum/n,avgPctErr:pctErrSum/n}:null;

  // Freshness provenance from the live snapshot (drives the Outlook's freshness gate).
  let fresh=null;
  if(liveMoves){
    const ms=syms.map(s=>liveMoves[s]).filter(Boolean);
    if(ms.length){
      const st=ms.map(m=>m.stalenessSec).filter(x=>x!=null);
      const isOpen=ms.some(m=>m.isOpen);
      const worst=st.length?Math.max(...st):null;
      fresh={stalenessSec:worst, isOpen, band:classifyFreshness(worst,isOpen),
             perIndex:proxies.map(([s,label])=>({sym:s,label,...(liveMoves[s]||{})}))};
    }
  }
  return {markets,combined,price,delta,up,down,active,trend,correctionPrice,backtest,fresh};
}

// ─── Phase-3 macro regime — condition conviction on the market, when earned ───
// Reuses buildOutlook's DIA/SPY/QQQ overlay (no new data path). `combined` is the
// summed risk-proxy move (sentiment sign); `backtest.edge` is acc − trend-only
// baseline. Same honest gate as everywhere: the regime only CONDITIONS the
// display when the overlay actually beat its own baseline over enough bars —
// otherwise it's shown for context only and changes nothing.
function macroRegime(outlook){
  if(!outlook) return null;
  const c=outlook.combined, bt=outlook.backtest;
  const regime = c>0.3?"RISK-ON" : c<-0.3?"RISK-OFF" : "NEUTRAL";
  const proven = !!(bt && bt.n>=30 && bt.edge>2);
  const note = proven
    ? "Market overlay beats its trend-only baseline by "+bt.edge.toFixed(1)+"pp over "+bt.n+" bars — regime conditioning is earned."
    : (bt ? "Market overlay does NOT clear its trend-only baseline ("+(bt.edge>=0?"+":"")+bt.edge.toFixed(1)+"pp, n="+bt.n+") — regime shown for context only."
          : "Not enough overlapping market history to validate the overlay — context only.");
  return {regime, proven, combined:c, note};
}

// ─── Data-freshness (the "lag test", browser side) ───────────────────────────
// Mirrors the bands in scripts/lag-probe.mjs so the app and the CI probe agree.
// stalenessSec = now − last-trade timestamp; only meaningful while the market is
// open. This is what lets the app say "feed 8s fresh" vs "15-min delayed".
const FRESH_REALTIME_SEC=60, FRESH_DELAYED_SEC=20*60;
function classifyFreshness(stalenessSec, isOpen){
  if(!isOpen) return "CLOSED";
  if(stalenessSec==null||!isFinite(stalenessSec)) return "UNKNOWN";
  if(stalenessSec<FRESH_REALTIME_SEC) return "REALTIME";
  if(stalenessSec<FRESH_DELAYED_SEC) return "DELAYED";
  return "STALE";
}
function freshnessLabel(f){
  if(!f) return "";
  if(f.band==="CLOSED") return "market closed — last session";
  if(f.band==="REALTIME") return "feed "+Math.round(f.stalenessSec)+"s fresh";
  if(f.band==="DELAYED") return "delayed ~"+Math.max(1,Math.round(f.stalenessSec/60))+"m";
  if(f.band==="STALE") return "stale "+(f.stalenessSec/60).toFixed(0)+"m";
  return "freshness unknown";
}
function freshnessColor(band){
  return band==="REALTIME"?"#00e676":band==="DELAYED"?"#ffd740":band==="CLOSED"?"#90a4ae":band==="STALE"?"#ff5252":"#90a4ae";
}
// Polygon timestamps are NANOSECONDS (~1e18); tolerate ms (~1e12) too.
function polyTsToMs(t){ if(t==null) return null; const n=Number(t); if(!isFinite(n)||n<=0) return null; return n>1e14?Math.round(n/1e6):n; }

// ─── Polygon.io adapters (primary feed) ──────────────────────────────────────
// True US indices (Polygon prefixes indices with "I:"), replacing the DIA/SPY/QQQ
// ETF proxies the Outlook used to sum. Real session % + a last-trade timestamp.
const OUTLOOK_INDICES=[["I:DJI","Dow"],["I:SPX","S&P 500"],["I:NDX","Nasdaq"]];
const POLY_RES={ "1":[1,"minute"],"5":[5,"minute"],"15":[15,"minute"],"30":[30,"minute"],"60":[1,"hour"],"D":[1,"day"],"W":[1,"week"] };
function polyWindowMs(span){ const D=864e5; return span==="minute"?10*D:span==="hour"?90*D:span==="week"?2500*D:600*D; }
function polyBarDate(tMs,span){ const iso=new Date(tMs).toISOString(); return (span==="day"||span==="week")?iso.slice(0,10):iso.slice(0,16).replace("T"," "); }
function polyErr(j){
  const m=j&&(j.error||j.message)||"Polygon request failed.";
  if(/not entitled|NOT_AUTHORIZED|isn't included|not included/i.test(m)) return "Your Polygon plan doesn't include this data — real-time/index needs the Developer tier. ("+m+")";
  if(/unknown api key|invalid api key|unauthorized|401/i.test(m)) return "Invalid Polygon REST key — copy it from polygon.io/dashboard/api-keys (the REST key, NOT the Flat-Files S3 secret).";
  if(/exceeded|maximum requests|rate limit|429/i.test(m)) return "Polygon rate limit reached (5/min on Free). Wait a minute, or upgrade for unlimited.";
  return m;
}
async function polyGet(url){ const r=await fetch(url); const j=await r.json(); if(j&&(j.status==="ERROR"||j.error)) throw new Error(polyErr(j)); return j; }
function polyBars(results,span){ return (results||[]).map(b=>({date:polyBarDate(b.t,span),open:+(+b.o).toFixed(4),high:+(+b.h).toFixed(4),low:+(+b.l).toFixed(4),close:+(+b.c).toFixed(4),volume:+b.v||0})).filter(d=>d.close>0); }
// Stock OHLC bars + a best-effort freshness quote → {candles, quote:{lastTs,isOpen}}
async function polyFetchCandles(sym, resolution, key){
  const [mult,span]=POLY_RES[resolution]||[1,"day"];
  const to=new Date(), from=new Date(to.getTime()-polyWindowMs(span)), fmt=d=>d.toISOString().slice(0,10);
  const j=await polyGet("https://api.polygon.io/v2/aggs/ticker/"+encodeURIComponent(sym)+"/range/"+mult+"/"+span+"/"+fmt(from)+"/"+fmt(to)+"?adjusted=true&sort=asc&limit=5000&apiKey="+encodeURIComponent(key));
  if(!j.results||!j.results.length) throw new Error('No Polygon data for "'+sym+'". US stocks/ETFs only (e.g. AAPL, SPY).');
  const candles=polyBars(j.results,span).slice(-300);
  let quote=null;
  try{
    const sj=await (await fetch("https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/tickers/"+encodeURIComponent(sym)+"?apiKey="+encodeURIComponent(key))).json();
    const t=sj&&sj.ticker; if(t){ const lastTs=polyTsToMs(t.lastTrade&&t.lastTrade.t!=null?t.lastTrade.t:(t.updated!=null?t.updated:(t.min&&t.min.t))); quote={lastTs}; }
  }catch(_){}
  return {candles, quote};
}
// One index's historical daily bars (for the directional backtest alignment).
async function polyFetchIndexBars(sym, mult, span, key){
  const to=new Date(), from=new Date(to.getTime()-polyWindowMs(span)), fmt=d=>d.toISOString().slice(0,10);
  const j=await polyGet("https://api.polygon.io/v2/aggs/ticker/"+encodeURIComponent(sym)+"/range/"+mult+"/"+span+"/"+fmt(from)+"/"+fmt(to)+"?sort=asc&limit=5000&apiKey="+encodeURIComponent(key));
  return polyBars(j.results,span).slice(-300);
}
// Real-time index session moves + provenance + historical bars for the Outlook.
async function polyFetchIndexMoves(resolution, key){
  const syms=OUTLOOK_INDICES.map(i=>i[0]);
  const sj=await polyGet("https://api.polygon.io/v3/snapshot/indices?ticker.any_of="+encodeURIComponent(syms.join(","))+"&apiKey="+encodeURIComponent(key));
  const byT={}; (sj.results||[]).forEach(r=>byT[r.ticker]=r);
  const [mult,span]=POLY_RES[resolution]||[1,"day"];
  const idx={}, moves={}, now=Date.now();
  for(const [sym] of OUTLOOK_INDICES){
    idx[sym]=await polyFetchIndexBars(sym, mult, span, key);
    const r=byT[sym], lastTs=r?polyTsToMs(r.last_updated):null;
    const isOpen=r?(r.market_status==="open"||r.market_status==="regular_trading"):false;
    moves[sym]={pct:r&&r.session?(r.session.change_percent):null, value:r?r.value:null, lastTs, isOpen, stalenessSec:lastTs!=null?Math.max(0,(now-lastTs)/1000):null};
  }
  return {idx, moves};
}

// ─── Backtest engine ─────────────────────────────────────────────────────────
// Computes the signal score using the same logic as analyze(), but for a given
// slice of data ending at index i. Returns just the score + signal.
// Legacy flat-scoring logic (pre-confluence) — kept only for A/B comparison.
// POSITION mode: long-horizon trend-following (the "patient" philosophy).
// Only goes long, only inside an established long-term uptrend, buys pullbacks,
// holds through noise, exits only when the long trend actually breaks.
// NOTE: price-based trend-following — NOT fundamental value investing. It cannot
// see earnings, debt, or business quality, which is the real core of Buffett's edge.
function scorePosition(slice){
  if(slice.length<30)return null;
  const cl=slice.map(d=>d.close),last=slice[slice.length-1];
  const s50=sma(cl,Math.min(50,cl.length));
  const s200=sma(cl,Math.min(200,cl.length));
  const R=rsi(cl);
  if(!s50||!s200) return {score:0,signal:"HOLD",atr:atr(slice)};
  const longUptrend = last.close>s200 && s50>s200;
  const longDowntrend = last.close<s200 && s50<s200;
  let signal="HOLD", score=0;
  if(longUptrend){
    score=3;
    // buy a pullback within the uptrend
    if(R!=null && R<45){ signal="BUY"; score=6; }
  } else if(longDowntrend){
    score=-6; signal="SELL"; // exit/avoid — thesis broken
  }
  return {score, signal, atr:atr(slice)};
}

function scoreFlat(slice){
  if(slice.length<26)return null;
  const cl=slice.map(d=>d.close),last=slice[slice.length-1];
  const R=rsi(cl),M=macd(cl),B=bb(cl),S=stoch(slice);
  const s5=sma(cl,5),s10=sma(cl,10),s20=sma(cl,20),s50=sma(cl,Math.min(50,cl.length));
  const pats=patterns(slice),div=divergence(cl);
  const ADX=adxCalc(slice),OBV=obvCalc(slice),VWAP=vwapCalc(slice);
  const chg=(last.close-cl[0])/cl[0]*100,trend=chg>2?"UPTREND":chg<-2?"DOWNTREND":"SIDEWAYS";
  let s=0;
  if(R!=null)s+=R<40?3:R>70?-3:R<50?1:-1;
  if(M)s+=M.macd>0?2:-2;
  if(s5&&s10)s+=s5>s10?1:-1;
  if(s10&&s20)s+=s10>s20?1:-1;
  if(s20&&s50)s+=s20>s50?1:-1;
  s+=trend==="UPTREND"?2:trend==="DOWNTREND"?-2:0;
  if(S!=null)s+=S<25?2:S>75?-2:0;
  if(B)s+=last.close<B.lower?2:last.close>B.upper?-2:0;
  pats.forEach(p=>{s+=p.type==="BULLISH"?2:p.type==="BEARISH"?-2:0;});
  if(div?.type==="BULLISH")s+=3; if(div?.type==="BEARISH")s-=3;
  if(ADX&&ADX.adx>25)s+=ADX.plusDI>ADX.minusDI?2:-2;else if(ADX&&ADX.adx>20)s+=ADX.plusDI>ADX.minusDI?1:-1;
  if(OBV)s+=OBV.rising?1:-1;
  if(VWAP)s+=last.close>VWAP?1:-1;
  return{score:s,signal:s>=4?"BUY":s<=-4?"SELL":"HOLD",atr:atr(slice)};
}

function scoreAt(slice) {
  if (slice.length < 26) return null; // need enough for MACD/SMA
  const closes = slice.map(d=>d.close), vols = slice.map(d=>d.volume);
  const last = slice[slice.length-1];
  const R=rsi(closes), M=macd(closes), B=bb(closes), S=stoch(slice);
  const s5=sma(closes,5), s10=sma(closes,10), s20=sma(closes,20), s50=sma(closes,Math.min(50,closes.length));
  const pats=patterns(slice), div=divergence(closes);
  const ADX=adxCalc(slice), OBV=obvCalc(slice), VWAP=vwapCalc(slice);
  const chg=(last.close-closes[0])/closes[0]*100;
  const trend=chg>2?"UPTREND":chg<-2?"DOWNTREND":"SIDEWAYS";
  const avgV=vols.slice(0,-3).reduce((a,b)=>a+b,0)/Math.max(vols.length-3,1);
  const recV=vols.slice(-3).reduce((a,b)=>a+b,0)/3;
  const volSig=recV>avgV*1.15?"CONFIRMING":recV<avgV*0.85?"DIVERGING":"NEUTRAL";
  const r=computeSignal({R,M,s5,s10,s20,s50,trend,S,B,last,pats,div,volSig,ADX,OBV,VWAP});
  return {score:r.score, signal:r.signal, atr:atr(slice)};
}

// ─── Shared trade-exit + stats helpers ───────────────────────────────────────
// Factored out of runBacktest so the forward-test ledger (scripts/forward-log +
// the FORWARD TEST tab) marks positions to market with the IDENTICAL math. These
// are mirrored VERBATIM in scripts/engine.mjs; engine.test.mjs pins the parity.

// One bar's exit test. SL is checked FIRST so a bar that straddles both SL and
// TP counts as a LOSS (pessimistic) — the original convention, kept intact.
function checkBarExit(t, candle){
  if(t.dir==="BUY"){
    if(candle.low<=t.sl)   return {exit:t.sl, result:"LOSS"};
    if(candle.high>=t.tp)  return {exit:t.tp, result:"WIN"};
  } else { // SELL
    if(candle.high>=t.sl)  return {exit:t.sl, result:"LOSS"};
    if(candle.low<=t.tp)   return {exit:t.tp, result:"WIN"};
  }
  return null;
}

// Net P&L of a closed trade after round-trip costs (slip+comm, entry+exit).
function tradeNet(dir, entry, exit, costPerTrade){
  const pnl = dir==="BUY" ? (exit-entry) : (entry-exit);
  const grossPct = pnl/entry*100;
  const pnlPct = parseFloat((grossPct - (costPerTrade||0)).toFixed(4));
  return {pnl, grossPct, pnlPct};
}

// Aggregate stats + equity curve over an array of CLOSED trades (each with
// .result and .pnlPct/.grossPct). Single source of the significance verdict.
function realizedStats(trades){
  const wins=trades.filter(t=>t.result==="WIN");
  const losses=trades.filter(t=>t.result==="LOSS");
  const totalPnlPct=trades.reduce((a,t)=>a+t.pnlPct,0);
  const totalGrossPct=trades.reduce((a,t)=>a+(t.grossPct||t.pnlPct),0);
  const grossWin=wins.reduce((a,t)=>a+t.pnlPct,0);
  const grossLoss=Math.abs(losses.reduce((a,t)=>a+t.pnlPct,0));
  const winRate=trades.length?wins.length/trades.length*100:0;
  const avgWin=wins.length?grossWin/wins.length:0;
  const avgLoss=losses.length?grossLoss/losses.length:0;
  const profitFactor=grossLoss>0?grossWin/grossLoss:(grossWin>0?Infinity:0);
  const expectancy=trades.length?totalPnlPct/trades.length:0;
  const totalCostDrag=totalGrossPct-totalPnlPct;
  const netWins=trades.filter(t=>t.pnlPct>0).length;

  let equity=0;
  const curve=trades.map(t=>{equity+=t.pnlPct; return parseFloat(equity.toFixed(2));});

  const rets=trades.map(t=>t.pnlPct);
  const nT=rets.length;
  const mean=nT?rets.reduce((a,b)=>a+b,0)/nT:0;
  const variance=nT?rets.reduce((a,b)=>a+Math.pow(b-mean,2),0)/nT:0;
  const stdDev=Math.sqrt(variance);
  const sharpe=stdDev>0?mean/stdDev:0;
  let peak=0,maxDD=0;
  curve.forEach(eq=>{if(eq>peak)peak=eq;const dd=peak-eq;if(dd>maxDD)maxDD=dd;});
  let cl=0,maxConsecLoss=0;
  rets.forEach(x=>{if(x<=0){cl++;if(cl>maxConsecLoss)maxConsecLoss=cl;}else cl=0;});
  const se=stdDev>0?stdDev/Math.sqrt(nT):0;
  const tStat=se>0?mean/se:0;
  let significance="NOT SIGNIFICANT";
  if(nT<10) significance="TOO FEW TRADES";
  else if(nT>=30&&Math.abs(tStat)>2) significance="SIGNIFICANT";
  else if(nT>=20&&Math.abs(tStat)>1.5) significance="SUGGESTIVE";

  return {
    stats:{
      total:trades.length, wins:wins.length, losses:losses.length,
      winRate:parseFloat(winRate.toFixed(1)),
      avgWin:parseFloat(avgWin.toFixed(2)),
      avgLoss:parseFloat(avgLoss.toFixed(2)),
      totalReturn:parseFloat(totalPnlPct.toFixed(2)),
      grossReturn:parseFloat(totalGrossPct.toFixed(2)),
      costDrag:parseFloat(totalCostDrag.toFixed(2)),
      netWins,
      profitFactor:profitFactor===Infinity?"∞":parseFloat(profitFactor.toFixed(2)),
      expectancy:parseFloat(expectancy.toFixed(2)),
      sharpe:parseFloat(sharpe.toFixed(2)),
      maxDrawdown:parseFloat(maxDD.toFixed(2)),
      maxConsecLoss,
      stdDev:parseFloat(stdDev.toFixed(2)),
      tStat:parseFloat(tStat.toFixed(2)),
      significance,
    },
    curve,
  };
}

// Walks through history, opens a trade on each BUY/SELL signal, then checks the
// NEXT candles to see whether TP or SL was hit first. ATR-based SL/TP, same as live.
function runBacktest(data, scorer, slMult, tpMult, costs, range, holdMode) {
  const scoreFn = scorer || scoreAt;
  const SLM = slMult || 1.5;
  const TPM = tpMult || 2.0;
  const slipPct = costs?.slip || 0;   // % per side
  const commPct = costs?.comm || 0;   // % per side
  const costPerTrade = (slipPct + commPct) * 2; // entry + exit
  const startIdx = range?.start!=null ? Math.max(30, range.start) : 30;
  const endIdx   = range?.end!=null   ? range.end : data.length;
  const trades=[];
  let openTrade=null;
  let pending=null; // signal queued on prior bar, fills at THIS bar's open (no lookahead)
  // start once we have enough lookback for indicators
  for (let i=startIdx; i<endIdx; i++) {
    const slice=data.slice(0,i+1);
    const candle=data[i];

    // 1) Fill any pending entry at THIS bar's OPEN (realistic — no lookahead)
    if (pending && !openTrade) {
      const entry=candle.open;
      const A=pending.atr;
      openTrade={
        dir:pending.dir, entry, openIndex:i, entryDate:candle.date,
        sl: pending.dir==="BUY"?entry-A*SLM:entry+A*SLM,
        tp: pending.dir==="BUY"?entry+A*TPM:entry-A*TPM,
        score:pending.score,
      };
      pending=null;
    }

    // 2) Manage an open trade
    if (openTrade) {
      const t=openTrade;
      let closed=false;
      const ex=checkBarExit(t, candle);                 // SL/TP touch, SL-first tie
      if (ex) { t.exit=ex.exit; t.result=ex.result; closed=true; }
      // POSITION/hold mode: exit a long when the long-term thesis breaks (scorer flips to SELL)
      if (!closed && holdMode && t.dir==="BUY") {
        const sNow=scoreFn(slice);
        if (sNow && sNow.signal==="SELL") {
          t.exit=candle.close;
          t.result = candle.close>=t.entry ? "WIN" : "LOSS";
          closed=true;
        }
      }
      if (closed) {
        t.exitDate=candle.date;
        const net=tradeNet(t.dir, t.entry, t.exit, costPerTrade);
        t.pnl=net.pnl; t.grossPct=net.grossPct; t.pnlPct=net.pnlPct;
        t.barsHeld = i - t.openIndex;
        trades.push(t);
        openTrade=null;
      }
    }

    // 3) Generate a signal on THIS bar's close → queue it for NEXT bar's open
    if (!openTrade && !pending) {
      const r=scoreFn(slice);
      if (r && (r.signal==="BUY"||r.signal==="SELL") && r.atr>0) {
        pending={dir:r.signal, atr:r.atr, score:r.score};
      }
    }
  }

  // Tally results
  const wins=trades.filter(t=>t.result==="WIN");
  const losses=trades.filter(t=>t.result==="LOSS");
  const totalPnlPct=trades.reduce((a,t)=>a+t.pnlPct,0);
  const totalGrossPct=trades.reduce((a,t)=>a+(t.grossPct||t.pnlPct),0);
  const grossWin=wins.reduce((a,t)=>a+t.pnlPct,0);
  const grossLoss=Math.abs(losses.reduce((a,t)=>a+t.pnlPct,0));
  const winRate=trades.length?wins.length/trades.length*100:0;
  const avgWin=wins.length?grossWin/wins.length:0;
  const avgLoss=losses.length?grossLoss/losses.length:0;
  const profitFactor=grossLoss>0?grossWin/grossLoss:(grossWin>0?Infinity:0);
  const expectancy=trades.length?totalPnlPct/trades.length:0;
  const totalCostDrag=totalGrossPct-totalPnlPct;
  // Net-profitable trades (a TP "win" can still be net-negative after costs)
  const netWins=trades.filter(t=>t.pnlPct>0).length;

  // Equity curve (cumulative % return)
  let equity=0;
  const curve=trades.map(t=>{equity+=t.pnlPct; return parseFloat(equity.toFixed(2));});

  // ─── Statistical validation ───
  const rets=trades.map(t=>t.pnlPct);
  const nT=rets.length;
  const mean=nT?rets.reduce((a,b)=>a+b,0)/nT:0;
  const variance=nT?rets.reduce((a,b)=>a+Math.pow(b-mean,2),0)/nT:0;
  const stdDev=Math.sqrt(variance);
  const sharpe=stdDev>0?mean/stdDev:0;               // per-trade Sharpe-like ratio
  // Max drawdown from equity curve
  let peak=0,maxDD=0;
  curve.forEach(eq=>{if(eq>peak)peak=eq;const dd=peak-eq;if(dd>maxDD)maxDD=dd;});
  // Max consecutive losses
  let cl=0,maxConsecLoss=0;
  rets.forEach(x=>{if(x<=0){cl++;if(cl>maxConsecLoss)maxConsecLoss=cl;}else cl=0;});
  // Significance via rough t-stat
  const se=stdDev>0?stdDev/Math.sqrt(nT):0;
  const tStat=se>0?mean/se:0;
  let significance="NOT SIGNIFICANT";
  if(nT<10) significance="TOO FEW TRADES";
  else if(nT>=30&&Math.abs(tStat)>2) significance="SIGNIFICANT";
  else if(nT>=20&&Math.abs(tStat)>1.5) significance="SUGGESTIVE";

  return {
    trades, openTrade,
    stats:{
      total:trades.length, wins:wins.length, losses:losses.length,
      winRate:parseFloat(winRate.toFixed(1)),
      avgWin:parseFloat(avgWin.toFixed(2)),
      avgLoss:parseFloat(avgLoss.toFixed(2)),
      totalReturn:parseFloat(totalPnlPct.toFixed(2)),
      grossReturn:parseFloat(totalGrossPct.toFixed(2)),
      costDrag:parseFloat(totalCostDrag.toFixed(2)),
      netWins,
      profitFactor:profitFactor===Infinity?"∞":parseFloat(profitFactor.toFixed(2)),
      expectancy:parseFloat(expectancy.toFixed(2)),
      sharpe:parseFloat(sharpe.toFixed(2)),
      maxDrawdown:parseFloat(maxDD.toFixed(2)),
      maxConsecLoss,
      stdDev:parseFloat(stdDev.toFixed(2)),
      tStat:parseFloat(tStat.toFixed(2)),
      significance,
    },
    curve,
  };
}

// ─── Buffett-style fundamental VALUE score ──────────────────────────────────
// Grades cheapness + financial health + growth into a composite, the way a
// quantitative value screen would. Covers the SCREENABLE part of value investing
// — NOT the qualitative moat/management judgment that needs reading annual reports.
function valueScore(m){
  if(!m) return null;
  const flags=[], reasons=[];
  let cheap=0, healthy=0, growing=0;
  const num=v=>(v==null||isNaN(v))?null:Number(v);
  const pe=num(m.peTTM), pb=num(m.pbAnnual), de=num(m["totalDebt/totalEquityAnnual"]);
  const roe=num(m.roeTTM), npm=num(m.netProfitMarginTTM), cr=num(m.currentRatioAnnual);
  const revG=num(m.revenueGrowthTTMYoy), epsG=num(m.epsGrowthTTMYoy);

  if(pe!=null){
    if(pe>0&&pe<15){cheap+=2; reasons.push("P/E "+pe.toFixed(1)+" — attractively valued");}
    else if(pe>=15&&pe<25){cheap+=1; reasons.push("P/E "+pe.toFixed(1)+" — fairly valued");}
    else if(pe>=25){cheap-=1; reasons.push("P/E "+pe.toFixed(1)+" — expensive");}
    else if(pe<=0){flags.push("Negative earnings — no positive P/E");}
  }
  if(pb!=null){
    if(pb>0&&pb<1.5){cheap+=2; reasons.push("P/B "+pb.toFixed(2)+" — near/below book value");}
    else if(pb>=1.5&&pb<3){cheap+=1;}
    else if(pb>=5){cheap-=1; reasons.push("P/B "+pb.toFixed(2)+" — pricey vs assets");}
  }
  if(de!=null){
    if(de<0.5){healthy+=2; reasons.push("Debt/equity "+de.toFixed(2)+" — strong balance sheet");}
    else if(de<1){healthy+=1;}
    else if(de>2){healthy-=2; flags.push("High debt/equity "+de.toFixed(2));}
  }
  if(roe!=null){
    if(roe>0.15){healthy+=2; reasons.push("ROE "+(roe*100).toFixed(0)+"% — efficient capital use");}
    else if(roe>0.08){healthy+=1;}
    else if(roe<0){healthy-=2; flags.push("Negative ROE");}
  }
  if(npm!=null){
    if(npm>0.20){healthy+=2; reasons.push("Net margin "+(npm*100).toFixed(0)+"% — highly profitable");}
    else if(npm>0.10){healthy+=1;}
    else if(npm<0){healthy-=2; flags.push("Unprofitable — negative margin");}
  }
  if(cr!=null){
    if(cr>1.5){healthy+=1; reasons.push("Current ratio "+cr.toFixed(1)+" — liquid");}
    else if(cr<1){healthy-=1; flags.push("Current ratio <1 — liquidity risk");}
  }
  if(revG!=null){
    if(revG>0.15){growing+=2; reasons.push("Revenue +"+(revG*100).toFixed(0)+"% — expanding strongly");}
    else if(revG>0.05){growing+=1;}
    else if(revG<0){growing-=1; flags.push("Revenue shrinking");}
  }
  if(epsG!=null){
    if(epsG>0.15){growing+=2; reasons.push("EPS +"+(epsG*100).toFixed(0)+"% — earnings rising");}
    else if(epsG>0){growing+=1;}
    else if(epsG<0){growing-=1;}
  }

  const total=cheap+healthy+growing;
  let grade,verdict;
  if(total>=10){grade="A";verdict="STRONG VALUE — cheap, healthy, and growing. The kind of business a value screen flags for deeper study.";}
  else if(total>=6){grade="B";verdict="GOOD — solid fundamentals with real appeal. Worth a closer look.";}
  else if(total>=2){grade="C";verdict="FAIR — mixed picture. Some strengths, some concerns.";}
  else if(total>=-2){grade="D";verdict="WEAK — limited fundamental appeal at current price.";}
  else{grade="F";verdict="POOR — expensive and/or financially strained. A value investor would likely pass.";}

  const hasData = [pe,pb,de,roe,npm,cr,revG,epsG].some(v=>v!=null);
  return hasData ? {cheap,healthy,growing,total,grade,verdict,reasons,flags} : null;
}

// ─── Company Performance Autopsy — graded categories over valueScore ─────────
// valueScore (above) stays the scoring core. companyAutopsy groups its three
// pillars into letter-graded categories so the thresholds live in ONE place:
// Valuation ← cheapness, Quality ← financial health, Growth ← trajectory.
function letterFromScore(s){ return s>=3?"A":s===2?"B":s>=0?"C":s===-1?"D":"F"; }
function companyAutopsy(m){
  const vs=valueScore(m); if(!vs) return null;
  const has=(...ks)=>ks.some(k=>{const v=m[k];return v!=null&&!isNaN(v);});
  const categories=[
    {name:"VALUATION", score:vs.cheap,   has:has("peTTM","pbAnnual"),                                                                note:"Price vs earnings & book value"},
    {name:"QUALITY",   score:vs.healthy, has:has("totalDebt/totalEquityAnnual","roeTTM","netProfitMarginTTM","currentRatioAnnual"), note:"Returns, margins & balance-sheet strength"},
    {name:"GROWTH",    score:vs.growing, has:has("revenueGrowthTTMYoy","epsGrowthTTMYoy"),                                           note:"Revenue & earnings trajectory"},
  ].map(c=>({...c, grade:c.has?letterFromScore(c.score):null}));
  return {...vs, overall:vs.grade, categories};
}

// ─── Engine conviction modifier — the autopsy as an OVERLAY, not a rewrite ───
// The raw price signal/confidence from analyze() is never touched. This derives
// a SEPARATE "adjusted conviction" the UI shows alongside it. POSITION treats
// the business as the thesis (A/B boost; D/F vetoes a long); TACTICAL only
// nudges — there fundamentals are a context filter, not the trigger.
function convictionModifier(overall, mode, analysis){
  if(!overall||!analysis) return null;
  const base=Math.round(analysis.confidence), sig=analysis.signal, isPos=mode==="position";
  const good=overall<="B", fair=overall==="C";
  let adj=base, note="", capped=false;
  if(isPos){
    if(good){ adj=Math.min(95,base+12); note="Grade-"+overall+" business strengthens the owner's conviction."; }
    else if(fair){ note="Grade C — conviction held; an owner demands a wider margin of safety."; }
    else if(sig==="BUY"){ adj=Math.min(base,30); capped=true; note="Fundamental veto — a grade-"+overall+" business caps long conviction in POSITION mode."; }
    else { note="Grade-"+overall+" business — weak fundamentals; no long thesis to support conviction."; }
  } else {
    if(good){ adj=Math.min(95,base+5); note="Grade-"+overall+" business is a tailwind — small conviction lift."; }
    else if(overall>="D"){ adj=Math.max(20,base-5); note="Grade-"+overall+" business — trim conviction and keep the trade short."; }
    else { note="Grade C — neutral; trade the signal on its own merits."; }
  }
  adj=Math.round(adj);
  return {adjConfidence:adj, base, delta:adj-base, note, capped};
}

// ─── Phase-2 merit fusion — gated, bounded, and OFF until evidence earns it ───
// Unlike convictionModifier (which only nudges CONFIDENCE), this may change the
// SIGNAL itself — but ONLY when BOTH gates are open: the fundamentals are
// user-verified AND the cross-sectional study established a real, OOS-consistent
// merit→return edge (study.json → meritEdgeProven). Until then it is a no-op, so
// the trade signal stays purely technical and the price-only backtest that gates
// everything is never contaminated. Bounded to one defensible step: verified-weak
// fundamentals veto a long; a verified grade-A business can lift a neutral price
// signal to a long in the owner's (POSITION) lens. Never invents a short, never
// overrides a price SELL.
function fuseMerit(rawSignal, grade, mode, gates){
  const g=gates||{};
  if(!g.verified || !g.edgeProven){
    return {signal:rawSignal, changed:false, active:false,
      reason: !g.edgeProven
        ? "Merits gated out — the evidence harness hasn't established a forward-return edge, so the signal is price-only."
        : "Merits gated out — these fundamentals aren't verified yet (AUTOPSY tab)."};
  }
  if(!grade) return {signal:rawSignal, changed:false, active:true, reason:"Edge established, but no fundamentals to fuse for this name."};
  let signal=rawSignal, reason="Verified merits are consistent with the price signal.";
  if(rawSignal==="BUY" && grade>="D"){
    signal="HOLD"; reason="Verified weak fundamentals (grade "+grade+") veto the long — the business doesn't back the breakout.";
  } else if(mode==="position" && rawSignal==="HOLD" && grade==="A"){
    signal="BUY"; reason="Verified grade-A business lifts a neutral price signal to a long (owner's lens, edge established).";
  }
  return {signal, changed:signal!==rawSignal, active:true, reason};
}

// ─── Valuation anchor — Graham-number margin of safety (transparent) ──────────
// Intrinsic ≈ √(22.5 · EPS · BVPS) (Graham's rule of thumb). With P/E and P/B
// already in hand, intrinsic/price reduces to √(22.5 / (P/E · P/B)), so the
// margin of safety needs no extra inputs. mosPct > 0 ⇒ price below fair value.
function valuationAnchor(m){
  if(!m) return null;
  const num=v=>(v==null||isNaN(v))?null:Number(v);
  const pe=num(m.peTTM), pb=num(m.pbAnnual);
  if(!(pe>0)||!(pb>0)) return null;
  const intrinsicOverPrice=Math.sqrt(22.5/(pe*pb));
  const mosPct=(1 - 1/intrinsicOverPrice)*100;
  const verdict = mosPct>=25?"DEEP DISCOUNT" : mosPct>=0?"BELOW FAIR VALUE" : mosPct>=-25?"ABOVE FAIR VALUE" : "RICHLY PRICED";
  return {intrinsicOverPrice, mosPct, verdict};
}

// ─── Fundamentals from the precomputed SEC database ──────────────────────────
// SEC EDGAR is the authoritative source (figures filed under oath in 10-K/10-Q),
// but a browser can't fetch it directly (CORS). So a nightly GitHub Action pulls
// and distills it SERVER-SIDE into fundamentals.json (see scripts/), which this
// app reads same-origin — instant, no key, no proxy. The JSON holds the
// price-INDEPENDENT figures; we derive P/E and P/B here from the live price, so
// the ratios stay current between nightly runs. Shaped exactly like the former
// fetchFundamentals return ({map, meta}), so call sites and rendering are intact.
function fundamentalsFor(sym, market, price, db){
  if(market!=="Stocks"){
    return {meta:{ok:false,skip:true,msg:market==="ETFs"?"ETFs are funds — they don't file company income statements, so a P/E-style grade doesn't apply.":market+" has no company filings — the VALUE grade applies to US-listed stocks."}};
  }
  if(!db) return {meta:{ok:false,msg:"The fundamentals database hasn't loaded yet — try again in a moment, or enter the numbers manually using the verify links."}};
  const rec=db[sym];
  if(!rec) return {meta:{ok:false,msg:"\""+sym+"\" isn't in the precomputed set yet. Add it to scripts/tickers.txt (the nightly job picks it up), or enter the numbers manually using the verify links."}};
  const map={}, put=(k,v)=>{ if(v!=null&&isFinite(v)) map[k]=String(+(+v).toFixed(4)); };
  const n=v=>(v==null||isNaN(v))?null:Number(v);
  const eps=n(rec.epsTTM), bvps=n(rec.bvps);
  if(price>0&&eps>0)  put("peTTM", price/eps);          // live price ÷ filed TTM EPS
  if(price>0&&bvps>0) put("pbAnnual", price/bvps);      // live price ÷ filed book value/share
  put("totalDebt/totalEquityAnnual", n(rec.de));
  put("roeTTM", n(rec.roe));
  put("netProfitMarginTTM", n(rec.npm));
  put("currentRatioAnnual", n(rec.cr));
  put("revenueGrowthTTMYoy", n(rec.revG));
  put("epsGrowthTTMYoy", n(rec.epsG));
  const filled=Object.keys(map).length;
  if(!filled) return {meta:{ok:false,msg:"No usable precomputed figures for "+sym+" yet. Enter the numbers manually using the verify links."}};
  return {map, meta:{ok:true,source:"SEC EDGAR",entity:rec.entity||sym,cik:rec.cik,asof:rec.asof||null,basis:rec.basis||"TTM",precomputed:true,when:new Date().toLocaleTimeString(),filled,sym}};
}

// ─── Formatting ────────────────────────────────────────────────────────────
function fmt(v,dec) {
  if(v==null||isNaN(v)) return "—";
  const d=dec!=null?dec:Math.abs(v)>=100?2:4;
  return "$"+Number(v).toFixed(d);
}

// ─── Candlestick Chart ─────────────────────────────────────────────────────
function Chart({rows,analysis,muted}) {
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current; if(!cv||rows.length<2) return;
    const ctx=cv.getContext("2d"),W=cv.width,H=cv.height;
    const PAD={l:58,r:10,t:12,b:24},cH=(H-PAD.t-PAD.b)*0.72,vH=(H-PAD.t-PAD.b)*0.2,gap=(H-PAD.t-PAD.b)*0.08;
    ctx.clearRect(0,0,W,H);
    const n=Math.min(rows.length,80),data=rows.slice(-n);
    const hi=Math.max(...data.map(d=>d.high)),lo=Math.min(...data.map(d=>d.low)),rng=hi-lo||1;
    const maxVol=Math.max(...data.map(d=>d.volume))||1;
    const cw=(W-PAD.l-PAD.r)/n;
    const toX=i=>PAD.l+i*cw+cw/2;
    const toY=v=>PAD.t+(1-(v-lo)/rng)*cH;
    const vBase=PAD.t+cH+gap+vH;
    const toVY=v=>vBase-Math.max((v/maxVol)*vH,1);
    // Background
    ctx.fillStyle="#080b14"; ctx.fillRect(0,0,W,H);
    // Grid
    [0,.25,.5,.75,1].forEach(f=>{
      const price=lo+rng*(1-f),y=PAD.t+f*cH;
      ctx.strokeStyle="#1a2035"; ctx.lineWidth=.5;
      ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
      ctx.fillStyle="#37474f";ctx.font="9px monospace";ctx.textAlign="right";
      ctx.fillText(price>=100?price.toFixed(2):price.toFixed(4),PAD.l-3,y+3);
    });
    // SMAs
    const closes=data.map(d=>d.close);
    [[5,"#ffd74099"],[10,"#00bcd499"],[20,"#e040fb99"]].forEach(([p,col])=>{
      const per=parseInt(p); if(closes.length<per) return;
      ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=1.2;let first=true;
      data.forEach((d,i)=>{
        if(i<per-1)return;
        const v=closes.slice(i-per+1,i+1).reduce((a,b)=>a+b,0)/per;
        first?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v));first=false;
      });ctx.stroke();
    });
    // SFA12 tracker line — composite of SMA5/10/20, color-coded by trend state.
    // series[] holds GLOBAL indices (starting at c30); map to the visible window
    // exactly like the ANALYSIS-START marker so the line begins at that point.
    {
      const sfa12=analysis?.sfa12;
      if(sfa12?.series?.length){
        const offset=rows.length-n;
        const sfaCol=sfa12.state==="UPTREND"?"#00e676":sfa12.state==="DOWNTREND"?"#ff5252":"#ffd740";
        ctx.beginPath();ctx.strokeStyle=sfaCol;ctx.lineWidth=2.4;
        ctx.shadowColor=sfaCol;ctx.shadowBlur=6;
        let first=true,lastPt=null;
        sfa12.series.forEach(pt=>{
          const vi=pt.i-offset; if(vi<0||vi>=n) return;
          const x=toX(vi),y=toY(pt.value);
          first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;lastPt={x,y};
        });
        ctx.stroke();ctx.shadowBlur=0;
        if(lastPt){
          ctx.fillStyle=sfaCol;ctx.font="bold 9px monospace";ctx.textAlign="left";
          ctx.fillText("SFA12",lastPt.x+4,lastPt.y-4);
        }
      }
    }
    // BB bands
    const bbV=analysis?.indicators?.bb?.v;
    if(bbV){
      [bbV.upper,bbV.middle,bbV.lower].forEach((v,i)=>{
        ctx.beginPath();ctx.strokeStyle=i===1?"#546e7a55":"#546e7a33";
        ctx.setLineDash(i===1?[4,4]:[]); ctx.lineWidth=.8;
        ctx.moveTo(PAD.l,toY(v));ctx.lineTo(W-PAD.r,toY(v));ctx.stroke();
        ctx.setLineDash([]);
      });
    }
    // Candles
    data.forEach((d,i)=>{
      const up=d.close>=d.open,col=up?"#00e676":"#ff5252",x=toX(i);
      const bt=toY(Math.max(d.open,d.close)),bb_=toY(Math.min(d.open,d.close));
      ctx.strokeStyle=col;ctx.lineWidth=.8;
      ctx.beginPath();ctx.moveTo(x,toY(d.high));ctx.lineTo(x,toY(d.low));ctx.stroke();
      ctx.fillStyle=up?"#00e676":"#cc3333";
      ctx.fillRect(x-cw*.38,bt,cw*.76,Math.max(bb_-bt,1));
      if(!up){ctx.strokeStyle="#ff5252";ctx.lineWidth=.5;ctx.strokeRect(x-cw*.38,bt,cw*.76,Math.max(bb_-bt,1));}
    });
    // Entry/SL lines
    if(analysis){
      [[analysis.entry,"#00bcd4","ENTRY"],[analysis.sl,"#ff5252","SL"],[analysis.tp1,"#00e676","TP1"]].forEach(([v,col,lbl])=>{
        if(!v||v<lo||v>hi) return;
        ctx.beginPath();ctx.strokeStyle=col+"cc";ctx.lineWidth=1;ctx.setLineDash([5,4]);
        ctx.moveTo(PAD.l,toY(v));ctx.lineTo(W-PAD.r,toY(v));ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle=col;ctx.font="bold 8px monospace";ctx.textAlign="left";
        ctx.fillText(lbl,PAD.l+2,toY(v)-2);
      });
    }
    // Labeled SUPPORT / RESISTANCE lines (strong levels)
    if(analysis&&analysis.levels){
      const strongSup=analysis.levels.find(l=>l.type==="SUPPORT"&&l.strength==="STRONG");
      const strongRes=analysis.levels.find(l=>l.type==="RESISTANCE"&&l.strength==="STRONG");
      if(strongRes&&strongRes.price>=lo&&strongRes.price<=hi){
        const y=toY(strongRes.price);
        ctx.beginPath();ctx.strokeStyle="#ff5252";ctx.lineWidth=1.4;ctx.setLineDash([2,2]);
        ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle="#ff5252";ctx.font="bold 9px monospace";ctx.textAlign="right";
        ctx.fillText("RESISTANCE "+fmt(strongRes.price),W-PAD.r-2,y-3);
      }
      if(strongSup&&strongSup.price>=lo&&strongSup.price<=hi){
        const y=toY(strongSup.price);
        ctx.beginPath();ctx.strokeStyle="#00e676";ctx.lineWidth=1.4;ctx.setLineDash([2,2]);
        ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle="#00e676";ctx.font="bold 9px monospace";ctx.textAlign="right";
        ctx.fillText("SUPPORT "+fmt(strongSup.price),W-PAD.r-2,y+11);
      }
    }
    // Candle-30 "analysis starts" vertical marker
    // The backtest begins at index 30 of the FULL dataset; map that to the visible window.
    {
      const fullLen=rows.length;
      const startIdx=30;
      if(fullLen>startIdx){
        // visible window shows the last n candles; find where index 30 falls
        const offset=fullLen-n; // how many candles trimmed from the front
        const visibleIdx=startIdx-offset;
        if(visibleIdx>=0&&visibleIdx<n){
          const x=toX(visibleIdx);
          ctx.beginPath();ctx.strokeStyle="#ffa726";ctx.lineWidth=1;ctx.setLineDash([3,3]);
          ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+cH);ctx.stroke();ctx.setLineDash([]);
          ctx.fillStyle="#ffa726";ctx.font="bold 8px monospace";ctx.textAlign="left";
          ctx.fillText("◀ ANALYSIS START (c30)",x+3,PAD.t+10);
        }
      }
    }
    // Latest-signal marker on the most recent candle
    if(analysis){
      const li=data.length-1;
      const d=data[li];
      const x=toX(li);
      const sig=analysis.signal;
      // Muted when the backtested edge isn't established — the chart shouldn't
      // scream BUY in green when the strategy has no demonstrated edge here.
      const col=muted?"#90a4ae":(sig==="BUY"?"#00e676":sig==="SELL"?"#ff5252":"#ffa726");
      // Glow ring around the last candle's body
      const bt=toY(Math.max(d.open,d.close)),bbm=toY(Math.min(d.open,d.close));
      ctx.strokeStyle=col;ctx.lineWidth=2;
      ctx.strokeRect(x-cw*.5,bt-3,cw,(bbm-bt)+6);
      // Marker symbol + label
      ctx.fillStyle=col;ctx.font="bold 11px monospace";ctx.textAlign="center";
      if(sig==="BUY"){
        ctx.fillText("▲ BUY",x,toY(d.high)-14);
        ctx.fillText("$$$",x,toY(d.high)-4);
      } else if(sig==="SELL"){
        ctx.fillText("▼ SELL",x,toY(d.low)+22);
        ctx.fillText("$$$",x,toY(d.low)+12);
      } else {
        ctx.fillText("◆ HOLD",x,toY(d.high)-6);
      }
    }
    // Volume
    data.forEach((d,i)=>{
      ctx.fillStyle=d.close>=d.open?"rgba(0,230,118,0.4)":"rgba(255,82,82,0.35)";
      const bh=Math.max((d.volume/maxVol)*vH,1);
      ctx.fillRect(toX(i)-cw*.38,vBase-bh,cw*.76,bh);
    });
    // VOL label
    ctx.fillStyle="#37474f";ctx.font="8px monospace";ctx.textAlign="left";
    ctx.fillText("VOL",PAD.l+2,PAD.t+cH+gap+8);
    // X axis dates
    ctx.fillStyle="#2a3a4a";ctx.font="8px monospace";ctx.textAlign="center";
    const step=Math.max(1,Math.floor(n/6));
    data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.date?.slice(5)||"",toX(i),H-4);});
  },[rows,analysis,muted]);
  return <canvas ref={ref} width={820} height={260} style={{width:"100%",height:260,display:"block"}}/>;
}

function Badge({signal,muted}) {
  const m={BUY:["#00e676","rgba(0,230,118,0.12)","▲"],SELL:["#ff5252","rgba(255,82,82,0.12)","▼"],HOLD:["#ffd740","rgba(255,215,64,0.12)","◆"]};
  const s=(signal||"HOLD").toUpperCase();let[col,bg,icon]=m[s]||m.HOLD;
  // Transparency rule: a verdict earns its loud color only when the edge behind
  // it is at least suggestive. Otherwise it shows the call, muted, not as a green light.
  if(muted){col="#90a4ae";bg="rgba(144,164,174,0.10)";}
  return <span style={{color:col,background:bg,border:"1px solid "+col+"55",padding:"5px 20px",borderRadius:4,fontSize:16,fontWeight:700,letterSpacing:3}}>{icon} {s}</span>;
}

// Equity curve mini-chart for backtest results
function EquityCurve({curve}) {
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current; if(!cv||!curve||curve.length<2) return;
    const dpr=window.devicePixelRatio||1, W=cv.offsetWidth, H=140;
    cv.width=W*dpr; cv.height=H*dpr; cv.style.height=H+"px";
    const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
    const PAD={l:46,r:10,t:12,b:18};
    ctx.fillStyle="#060810"; ctx.fillRect(0,0,W,H);
    const pts=[0,...curve];
    const max=Math.max(...pts,0.5), min=Math.min(...pts,-0.5), rng=max-min||1;
    const cw=(W-PAD.l-PAD.r)/(pts.length-1);
    const toX=i=>PAD.l+i*cw;
    const toY=v=>PAD.t+(1-(v-min)/rng)*(H-PAD.t-PAD.b);
    // Zero line
    const zeroY=toY(0);
    ctx.strokeStyle="#546e7a55"; ctx.lineWidth=.5; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(PAD.l,zeroY); ctx.lineTo(W-PAD.r,zeroY); ctx.stroke(); ctx.setLineDash([]);
    // Grid labels
    ctx.fillStyle="#37474f"; ctx.font="9px monospace"; ctx.textAlign="right";
    ctx.fillText(max.toFixed(1)+"%",PAD.l-3,PAD.t+4);
    ctx.fillText("0%",PAD.l-3,zeroY+3);
    ctx.fillText(min.toFixed(1)+"%",PAD.l-3,H-PAD.b);
    // Area fill
    const ends=curve[curve.length-1]>=0;
    const grad=ctx.createLinearGradient(0,PAD.t,0,H-PAD.b);
    grad.addColorStop(0, ends?"rgba(0,230,118,0.25)":"rgba(255,82,82,0.25)");
    grad.addColorStop(1,"rgba(0,0,0,0)");
    ctx.beginPath(); ctx.moveTo(toX(0),toY(pts[0]));
    pts.forEach((v,i)=>ctx.lineTo(toX(i),toY(v)));
    ctx.lineTo(toX(pts.length-1),zeroY); ctx.lineTo(toX(0),zeroY); ctx.closePath();
    ctx.fillStyle=grad; ctx.fill();
    // Line
    ctx.beginPath(); ctx.moveTo(toX(0),toY(pts[0]));
    pts.forEach((v,i)=>ctx.lineTo(toX(i),toY(v)));
    ctx.strokeStyle=ends?"#00e676":"#ff5252"; ctx.lineWidth=1.8; ctx.stroke();
    // X label
    ctx.fillStyle="#37474f"; ctx.font="8px monospace"; ctx.textAlign="center";
    ctx.fillText("Trade #"+curve.length,W/2,H-4);
  },[curve]);
  return <canvas ref={ref} style={{width:"100%",height:140,display:"block"}}/>;
}

// ─── Replay chart ───────────────────────────────────────────────────────────
// Draws the candle window ENDING at `upTo`, so dragging the timeline scrubs the
// chart through history. Overlays the signal that fired at the current bar (from
// the precomputed `series`) and any trade entries/exits/levels up to that bar —
// no lookahead: nothing past `upTo` is ever drawn.
function ReplayChart({rows,upTo,series,trades}) {
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current; if(!cv||rows.length<2) return;
    const ctx=cv.getContext("2d"),W=cv.width,H=cv.height;
    const PAD={l:58,r:10,t:12,b:24},cH=(H-PAD.t-PAD.b)*0.72,vH=(H-PAD.t-PAD.b)*0.2,gap=(H-PAD.t-PAD.b)*0.08;
    ctx.clearRect(0,0,W,H);
    const end=Math.max(1,Math.min(upTo,rows.length-1));
    const n=Math.min(end+1,80);
    const off=end+1-n;                 // global index of the first visible candle
    const data=rows.slice(off,end+1);
    const hi=Math.max(...data.map(d=>d.high)),lo=Math.min(...data.map(d=>d.low)),rng=hi-lo||1;
    const maxVol=Math.max(...data.map(d=>d.volume))||1;
    const cw=(W-PAD.l-PAD.r)/n;
    const toX=i=>PAD.l+i*cw+cw/2;       // i is a VISIBLE index
    const gX=g=>toX(g-off);             // g is a GLOBAL index
    const toY=v=>PAD.t+(1-(v-lo)/rng)*cH;
    const vBase=PAD.t+cH+gap+vH;
    // Background + grid
    ctx.fillStyle="#080b14"; ctx.fillRect(0,0,W,H);
    [0,.25,.5,.75,1].forEach(f=>{
      const price=lo+rng*(1-f),y=PAD.t+f*cH;
      ctx.strokeStyle="#1a2035"; ctx.lineWidth=.5;
      ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
      ctx.fillStyle="#37474f";ctx.font="9px monospace";ctx.textAlign="right";
      ctx.fillText(price>=100?price.toFixed(2):price.toFixed(4),PAD.l-3,y+3);
    });
    // SMAs
    const closes=data.map(d=>d.close);
    [[5,"#ffd74099"],[10,"#00bcd499"],[20,"#e040fb99"]].forEach(([p,col])=>{
      const per=parseInt(p); if(closes.length<per) return;
      ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=1.2;let first=true;
      data.forEach((d,i)=>{
        if(i<per-1)return;
        const v=closes.slice(i-per+1,i+1).reduce((a,b)=>a+b,0)/per;
        first?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v));first=false;
      });ctx.stroke();
    });
    // Active trade (open at the current bar) → draw entry / SL / TP levels
    const active=trades.find(t=>t.entryIdx<=end&&end<t.exitIdx);
    if(active){
      [[active.entry,"#00bcd4","ENTRY"],[active.sl,"#ff5252","SL"],[active.tp,"#00e676","TP"]].forEach(([v,col,lbl])=>{
        if(v<lo||v>hi) return;
        ctx.beginPath();ctx.strokeStyle=col+"cc";ctx.lineWidth=1;ctx.setLineDash([5,4]);
        ctx.moveTo(PAD.l,toY(v));ctx.lineTo(W-PAD.r,toY(v));ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle=col;ctx.font="bold 8px monospace";ctx.textAlign="left";
        ctx.fillText(lbl,PAD.l+2,toY(v)-2);
      });
    }
    // Candles
    data.forEach((d,i)=>{
      const up=d.close>=d.open,col=up?"#00e676":"#ff5252",x=toX(i);
      const bt=toY(Math.max(d.open,d.close)),bb_=toY(Math.min(d.open,d.close));
      ctx.strokeStyle=col;ctx.lineWidth=.8;
      ctx.beginPath();ctx.moveTo(x,toY(d.high));ctx.lineTo(x,toY(d.low));ctx.stroke();
      ctx.fillStyle=up?"#00e676":"#cc3333";
      ctx.fillRect(x-cw*.38,bt,cw*.76,Math.max(bb_-bt,1));
    });
    // Trade entry / exit markers that have happened within the visible window
    trades.forEach(t=>{
      if(t.entryIdx>=off&&t.entryIdx<=end){
        const x=gX(t.entryIdx),d=rows[t.entryIdx];
        const col=t.dir==="BUY"?"#00e676":"#ff5252";
        ctx.fillStyle=col;ctx.font="bold 10px monospace";ctx.textAlign="center";
        t.dir==="BUY"?ctx.fillText("▲",x,toY(d.low)+13):ctx.fillText("▼",x,toY(d.high)-6);
      }
      if(t.exitIdx>=off&&t.exitIdx<=end&&t.exitIdx<=rows.length-1){
        const x=gX(t.exitIdx),d=rows[t.exitIdx];
        const col=t.result==="WIN"?"#00e676":"#ff5252";
        ctx.fillStyle=col;ctx.font="9px monospace";ctx.textAlign="center";
        ctx.fillText("✕",x,toY((d.high+d.low)/2));
      }
    });
    // Current-bar marker + the signal that fired there
    {
      const li=data.length-1,d=data[li],x=toX(li);
      const sg=series&&series[end];
      const sig=sg?sg.signal:"HOLD";
      const col=sig==="BUY"?"#00e676":sig==="SELL"?"#ff5252":"#ffa726";
      const bt=toY(Math.max(d.open,d.close)),bbm=toY(Math.min(d.open,d.close));
      ctx.strokeStyle=col;ctx.lineWidth=2;
      ctx.strokeRect(x-cw*.5,bt-3,cw,(bbm-bt)+6);
      ctx.fillStyle=col;ctx.font="bold 10px monospace";ctx.textAlign="center";
      if(sig==="BUY")      ctx.fillText("▲ BUY",x,toY(d.high)-6);
      else if(sig==="SELL")ctx.fillText("▼ SELL",x,toY(d.low)+20);
      else                 ctx.fillText("◆",x,toY(d.high)-6);
      // Vertical "now" line
      ctx.strokeStyle=col+"55";ctx.lineWidth=.8;ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+cH);ctx.stroke();ctx.setLineDash([]);
    }
    // Volume
    data.forEach((d,i)=>{
      ctx.fillStyle=d.close>=d.open?"rgba(0,230,118,0.4)":"rgba(255,82,82,0.35)";
      const bh=Math.max((d.volume/maxVol)*vH,1);
      ctx.fillRect(toX(i)-cw*.38,vBase-bh,cw*.76,bh);
    });
    ctx.fillStyle="#37474f";ctx.font="8px monospace";ctx.textAlign="left";
    ctx.fillText("VOL",PAD.l+2,PAD.t+cH+gap+8);
    // X axis dates
    ctx.fillStyle="#2a3a4a";ctx.font="8px monospace";ctx.textAlign="center";
    const step=Math.max(1,Math.floor(n/6));
    data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.date?.slice(5)||"",toX(i),H-4);});
  },[rows,upTo,series,trades]);
  return <canvas ref={ref} width={820} height={300} style={{width:"100%",height:300,display:"block"}}/>;
}
