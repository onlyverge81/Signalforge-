            </span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginTop:14}}>
            {[
              {l:"OUT-OF-SAMPLE IC",v:(H.oos.outSample.meanIC>=0?"+":"")+H.oos.outSample.meanIC,s:H.oos.outSample.verdict+" · n="+H.oos.outSample.n,c:vCol(H.oos.outSample.verdict)},
              {l:"IN-SAMPLE IC",v:(H.oos.inSample.meanIC>=0?"+":"")+H.oos.inSample.meanIC,s:H.oos.inSample.verdict+" · n="+H.oos.inSample.n,c:vCol(H.oos.inSample.verdict)},
              {l:"PLACEBO (shuffled)",v:(H.placebo.meanIC>=0?"+":"")+H.placebo.meanIC,s:placeboOk?"null — as it should be":"⚠ still fires",c:placeboOk?"#00e676":"#ff5252"},
              {l:"TOP−BOTTOM SPREAD",v:pctOrDash(H.spread.mean),s:H.spread.verdict,c:vCol(H.spread.verdict)},
              {l:"WALK-FORWARD HIT",v:wf.hitRate==null?"—":(wf.hitRate*100).toFixed(0)+"%",s:(wf.oofVerdict||"—")+" · "+(wf.folds||0)+" folds",c:wf.hitRate>0.5?"#00e676":"#90a4ae"},
              {l:"DEFLATED t",v:df.tDeflated==null?"—":df.tDeflated,s:(df.verdict||"—")+(df.trials>1?" · "+df.trials+" trials":""),c:vCol(df.verdict)},
              // Sector-neutral IC — alpha vs disguised sector bet. Only shown once the study carries
              // sector tags (built once the weekly run resolves SIC divisions); else gracefully hidden.
              ...((sc=>sc&&sc.available?[{l:"SECTOR-NEUTRAL IC",v:(sc.meanIC>=0?"+":"")+sc.meanIC,
                s:sc.verdict+(sc.retention!=null?" · keeps "+Math.round(sc.retention*100)+"%":""),
                c:/^SURVIVES/.test(sc.verdict)?"#00e676":/^PARTLY/.test(sc.verdict)?"#ffd740":"#ff5252"}]:[])(H.sectorControl)),
            ].map(x=>(
              <div key={x.l} style={{background:"#060810",padding:12,borderRadius:4}}>
                <div style={{fontSize:9,color:DIM,letterSpacing:1,marginBottom:4}}>{x.l}</div>
                <div style={{fontSize:16,fontWeight:700,color:x.c}}>{x.v}</div>
                <div style={{fontSize:9,color:FADE,marginTop:2}}>{x.s}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:12,padding:12,background:"#060810",borderRadius:4,fontSize:11,color:"#90a4ae",lineHeight:1.9}}>
            {proven?copy.provenNote:copy.notProvenNote}
          </div>
        </div>

        <div style={card}>
          <span style={lbl}>{copy.perPeriodLabel}</span>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
              <thead><tr style={{color:DIM,textAlign:"left"}}>

              <tbody>

                    <td style={{padding:"6px 8px",color:p.ic>=0?"#00e676":"#ff5252"}}>{p.ic>=0?"+":""}{p.ic}</td>

          {six&&six!==H&&(

          </div>
          )}
        </div>

        <div style={{...card,border:"1px solid rgba(255,215,64,0.20)"}}>
          <span style={{...lbl,color:"#ffd740"}}>⚠ READ THIS BEFORE TRUSTING THE VERDICT</span>
          {(s.caveats||[]).map((c,i)=>(
            <div key={i} style={{fontSize:10,color:"#90a4ae",lineHeight:1.7,marginBottom:4}}>○ {c}</div>
          ))}
          <div style={{fontSize:9,color:FADE,marginTop:6}}>

          </div>
        </div>
      </>
    );
  };

  return (

          <>

              <div style={{display:"flex",gap:10,marginBottom:12}}>

            {streaming&&<div style={{textAlign:"center",fontSize:10,marginTop:6,color:DIM}}>Streaming Polygon minute bars (delayed cluster) — the badge below shows true freshness; real-time needs a Developer+ tier.</div>}
            {liveMeta&&<div style={{textAlign:"center",fontSize:10,marginTop:10}}><span style={{color:"#00e676"}}>✓ {liveMeta.sym} · {RES_LABEL[liveMeta.resolution]||liveMeta.resolution} · {liveMeta.count} candles · {liveMeta.when} · {liveMeta.provider}</span>{liveFreshness&&liveFreshness.band&&<span style={{color:freshnessColor(liveFreshness.band),marginLeft:6}}>· {freshnessLabel(liveFreshness)}</span>}</div>}
            {liveMeta&&liveFreshness&&liveFreshness.provider==="Polygon"&&liveFreshness.price!=null&&(

                {liveFreshness.lastTs&&<span style={{color:DIM,marginLeft:6,fontSize:10}}>· last trade {new Date(liveFreshness.lastTs).toLocaleTimeString("en-US",{timeZone:"America/New_York",hour:"2-digit",minute:"2-digit",second:"2-digit"})} ET</span>}
                <span style={{color:freshnessColor(liveFreshness.band),marginLeft:6,fontSize:10}}>· {freshnessLabel(liveFreshness)}</span>
              </div>
            )}
            {liveMeta&&liveFreshness&&liveFreshness.provider==="Twelve Data"&&(

                  <div style={{fontSize:13,fontWeight:700,color:mode==="tactical"?"#00e676":"#90a4ae"}}>⚡ TACTICAL</div>
                  <div style={{fontSize:9,color:"#546e7a",lineHeight:1.6,marginTop:4}}>Active short-term trading. All indicators, tight stops, many signals, quick exits.</div>

                <button onClick={()=>setMode("position")} style={{textAlign:"left",padding:12,borderRadius:6,cursor:"pointer",background:mode==="position"?"rgba(0,188,212,0.08)":"#060810",border:"1px solid "+(mode==="position"?"#00bcd4":"#1a2035")}}>
                  <div style={{fontSize:13,fontWeight:700,color:mode==="position"?"#00bcd4":"#90a4ae"}}>🐢 POSITION</div>

                  </div>
                  <input type="range" min="0.5" max="5" step="0.1" value={tpMult}
                    onChange={e=>setTpMult(parseFloat(e.target.value))}

                </div>
              </div>
              <div style={{marginTop:10,fontSize:10,color:DIM,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                <span>RISK/REWARD RATIO: <span style={{color:"#ffd740",fontWeight:700}}>1 : {(tpMult/slMult).toFixed(2)}</span></span>
                <span style={{color:FADE}}>Higher TP = bigger but rarer wins · Tighter SL = quicker exits</span>
              </div>
              <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>
                <button style={{...pill(slMult===1.0&&tpMult===2.0),marginBottom:0}} onClick={()=>{setSlMult(1.0);setTpMult(2.0);}}>Conservative 1:2</button>
                <button style={{...pill(slMult===1.5&&tpMult===2.0),marginBottom:0}} onClick={()=>{setSlMult(1.5);setTpMult(2.0);}}>Balanced 1:1.3</button>
                <button style={{...pill(slMult===1.5&&tpMult===3.0),marginBottom:0}} onClick={()=>{setSlMult(1.5);setTpMult(3.0);}}>Runner 1:2</button>

              </div>
            </div>
            <div style={{...card,background:"rgba(0,188,212,0.04)",border:"1px solid rgba(0,188,212,0.2)"}}>
              <span style={lbl}>DATA SOURCE</span>

                Market data is pulled live from <b style={{color:"#00bcd4"}}>Polygon</b> on the <b style={{color:"#00e676"}}>⚡ LIVE</b> tab.
                Fetch there, then return here to tune mode / strategy / risk and press <b>RUN</b> to re-analyze.
              </div>

                  </div>
                )}

                {/* Summary stats */}
                <div style={{...card,background:"linear-gradient(135deg,#0e1320,#0b1025)"}}>
                  <span style={lbl}>⟲ BACKTEST RESULTS · {ticker} · {rows.length} candles · {strategy}</span>
                  <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap",marginBottom:8,padding:"10px 12px",background:"#060810",borderRadius:4}}>
                    <span style={{fontSize:9,color:DIM,letterSpacing:1}}>RE-TUNE:</span>
                    <label style={{fontSize:10,color:"#ff5252",display:"flex",alignItems:"center",gap:6}}>
                      SL {slMult.toFixed(1)}×
                      <input type="range" min="0.5" max="3" step="0.1" value={slMult} onChange={e=>{const v=parseFloat(e.target.value);setSlMult(v);run(v,tpMult,{slip:slipPct,comm:commPct});}} style={{accentColor:"#ff5252",width:90}}/>
                    </label>
                    <label style={{fontSize:10,color:"#00e676",display:"flex",alignItems:"center",gap:6}}>
                      TP {tpMult.toFixed(1)}×
                      <input type="range" min="0.5" max="5" step="0.1" value={tpMult} onChange={e=>{const v=parseFloat(e.target.value);setTpMult(v);run(slMult,v,{slip:slipPct,comm:commPct});}} style={{accentColor:"#00e676",width:90}}/>
                    </label>
                    <span style={{fontSize:10,color:"#ffd740",fontWeight:700}}>R/R 1:{(tpMult/slMult).toFixed(2)}</span>
                  </div>
                  <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap",marginBottom:14,padding:"10px 12px",background:"#060810",borderRadius:4}}>
                    <span style={{fontSize:9,color:DIM,letterSpacing:1}}>COSTS:</span>
                    <label style={{fontSize:10,color:"#ff8a80",display:"flex",alignItems:"center",gap:6}}>
                      SLIPPAGE {slipPct.toFixed(2)}%/side
                      <input type="range" min="0" max="0.3" step="0.01" value={slipPct} onChange={e=>{const v=parseFloat(e.target.value);setSlipPct(v);run(slMult,tpMult,{slip:v,comm:commPct});}} style={{accentColor:"#ff8a80",width:90}}/>
                    </label>
                    <label style={{fontSize:10,color:"#ffb74d",display:"flex",alignItems:"center",gap:6}}>
                      COMMISSION {commPct.toFixed(2)}%/side
                      <input type="range" min="0" max="0.2" step="0.01" value={commPct} onChange={e=>{const v=parseFloat(e.target.value);setCommPct(v);run(slMult,tpMult,{slip:slipPct,comm:v});}} style={{accentColor:"#ffb74d",width:90}}/>
                    </label>
                    <span style={{fontSize:9,color:FADE}}>round-trip cost: {((slipPct+commPct)*2).toFixed(2)}%/trade</span>
                  </div>
                  {/* Cost presets */}
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
                    <button style={{...pill(slipPct===0&&commPct===0),marginBottom:0}} onClick={()=>{setSlipPct(0);setCommPct(0);run(slMult,tpMult,{slip:0,comm:0});}}>Zero (ideal)</button>
                    <button style={{...pill(slipPct===0.02&&commPct===0),marginBottom:0}} onClick={()=>{setSlipPct(0.02);setCommPct(0);run(slMult,tpMult,{slip:0.02,comm:0});}}>Retail stock</button>
                    <button style={{...pill(slipPct===0.05&&commPct===0.01),marginBottom:0}} onClick={()=>{setSlipPct(0.05);setCommPct(0.01);run(slMult,tpMult,{slip:0.05,comm:0.01});}}>Typical retail</button>
                    <button style={{...pill(slipPct===0.08&&commPct===0.02),marginBottom:0}} onClick={()=>{setSlipPct(0.08);setCommPct(0.02);run(slMult,tpMult,{slip:0.08,comm:0.02});}}>Forex/CFD</button>
                  </div>
                  {/* Gross vs Net headline */}
                  {backtest.stats.total>0&&(
                    <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
                      <div style={{flex:1,minWidth:130,background:"#060810",padding:12,borderRadius:4,borderLeft:"3px solid #546e7a"}}>
                        <div style={{fontSize:9,color:DIM,letterSpacing:1,marginBottom:4}}>GROSS RETURN (no costs)</div>
                        <div style={{fontSize:18,fontWeight:700,color:backtest.stats.grossReturn>=0?"#90a4ae":"#ff8a80"}}>{backtest.stats.grossReturn>=0?"+":""}{backtest.stats.grossReturn}%</div>
                      </div>
                      <div style={{flex:1,minWidth:130,background:"#060810",padding:12,borderRadius:4,borderLeft:"3px solid #ffb74d"}}>
                        <div style={{fontSize:9,color:DIM,letterSpacing:1,marginBottom:4}}>COST DRAG</div>
                        <div style={{fontSize:18,fontWeight:700,color:"#ffb74d"}}>−{backtest.stats.costDrag}%</div>
                      </div>
                      <div style={{flex:1,minWidth:130,background:"#060810",padding:12,borderRadius:4,borderLeft:"3px solid "+(edgeProven?(backtest.stats.totalReturn>=0?"#00e676":"#ff5252"):"#90a4ae")}}>
                        <div style={{fontSize:9,color:DIM,letterSpacing:1,marginBottom:4}}>NET RETURN (after costs)</div>
                        <div style={{fontSize:18,fontWeight:700,color:edgeProven?(backtest.stats.totalReturn>=0?"#00e676":"#ff5252"):"#90a4ae"}}>
                          {backtest.stats.totalReturn>=0?"+":""}{backtest.stats.totalReturn}%
                          {!edgeProven&&<span style={{fontSize:9,color:FADE,fontWeight:400,marginLeft:6}}>unproven</span>}
                        </div>
                      </div>
                    </div>
                  )}
                  {backtest.stats.total>0&&backtest.stats.grossReturn>0&&backtest.stats.totalReturn<0&&(
                    <div style={{background:"rgba(255,82,82,0.08)",border:"1px solid rgba(255,82,82,0.3)",borderRadius:4,padding:10,fontSize:10,color:"#ff8a80",lineHeight:1.7,marginBottom:14}}>
                      ⚠ REALITY CHECK: This strategy is profitable on paper (+{backtest.stats.grossReturn}%) but <strong>loses money after costs</strong> ({backtest.stats.totalReturn}%). The edge doesn't survive real-world friction. This is the single most common reason backtested strategies fail live.
                    </div>
                  )}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginTop:6}}>
                    {[
                      {l:"TOTAL TRADES",v:backtest.stats.total,c:"#dce6f0"},
                      {l:"WIN RATE",v:backtest.stats.winRate+"%",c:backtest.stats.winRate>=50?"#00e676":"#ff5252"},
                      {l:"WINS",v:backtest.stats.wins,c:"#00e676"},
                      {l:"LOSSES",v:backtest.stats.losses,c:"#ff5252"},
                      {l:"TOTAL RETURN",v:(backtest.stats.totalReturn>=0?"+":"")+backtest.stats.totalReturn+"%",c:backtest.stats.totalReturn>=0?"#00e676":"#ff5252"},
                      {l:"vs BUY & HOLD",v:buyHoldRet!=null?(buyHoldRet>=0?"+":"")+buyHoldRet+"%":"—",c:buyHoldRet!=null&&backtest.stats.totalReturn<buyHoldRet?"#ff8a80":"#90a4ae"},
                      {l:"PROFIT FACTOR",v:backtest.stats.profitFactor,c:backtest.stats.profitFactor>=1.5?"#00e676":backtest.stats.profitFactor>=1?"#ffd740":"#ff5252"},
                      {l:"EXPECTANCY",v:(backtest.stats.expectancy>=0?"+":"")+backtest.stats.expectancy+"%",c:backtest.stats.expectancy>=0?"#00e676":"#ff5252"},
                      {l:"AVG WIN / LOSS",v:"+"+backtest.stats.avgWin+"% / -"+backtest.stats.avgLoss+"%",c:"#90a4ae"},
                    ].map(x=>(
                      <div key={x.l} style={{background:"#060810",padding:12,borderRadius:4}}>
                        <div style={{fontSize:9,color:DIM,letterSpacing:1,marginBottom:4}}>{x.l}</div>
                        <div style={{fontSize:16,fontWeight:700,color:x.c}}>{x.v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{marginTop:14,padding:12,background:"#060810",borderRadius:4,fontSize:11,color:"#90a4ae",lineHeight:1.9}}>
                    {backtest.stats.total===0
                      ? "No completed trades in this dataset — the signal logic never produced a confirmed BUY/SELL entry that resolved. Try a longer history or a more volatile instrument."
                      : "Across "+rows.length+" candles, the strategy took "+backtest.stats.total+" trades with a "+backtest.stats.winRate+"% win rate. "+
                        "Profit factor "+backtest.stats.profitFactor+" ("+(backtest.stats.profitFactor==="∞"||backtest.stats.profitFactor>=1.5?"strong":backtest.stats.profitFactor>=1?"marginally profitable":"unprofitable")+"). "+
                        "Each trade averaged "+(backtest.stats.expectancy>=0?"+":"")+backtest.stats.expectancy+"% expectancy. "+
                        (buyHoldRet!=null?"Simply buying and holding over the same window returned "+(buyHoldRet>=0?"+":"")+buyHoldRet+"% — "+(backtest.stats.totalReturn>=buyHoldRet?"the strategy beat that benchmark.":"the strategy did NOT beat that benchmark, so trading added cost and risk without adding return.")+" ":"")+
                        (backtest.openTrade?"One trade is still open at period end.":"")}
                  </div>
                </div>

                {/* Statistical Validation */}
                {backtest.stats.total>0&&(
                  <div style={card}>
                    <span style={lbl}>📐 STATISTICAL VALIDATION — can you trust these results?</span>
                    {(()=>{
                      const s=backtest.stats;
                      const sigCfg={
                        "SIGNIFICANT":{c:"#00e676",msg:"Strong evidence of a real edge — enough trades and the average result is well clear of random noise."},
                        "SUGGESTIVE":{c:"#ffd740",msg:"Hints of an edge, but not conclusive. Gather more trades before trusting it."},
                        "NOT SIGNIFICANT":{c:"#ff5252",msg:"Results are statistically indistinguishable from random. No proven edge here."},
                        "TOO FEW TRADES":{c:"#ff8a80",msg:"Sample far too small to mean anything. You need 30+ trades for any statistical confidence. Treat these numbers as anecdote, not evidence."},
                      };
                      const sc=sigCfg[s.significance]||sigCfg["NOT SIGNIFICANT"];
                      return(
                        <>
                          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginTop:6}}>
                            {[
                              {l:"SAMPLE SIZE",v:s.total+" trades",c:s.total>=30?"#00e676":s.total>=15?"#ffd740":"#ff5252"},
                              {l:"SHARPE (per trade)",v:s.sharpe,c:s.sharpe>=0.3?"#00e676":s.sharpe>=0?"#ffd740":"#ff5252"},
                              {l:"MAX DRAWDOWN",v:"-"+s.maxDrawdown+"%",c:"#ff5252"},
                              {l:"MAX CONSEC LOSSES",v:s.maxConsecLoss,c:s.maxConsecLoss>=5?"#ff5252":"#ffd740"},
                              {l:"RETURN STD DEV",v:s.stdDev+"%",c:"#90a4ae"},
                              {l:"T-STATISTIC",v:s.tStat,c:Math.abs(s.tStat)>2?"#00e676":Math.abs(s.tStat)>1.5?"#ffd740":"#ff5252"},
                            ].map(x=>(
                              <div key={x.l} style={{background:"#060810",padding:12,borderRadius:4}}>
                                <div style={{fontSize:9,color:DIM,letterSpacing:1,marginBottom:4}}>{x.l}</div>
                                <div style={{fontSize:16,fontWeight:700,color:x.c}}>{x.v}</div>
                              </div>
                            ))}
                          </div>
                          <div style={{marginTop:12,padding:12,borderRadius:4,background:sc.c+"11",border:"1px solid "+sc.c+"44"}}>
                            <div style={{fontSize:11,fontWeight:700,color:sc.c,letterSpacing:1,marginBottom:4}}>VERDICT: {s.significance}</div>
                            <div style={{fontSize:10,color:"#90a4ae",lineHeight:1.8}}>{sc.msg}</div>
                          </div>
                          <div style={{marginTop:8,fontSize:9,color:FADE,lineHeight:1.7}}>
                            Sharpe = avg return ÷ volatility (higher = smoother gains). Max drawdown = worst peak-to-trough drop. Max consecutive losses = the losing streak you'd have had to stomach. T-stat &gt; 2 with 30+ trades ≈ 95% confidence the edge isn't luck.
                          </div>
                        </>
                      );
                    })()}
                  </div>
                )}

                {/* Out-of-Sample Validation */}
                {oosTest&&(()=>{
                  const isR=oosTest.inSample.stats.totalReturn, osR=oosTest.outSample.stats.totalReturn;
                  const osN=oosTest.outSample.stats.total;
                  let vCol,verdict,msg;
                  if(osN<3){vCol="#ff8a80";verdict="INCONCLUSIVE";msg="Too few trades in the test window to judge. Need more data for a reliable out-of-sample read.";}
                  else if(isR>0&&osR>0){vCol="#00e676";verdict="EDGE HELD";msg="The strategy stayed profitable on data it was never tuned against — the strongest sign the edge is real, not curve-fit.";}
                  else if(isR>0&&osR<=0){vCol="#ff5252";verdict="LIKELY OVERFIT";msg="Profitable in-sample but NOT out-of-sample. Classic overfitting signature — the 'edge' fit past noise and didn't generalize. Do not trust it.";}
                  else if(isR<=0&&osR>0){vCol="#ffd740";verdict="REGIME SHIFT?";msg="Weak in-sample but better out-of-sample — could be a market regime change, or small-sample luck. Inconclusive.";}
                  else{vCol="#ff5252";verdict="NO EDGE";msg="Unprofitable in both halves. No evidence of any edge on this instrument with current settings.";}
                  return(
                  <div style={{...card,border:"1px solid rgba(0,188,212,0.25)"}}>
                    <span style={lbl}>🔬 OUT-OF-SAMPLE TEST — does the edge survive on unseen data?</span>
                    <div style={{fontSize:10,color:DIM,lineHeight:1.7,marginBottom:12}}>
                      Trained on first 70% of candles ({oosTest.splitIdx} bars), tested on the last 30% it never "saw." If performance collapses out-of-sample, the edge was likely curve-fit to past noise.
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                      {[
                        {label:"IN-SAMPLE (train, 70%)",d:oosTest.inSample,accent:"#546e7a"},
                        {label:"OUT-OF-SAMPLE (test, 30%)",d:oosTest.outSample,accent:"#00bcd4"},
                      ].map(col=>(
                        <div key={col.label} style={{background:"#060810",padding:12,borderRadius:4,borderTop:"2px solid "+col.accent}}>
                          <div style={{fontSize:9,color:DIM,letterSpacing:1,marginBottom:8}}>{col.label}</div>
                          {[
                            {l:"Trades",v:col.d.stats.total},
                            {l:"Win rate",v:col.d.stats.winRate+"%"},
                            {l:"Return",v:(col.d.stats.totalReturn>=0?"+":"")+col.d.stats.totalReturn+"%",c:col.d.stats.totalReturn>=0?"#00e676":"#ff5252"},
                            {l:"Profit factor",v:col.d.stats.profitFactor},
                            {l:"Expectancy",v:(col.d.stats.expectancy>=0?"+":"")+col.d.stats.expectancy+"%",c:col.d.stats.expectancy>=0?"#00e676":"#ff5252"},
                          ].map(row=>(
                            <div key={row.l} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid "+BG2,fontSize:11}}>
                              <span style={{color:DIM}}>{row.l}</span>
                              <span style={{color:row.c||"#dce6f0",fontWeight:700}}>{row.v}</span>
                            </div>
                          ))}
                        </div>
                      ))}
                    </div>
                    <div style={{marginTop:12,padding:12,borderRadius:4,background:vCol+"11",border:"1px solid "+vCol+"44"}}>
                      <div style={{fontSize:11,fontWeight:700,color:vCol,letterSpacing:1,marginBottom:4}}>VERDICT: {verdict}</div>
                      <div style={{fontSize:10,color:"#90a4ae",lineHeight:1.8}}>{msg}</div>
                    </div>
                  </div>
                  );
                })()}

                {/* Parameter Sweep */}
                <div style={{...card,border:"1px solid rgba(224,64,251,0.2)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:8}}>
                    <span style={{...lbl,marginBottom:0}}>⚗ PARAMETER SWEEP — auto-find the best SL/TP combo</span>
                    <button style={{...pill(false),marginBottom:0,background:"rgba(224,64,251,0.1)",border:"1px solid #e040fb88",color:"#e040fb",fontWeight:700}}
                      onClick={runSweep} disabled={sweeping}>
                      {sweeping?"⏳ TESTING…":"▶ RUN SWEEP (16 combos)"}
                    </button>
                  </div>
                  <div style={{fontSize:10,color:DIM,lineHeight:1.7,marginBottom:10}}>
                    Tests 16 stop-loss / take-profit combinations, ranks them by net return, and checks each against the out-of-sample split. <span style={{color:"#e040fb"}}>This is how you find robust settings — but beware: picking the single best in-sample combo is itself overfitting. Prefer combos flagged ROBUST (profitable in AND out of sample).</span>
                  </div>
                  {!sweep&&!sweeping&&(
                    <div style={{textAlign:"center",padding:"20px 0",color:FADE,fontSize:11}}>Click RUN SWEEP to test the grid. Needs 60+ candles.</div>
                  )}
                  {sweep&&(
                    <>
                      {sweep.bestRobust?(
                        <div style={{padding:12,borderRadius:4,background:"rgba(0,230,118,0.08)",border:"1px solid rgba(0,230,118,0.3)",marginBottom:12}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#00e676",letterSpacing:1,marginBottom:4}}>★ BEST ROBUST COMBO: SL {sweep.bestRobust.sl}× / TP {sweep.bestRobust.tp}× (R/R 1:{sweep.bestRobust.rr})</div>
                          <div style={{fontSize:10,color:"#90a4ae",lineHeight:1.7}}>
                            Full {sweep.bestRobust.fullRet>=0?"+":""}{sweep.bestRobust.fullRet}% · in-sample {sweep.bestRobust.inRet>=0?"+":""}{sweep.bestRobust.inRet}% · out-of-sample {sweep.bestRobust.outRet>=0?"+":""}{sweep.bestRobust.outRet}%. Profitable in both halves — the most trustworthy choice.
                            <button style={{...pill(false),marginTop:8,marginBottom:0,fontSize:9}} onClick={()=>{setSlMult(sweep.bestRobust.sl);setTpMult(sweep.bestRobust.tp);run(sweep.bestRobust.sl,sweep.bestRobust.tp,{slip:slipPct,comm:commPct});}}>APPLY THIS COMBO</button>
                          </div>
                        </div>
                      ):(
                        <div style={{padding:12,borderRadius:4,background:"rgba(255,82,82,0.07)",border:"1px solid rgba(255,82,82,0.25)",marginBottom:12,fontSize:10,color:"#ff8a80",lineHeight:1.7}}>
                          ⚠ No combo was profitable in BOTH in-sample and out-of-sample. No robust settings found — the strategy may not have a real edge on this instrument, regardless of SL/TP tuning. Don't cherry-pick the best in-sample row; that's the overfitting trap.
                        </div>
                      )}
                      <div style={{overflowX:"auto"}}>
                        <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                          <thead>
                            <tr style={{color:DIM,fontSize:9,letterSpacing:1}}>
                              {["SL×","TP×","R/R","FULL RET","TRADES","IN-S","OUT-S","FLAG"].map(h=>(
                                <td key={h} style={{padding:"5px 6px",borderBottom:"1px solid "+BORD,textAlign:h==="SL×"||h==="TP×"||h==="R/R"?"left":"right"}}>{h}</td>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {sweep.results.map((r,i)=>(
                              <tr key={i} style={{borderBottom:"1px solid "+BG2,background:r.robust?"rgba(0,230,118,0.05)":r.overfit?"rgba(255,82,82,0.05)":"transparent"}}>
                                <td style={{padding:"6px",color:"#90a4ae"}}>{r.sl.toFixed(1)}</td>
                                <td style={{padding:"6px",color:"#90a4ae"}}>{r.tp.toFixed(1)}</td>
                                <td style={{padding:"6px",color:"#ffd740"}}>1:{r.rr}</td>
                                <td style={{padding:"6px",textAlign:"right",color:r.fullRet>=0?"#00e676":"#ff5252",fontWeight:700}}>{r.fullRet>=0?"+":""}{r.fullRet}%</td>
                                <td style={{padding:"6px",textAlign:"right",color:FADE}}>{r.trades}</td>
                                <td style={{padding:"6px",textAlign:"right",color:r.inRet>=0?"#69f0ae":"#ff8a80"}}>{r.inRet>=0?"+":""}{r.inRet}%</td>
                                <td style={{padding:"6px",textAlign:"right",color:r.outRet>=0?"#69f0ae":"#ff8a80"}}>{r.outRet>=0?"+":""}{r.outRet}%</td>
                                <td style={{padding:"6px",textAlign:"right",fontSize:8,fontWeight:700,color:r.robust?"#00e676":r.overfit?"#ff5252":DIM}}>{r.robust?"✓ ROBUST":r.overfit?"⚠ OVERFIT":"—"}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                      <div style={{marginTop:8,fontSize:9,color:FADE,lineHeight:1.7}}>
                        Green rows = profitable in &amp; out of sample (robust). Red rows = profitable in-sample only (overfit). The full-return ranking is tempting but the FLAG column is what matters — a lower-return robust combo beats a high-return overfit one every time.
                      </div>
                    </>
                  )}
                </div>

                {/* Equity curve */}
                {backtest.curve.length>1&&(
                  <div style={card}>
                    <span style={lbl}>◈ EQUITY CURVE (cumulative % return)</span>
                    <EquityCurve curve={backtest.curve}/>
                  </div>
                )}

                {/* Trade log */}
                <div style={card}>
                  <span style={lbl}>◈ TRADE LOG ({backtest.trades.length})</span>
                  {backtest.trades.length===0
                    ? <div style={{color:FADE,fontSize:11}}>No completed trades.</div>
                    : (
                      <div style={{overflowX:"auto"}}>
                        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                          <thead>
                            <tr style={{color:DIM,fontSize:9,letterSpacing:1}}>
                              {["#","DIR","ENTRY","EXIT","RESULT","P&L %","BARS"].map(h=>(
                                <td key={h} style={{padding:"4px 8px",borderBottom:"1px solid "+BORD}}>{h}</td>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {backtest.trades.map((t,i)=>(
                              <tr key={i} style={{borderBottom:"1px solid "+BG2}}>
                                <td style={{padding:"7px 8px",color:FADE}}>{i+1}</td>
                                <td style={{padding:"7px 8px"}}><span style={{color:t.dir==="BUY"?"#00e676":"#ff5252",fontWeight:700}}>{t.dir==="BUY"?"▲":"▼"} {t.dir}</span></td>
                                <td style={{padding:"7px 8px",color:"#90a4ae"}}>{fmt(t.entry)}</td>
                                <td style={{padding:"7px 8px",color:"#90a4ae"}}>{fmt(t.exit)}</td>
                                <td style={{padding:"7px 8px"}}><span style={{color:t.result==="WIN"?"#00e676":"#ff5252",fontWeight:700}}>{t.result}</span></td>
                                <td style={{padding:"7px 8px",color:t.pnlPct>=0?"#00e676":"#ff5252",fontWeight:700}}>{t.pnlPct>=0?"+":""}{t.pnlPct.toFixed(2)}%</td>
                                <td style={{padding:"7px 8px",color:FADE}}>{t.barsHeld}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                </div>

                <div style={{background:"rgba(255,215,64,0.03)",border:"1px solid rgba(255,215,64,0.10)",borderRadius:4,padding:10,fontSize:9,color:FADE,lineHeight:1.8}}>
                  ⚠ Backtest enters at the NEXT bar's open after a signal (no lookahead bias), with ATR-based SL/TP and your configured slippage + commission costs applied. Past performance does not guarantee future results. EDUCATIONAL ONLY.
                </div>
              </>
            )}
          </>
        )}

        {/* ── REPLAY TAB ── */}
        {tab==="replay"&&(()=>{
          if(!rows.length||rows.length<REPLAY_START+1||!replaySeries){
            return(

              return (
                <div style={card}>
                  <span style={lbl}>🔬 OUT-OF-SAMPLE VARIANT SCOREBOARD · forward-perf.json</span>
                  <div style={{fontSize:11,color:"#90a4ae",lineHeight:1.7,marginBottom:10}}>
                    Every propose-only overlay as an A/B inside the SAME opened-longs population, scored on <b>alpha vs a total-return buy-&amp;-hold</b> and corrected for multiple testing (BH/BY FDR). <b style={{color:"#ffd740"}}>Nothing is tradeable until it clears the gate out-of-sample</b> — an empty or "too few trades" board is the honest current state, not a bug.
                  </div>
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                      <thead><tr style={{color:DIM,textAlign:"left"}}>
                        <th style={{padding:"6px 8px"}}>VARIANT</th><th style={{padding:"6px 8px"}}>TRADES</th>
                        <th style={{padding:"6px 8px"}}>MEAN ALPHA</th><th style={{padding:"6px 8px"}}>BEAT B&amp;H</th>
                        <th style={{padding:"6px 8px"}}>q (BH)</th><th style={{padding:"6px 8px"}}>VERDICT</th>
                      </tr></thead>
                      <tbody>
                        {rows.map(([k,desc])=>{ const v=V[k]||{}, sg=v.significance||{};
                          return (
                            <tr key={k} style={{borderTop:"1px solid "+BG2}}>
                              <td style={{padding:"6px 8px",color:"#cfd8dc"}}>{k}<div style={{fontSize:8,color:FADE}}>{desc}</div></td>
                              <td style={{padding:"6px 8px",color:"#90a4ae"}}>{sg.n!=null?sg.n:(v.n||0)}</td>
                              <td style={{padding:"6px 8px",color:sg.meanAlpha>0?"#00e676":sg.meanAlpha<0?"#ff5252":"#90a4ae"}}>{sg.meanAlpha==null?"—":(sg.meanAlpha>=0?"+":"")+sg.meanAlpha+"%"}</td>
                              <td style={{padding:"6px 8px",color:"#90a4ae"}}>{v.beatBenchRate==null?"—":v.beatBenchRate+"%"}</td>
                              <td style={{padding:"6px 8px",color:"#90a4ae"}}>{sg.qBH==null?"—":sg.qBH}</td>
                              <td style={{padding:"6px 8px",fontWeight:700,color:vCol(sg.verdict)}}>{sg.verdict||"TOO FEW TRADES"}{sg.promotable?" ✓":sg.provenLoser?" ✗":""}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                  <div style={{marginTop:10,fontSize:9,color:FADE,lineHeight:1.7}}>
                    FDR family: {mt.familySize!=null?mt.familySize:"—"} powered variants (n ≥ {mt.minTrades!=null?mt.minTrades:"min"}) · {mt.note||"BH for promotion; BY as the arbitrary-dependence cross-check"} · generated {forwardPerf.generatedAt?new Date(forwardPerf.generatedAt).toLocaleDateString():"—"}. A variant needs ≥10 OOS trades at q≤0.05 to promote — propose-only, human-ratified.
                  </div>
                </div>
              );
            })()}
          </>
        )}

        {/* ── POSITION SIZE TAB ── */}
        {tab==="position"&&(
          <>
            {proLens(8)}
            <div style={card}>
              <span style={lbl}>POSITION SIZE CALCULATOR</span>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
                <div>
                  <span style={{...lbl,marginBottom:4}}>ACCOUNT SIZE ($)</span>
                  <input style={inp} type="number" value={account} onChange={e=>setAccount(e.target.value)} placeholder="10000"/>
                </div>
                <div>
                  <span style={{...lbl,marginBottom:4}}>RISK PER TRADE (%)</span>
                  <input style={inp} type="number" value={riskPct} onChange={e=>setRiskPct(e.target.value)} placeholder="1" step="0.1" min="0.1" max="5"/>
                </div>
              </div>
              {analysis?(
                <>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,marginTop:8}}>
                    {[
                      {l:"ACCOUNT SIZE",v:"$"+Number(accNum).toLocaleString(),c:"#dce6f0"},
                      {l:"RISK AMOUNT",v:"$"+riskAmt.toFixed(2),c:"#ffd740"},
                      {l:"ENTRY PRICE",v:fmt(analysis.entry),c:"#00bcd4"},
                      {l:"STOP LOSS",v:fmt(analysis.sl),c:"#ff5252"},
                      {l:"SL DISTANCE",v:fmt(slDist),c:"#ff8a80"},
                      {l:"POSITION SIZE",v:posSize+" units"+(sizeCapped?" ⚑":""),c:sizeCapped?"#ffb74d":"#00e676"},
                      {l:"POSITION VALUE",v:"$"+posVal.toFixed(2)+" ("+(accNum>0?(100*posVal/accNum).toFixed(0):"0")+"%)",c:(posVal/accNum)>MAX_POS_PCT/100?"#ff5252":"#69f0ae"},
                      {l:"RISK/REWARD",v:"1 : "+analysis.rr,c:"#ffd740"},
                    ].map(x=>(
                      <div key={x.l} style={{background:"#060810",padding:12,borderRadius:4,borderLeft:"3px solid "+x.c}}>
                        <div style={{fontSize:9,color:DIM,letterSpacing:1,marginBottom:4}}>{x.l}</div>
                        <div style={{fontSize:15,fontWeight:700,color:x.c}}>{x.v}</div>
                      </div>
                    ))}
                  </div>
                  {sizeCapped&&(
                    <div style={{marginTop:12,padding:"10px 12px",borderRadius:4,background:"rgba(255,183,77,0.07)",border:"1px solid rgba(255,183,77,0.30)",fontSize:11,color:"#ffd180",lineHeight:1.7}}>
                      ⚑ <strong>CONCENTRATION-CAPPED.</strong> The 1-2% risk rule alone would size <strong>{riskBasedSize} units</strong> (${(riskBasedSize*analysis.entry).toFixed(0)}, {(100*riskBasedSize*analysis.entry/accNum).toFixed(0)}% of account) — a tight stop inflates the share count. Capped to <strong>{posSize} units</strong> (≤{MAX_POS_PCT}% of account), so you actually risk <strong>${effRiskAmt.toFixed(2)}</strong> ({(100*effRiskAmt/accNum).toFixed(2)}%), not the full {riskPct}%. Over-concentration avoided.
                    </div>
                  )}
                  <div style={{marginTop:14,padding:12,background:"#060810",borderRadius:4,fontSize:11,color:"#90a4ae",lineHeight:1.9}}>
                    Risking <strong style={{color:"#ffd740"}}>{(100*effRiskAmt/accNum).toFixed(2)}%</strong> (${effRiskAmt.toFixed(2)}) of your ${Number(accNum).toLocaleString()} account on {ticker}.<br/>
                    With stop loss at {fmt(analysis.sl)} ({fmt(slDist)} from entry), buy <strong style={{color:"#00e676"}}>{posSize} units</strong> (${posVal.toFixed(2)} position).<br/>
                    Max loss if SL hit <span style={{color:FADE}}>(ideal)</span>: <strong style={{color:"#ff5252"}}>~${effRiskAmt.toFixed(2)}</strong> · Target gain TP1: <strong style={{color:"#00e676"}}>${(posSize*Math.abs(analysis.tp1-analysis.entry)).toFixed(2)}</strong><br/>
                    <span style={{fontSize:10,color:FADE}}>⚠ "Max loss" is the IDEAL — it excludes costs/slippage and assumes the stop fills at the stop price. A gap-down or thin liquidity can blow through it, so a real loss can exceed this.</span>
                  </div>
                </>
              ):(
                <div style={{color:FADE,fontSize:12,padding:20,textAlign:"center"}}>Run an analysis first to calculate position sizing.</div>
              )}
            </div>
            <div style={{...card,fontSize:10,color:DIM,lineHeight:1.9}}>
              <span style={{color:"#00e676",fontWeight:700}}>POSITION SIZING RULES</span><br/>
              · Never risk more than 1-2% of account per trade<br/>
              · Position value is auto-capped at {MAX_POS_PCT}% of account here (avoid over-concentration)<br/>
              · Always set a stop loss before entering — no stop = undefined risk<br/>
              · High volatility auto-shrinks the size (wider ATR stop → fewer shares → same risk-$)<br/>
              · R/R ratio should be minimum 1:1.5, ideally 1:2 or better
            </div>
          </>
        )}

        {/* ── HISTORY TAB ── */}
        {tab==="history"&&(
          <>
            {proLens(9)}
            <div style={card}>
              <span style={lbl}>SIGNAL HISTORY (last 10 runs)</span>
              {history.length===0?(
                <div style={{color:FADE,fontSize:12,padding:20,textAlign:"center"}}>No history yet. Run some analyses to see them logged here.</div>
              ):(
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr style={{color:DIM,fontSize:9,letterSpacing:1}}>
                      {["TIME","TICKER","SIGNAL","CONFIDENCE","PRICE","TREND","EDGE"].map(h=>(
                        <td key={h} style={{padding:"4px 8px",borderBottom:"1px solid "+BORD}}>{h}</td>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {history.map((h,i)=>{
                      // Same transparency rule, frozen at log time: an old signal
                      // shows its loud color only if the edge was established THEN.
                      const sigCol=h.muted?"#90a4ae":(h.signal==="BUY"?"#00e676":h.signal==="SELL"?"#ff5252":"#ffd740");
                      const edge=h.verdict===undefined?null:h.verdict; // pre-update rows have no verdict
                      const eCfg={
                        "SIGNIFICANT":["#00e676","✓ PROVEN"],
                        "SUGGESTIVE":["#ffd740","~ SUGGESTIVE"],
                        "NOT SIGNIFICANT":["#90a4ae","✗ NOT SIG."],
                        "TOO FEW TRADES":["#90a4ae","· TOO FEW"],
                      };
                      const [eCol,eTxt]=eCfg[edge]||["#546e7a","— no test"];
                      return(
                      <tr key={i} style={{borderBottom:"1px solid "+BG2}}>
                        <td style={{padding:"8px 8px",color:FADE}}>{h.time}</td>
                        <td style={{padding:"8px 8px",color:"#dce6f0",fontWeight:700}}>{h.ticker}</td>
                        <td style={{padding:"8px 8px"}}>
                          <span style={{color:sigCol,fontWeight:700}}>{h.signal==="BUY"?"▲ ":h.signal==="SELL"?"▼ ":"◆ "}{h.signal}{h.muted?" ·":""}</span>
                        </td>
                        <td style={{padding:"8px 8px"}}>
                          <span style={{color:h.confidence>=70?"#00e676":h.confidence>=45?"#ffd740":"#ff5252"}}>{h.confidence}%</span>
                        </td>
                        <td style={{padding:"8px 8px",color:"#90a4ae"}}>{fmt(h.price)}</td>
                        <td style={{padding:"8px 8px",color:tCol(h.trend)}}>{h.trend}</td>
                        <td style={{padding:"8px 8px",fontSize:9,fontWeight:700,color:eCol}}>{eTxt}</td>
                      </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
              <div style={{marginTop:10,fontSize:9,color:FADE,lineHeight:1.7}}>
                ⚖ EDGE is frozen at the moment each signal was logged — muted (gray) signals were not backed by a statistically established edge at that time. This is an audit trail, so older rows keep the verdict they were given, never re-judged.
              </div>
            </div>
            <button style={runBtn} onClick={()=>setHistory([])}>CLEAR HISTORY</button>
          </>
        )}

        {tab==="paper"&&(()=>{
          const MUT="#90a4ae";
          // The committed ledger ALSO carries internal A/B research streams: the team-minus-vote SHADOW
          // teams (mode:"shadow-…") reuse the tactical entry/SL/TP verbatim, so they render as EXACT-duplicate
          // rows here (one per shadow team that fired the same BUY). They belong to the OOS SCOREBOARD on the
          // EVIDENCE tab, NOT this human paper-trade view — so we hide them. POSITION is a distinct philosophy
          // (its own wider/ trailing stops) — kept, but LABELED so it's never mistaken for a tactical duplicate.
          const isShadow=e=>!!(e.tags&&typeof e.tags.mode==="string"&&e.tags.mode.startsWith("shadow-"));
          const isPosition=e=>!!(e.tags&&e.tags.mode==="position");
          const modeLabel=e=>isPosition(e)?"POSITION":"TACTICAL";
          const modeCol=e=>isPosition(e)?"#00bcd4":"#00e676";
          const visible=ledger.filter(e=>!isShadow(e));
          const shadowHidden=ledger.length-visible.length;
          const closed=visible.filter(e=>e.status==="WIN"||e.status==="LOSS");
          const opens=visible.filter(e=>e.status==="OPEN");
          const obs=visible.filter(e=>e.status==="OBSERVATION");
          const tacticalClosed=closed.filter(e=>!isPosition(e));
          const seg=arr=>realizedStats(arr.map(e=>({result:e.status,pnlPct:e.pnlPct,grossPct:e.grossPct}))).stats;
          const segments=[
            ["ALL CLOSED", tacticalClosed, "every tactical BUY/SELL that has resolved (POSITION tracked separately)"],
            ["NON-MUTED", tacticalClosed.filter(e=>!(e.tags&&e.tags.signalMuted)), "only signals the gates did NOT mute"],
            ["DATA-CLEAN", tacticalClosed.filter(e=>!(e.tags&&e.tags.dataSuspect)), "only signals on inputs that passed the integrity audit"],
          ];
          const freshClose=sym=>(rows&&rows.length&&ticker.trim().toUpperCase()===sym)?rows[rows.length-1].close:null;
          const sCol=(s,muted)=>muted?MUT:(s==="BUY"?"#00e676":s==="SELL"?"#ff5252":"#ffd740");
          const edgeTxt={"SIGNIFICANT":"✓ PROVEN","SUGGESTIVE":"~ SUGGESTIVE","NOT SIGNIFICANT":"✗ NOT SIG.","TOO FEW TRADES":"· TOO FEW"};
          const pnlCol=v=>v==null?FADE:(v>0?"#00e676":v<0?"#ff5252":"#ffd740");
          return(
          <>
            {proLens(9)}
            <div style={card}>
              <span style={lbl}>📒 FORWARD TEST — paper-ledger.json</span>
              <div style={{fontSize:11,color:"#90a4ae",lineHeight:1.7}}>
                The honest, out-of-sample track record: a CI job (<code>scripts/forward-log.mjs</code>) runs this exact engine
                after the US close each trading day, logs every live signal as a paper trade on the <b>settled</b> daily bar,
                and marks open trades to market with the same SL/TP math as the backtest. Nobody clicks; git history timestamps it.
                This tab only <b>reads</b> the committed ledger.
              </div>
              <div style={{marginTop:10,fontSize:9,color:FADE,lineHeight:1.7}}>
                ⚖ Free-tier data is end-of-day, so this is a <b>daily-bar</b> forward test — intraday SL/TP path is approximated by each
                day's high/low (exactly as the backtest already does). Entries fill at the settled decision close. Exits are only
                ever checked on bars dated <b>after</b> entry (no lookahead).
              </div>
            </div>

            {ledger.length===0?(
              <div style={card}>
                <div style={{color:FADE,fontSize:12,padding:20,textAlign:"center",lineHeight:1.8}}>
                  No paper trades yet. <code>paper-ledger.json</code> is built nightly in CI once the
                  <code> TWELVE_DATA_KEY</code> secret is set and the <code>Forward-test logger</code> workflow has run.
                  <br/>Preview locally any time: <code>node scripts/forward-log.mjs --preview --ticker AAPL</code>.
                </div>
              </div>
            ):(
            <>
              {/* Realized performance, SEGMENTED by gate tag — does muting add value? */}
              <div style={card}>
                <span style={lbl}>REALIZED PERFORMANCE — SEGMENTED BY GATE</span>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  {segments.map(([name,arr,note])=>{
                    const s=seg(arr);
                    const muted=!(s.significance==="SIGNIFICANT"||s.significance==="SUGGESTIVE");
                    const hCol=muted?MUT:"#dce6f0";
                    return(
                    <div key={name} style={{background:"#060810",padding:12,borderRadius:4}}>
                      <div style={{fontSize:10,fontWeight:700,color:hCol,letterSpacing:1,marginBottom:6}}>{name}</div>
                      <div style={{fontSize:9,color:FADE,lineHeight:1.4,marginBottom:8,minHeight:26}}>{note}</div>
                      <Row k="Trades" v={s.total}/>
                      <Row k="Win rate" v={s.total?s.winRate+"%":"—"}/>
                      <Row k="Expectancy" v={s.total?s.expectancy+"%":"—"} c={pnlCol(s.expectancy)}/>
                      <Row k="Total ret" v={s.total?s.totalReturn+"%":"—"} c={pnlCol(s.totalReturn)}/>
                      <Row k="Profit factor" v={s.total?s.profitFactor:"—"}/>
                      <Row k="Edge" v={edgeTxt[s.significance]||"—"} c={muted?MUT:"#00e676"}/>
                    </div>
                    );
                  })}
                </div>
                <div style={{marginTop:10,fontSize:9,color:FADE,lineHeight:1.7}}>
                  If muting earns its keep, <b>NON-MUTED</b> should out-perform <b>ALL CLOSED</b>. Stats stay gray until the
                  sample is large enough for a significant t-stat — the same honesty rule as the BACKTEST tab.
                </div>
              </div>

              {/* Open positions */}
              <div style={card}>
                <span style={lbl}>OPEN POSITIONS ({opens.length})</span>
                {opens.length===0?(
                  <div style={{color:FADE,fontSize:11,padding:12,textAlign:"center"}}>No open paper trades.</div>
                ):(
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr style={{color:DIM,fontSize:9,letterSpacing:1}}>
                      {["AS OF","TICKER","MODE","SIGNAL","ENTRY","SL","TP1","RR","UNREAL.","EDGE"].map(h=>(
                        <td key={h} style={{padding:"4px 8px",borderBottom:"1px solid "+BORD}}>{h}</td>))}
                    </tr></thead>
                    <tbody>
                      {opens.map((e,i)=>{
                        const muted=!!(e.tags&&e.tags.signalMuted);
                        const fc=freshClose(e.ticker);
                        const unreal=fc!=null?((e.signal==="BUY"?(fc-e.entry):(e.entry-fc))/e.entry*100):null;
                        return(
                        <tr key={i} style={{borderBottom:"1px solid "+BG2}}>
                          <td style={{padding:"8px 8px",color:FADE}}>{e.dataAsOf?e.dataAsOf.date:"—"}</td>
                          <td style={{padding:"8px 8px",color:"#dce6f0",fontWeight:700}}>{e.ticker}</td>
                          <td style={{padding:"8px 8px",fontSize:9,fontWeight:700,color:modeCol(e)}}>{modeLabel(e)}</td>
                          <td style={{padding:"8px 8px",color:sCol(e.signal,muted),fontWeight:700}}>{e.signal==="BUY"?"▲ ":"▼ "}{e.signal}{muted?" ·":""}</td>
                          <td style={{padding:"8px 8px",color:"#90a4ae"}}>{fmt(e.entry)}</td>
                          <td style={{padding:"8px 8px",color:"#ff8a80"}}>{fmt(e.sl)}</td>
                          <td style={{padding:"8px 8px",color:"#69f0ae"}}>{fmt(e.tp1)}</td>
                          <td style={{padding:"8px 8px",color:DIM}}>{e.rr}</td>
                          <td style={{padding:"8px 8px",color:pnlCol(unreal),fontWeight:700}}>{unreal==null?"—":(unreal>0?"+":"")+unreal.toFixed(2)+"%"}</td>
                          <td style={{padding:"8px 8px",fontSize:9,fontWeight:700,color:muted?MUT:"#00e676"}}>{edgeTxt[e.tags&&e.tags.edgeVerdict]||"—"}</td>
                        </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )}
                <div style={{marginTop:8,fontSize:9,color:FADE}}>Unrealized P&L shows only for a ticker you currently have loaded above; the CI job marks every open trade to market on each run. <b style={{color:"#00bcd4"}}>MODE</b> distinguishes the TACTICAL engine from the POSITION (dip-buy) philosophy — same name in both is two strategies, not a duplicate.{shadowHidden>0?(<> {shadowHidden} internal team-minus-vote <b>shadow</b> rows (which copy the tactical entry/SL/TP verbatim) are hidden here — they're A/B research, scored on the <b>EVIDENCE</b> scoreboard, not paper trades.</>):null}</div>
              </div>

              {/* Closed trades */}
              <div style={card}>
                <span style={lbl}>CLOSED TRADES ({closed.length})</span>
                {closed.length===0?(
                  <div style={{color:FADE,fontSize:11,padding:12,textAlign:"center"}}>No closed paper trades yet.</div>
                ):(
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr style={{color:DIM,fontSize:9,letterSpacing:1}}>
                      {["AS OF","TICKER","MODE","SIGNAL","ENTRY","EXIT","P&L%","BARS","EXITED","TAG"].map(h=>(
                        <td key={h} style={{padding:"4px 8px",borderBottom:"1px solid "+BORD}}>{h}</td>))}
                    </tr></thead>
                    <tbody>
                      {closed.slice().reverse().map((e,i)=>{
                        const muted=!!(e.tags&&e.tags.signalMuted);
                        const win=e.status==="WIN";
                        return(
                        <tr key={i} style={{borderBottom:"1px solid "+BG2}}>
                          <td style={{padding:"8px 8px",color:FADE}}>{e.dataAsOf?e.dataAsOf.date:"—"}</td>
                          <td style={{padding:"8px 8px",color:"#dce6f0",fontWeight:700}}>{e.ticker}</td>
                          <td style={{padding:"8px 8px",fontSize:9,fontWeight:700,color:modeCol(e)}}>{modeLabel(e)}</td>
                          <td style={{padding:"8px 8px",color:sCol(e.signal,muted),fontWeight:700}}>{e.signal}{muted?" ·":""}</td>
                          <td style={{padding:"8px 8px",color:"#90a4ae"}}>{fmt(e.entry)}</td>
                          <td style={{padding:"8px 8px",color:"#90a4ae"}}>{fmt(e.exit)}</td>
                          <td style={{padding:"8px 8px",color:pnlCol(e.pnlPct),fontWeight:700}}>{e.pnlPct>0?"+":""}{e.pnlPct}%</td>
                          <td style={{padding:"8px 8px",color:DIM}}>{e.barsHeld}</td>
                          <td style={{padding:"8px 8px",color:FADE}}>{e.exitDate||"—"}</td>
                          <td style={{padding:"8px 8px",fontSize:9,fontWeight:700,color:win?"#00e676":"#ff5252"}}>{e.status}{e.tags&&e.tags.dataSuspect?" ⚠":""}</td>
                        </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )}
              </div>

              {/* HOLD observations (no position) */}
              {obs.length>0&&(
                <div style={card}>
                  <span style={lbl}>OBSERVATIONS — HOLD signals ({obs.length})</span>
                  <div style={{fontSize:10,color:FADE,lineHeight:1.8}}>
                    {obs.slice().reverse().slice(0,30).map((e,i)=>(
                      <span key={i} style={{display:"inline-block",marginRight:12}}>{e.dataAsOf?e.dataAsOf.date:""} <b style={{color:"#90a4ae"}}>{e.ticker}</b> HOLD</span>
                    ))}
                  </div>
                </div>
              )}
            </>
            )}
          </>
          );
        })()}
      </div>
    </div>
  );
}

// Small stat row used by the FORWARD TEST segmented cards.
function Row({k,v,c}){
  return(
    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,padding:"2px 0"}}>
      <span style={{color:"#546e7a"}}>{k}</span>
      <span style={{color:c||"#b0bec5",fontWeight:600}}>{v}</span>
    </div>
  );
}

const container = document.getElementById("root");
ReactDOM.createRoot(container).render(<App/>);
</script>
</body>
</html>
