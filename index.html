  const [polyKey,   setPolyKey]   = useState((typeof localStorage!=="undefined"&&localStorage.getItem("sf_polygon_key"))||"");
  const [liveFreshness, setLiveFreshness] = useState(null); // {stalenessSec, band, isOpen, provider}
  // Precomputed SEC fundamentals, fetched same-origin (built nightly in CI).
  const [fundaDB,   setFundaDB]   = useState(null);
  useEffect(()=>{ let alive=true;
    fetch("./fundamentals.json").then(r=>r.ok?r.json():null).then(j=>{ if(alive&&j&&typeof j==="object") setFundaDB(j); }).catch(()=>{});
    return ()=>{ alive=false; };
  },[]);
  // Merit-evidence study (built in CI by scripts/build-study.mjs). Read-only here.
  // `meritEdgeProven` is the gate: fundamentals may move the signal ONLY when the
  // cross-sectional study shows a real, OOS-consistent, placebo-surviving edge.
  const [study, setStudy] = useState(null);
  useEffect(()=>{ let alive=true;
    fetch("./study.json").then(r=>r.ok?r.json():null).then(j=>{ if(alive&&j&&typeof j==="object") setStudy(j); }).catch(()=>{});
    return ()=>{ alive=false; };
  },[]);
  const meritEdgeProven = !!(study && study.meritEdgeProven);
  // Forward-test paper ledger — the committed, git-versioned track record built by
  // scripts/forward-log.mjs in CI (nightly, on settled EOD bars). Read-only here:
  // the page is a VIEWER of the automated record, never a writer (a static page has
  // no secrets and no git). git history is the tamper-evident, timestamped log.
  const [ledger, setLedger] = useState([]);
  useEffect(()=>{ let alive=true;
    fetch("./paper-ledger.json").then(r=>r.ok?r.json():null).then(j=>{
      if(!alive) return;
      const arr=Array.isArray(j)?j:(j&&Array.isArray(j.trades)?j.trades:[]);
      setLedger(arr);
    }).catch(()=>{});
    return ()=>{ alive=false; };
  },[]);
  // Feed-lag report — the git-versioned freshness record built in CI by
  // scripts/lag-probe.mjs (during market hours). Read-only viewer, same-origin.
  const [lagReport, setLagReport] = useState(null);
  useEffect(()=>{ let alive=true;
    fetch("./lag-report.json").then(r=>r.ok?r.json():null).then(j=>{
      if(alive&&j&&typeof j==="object"&&j.latest) setLagReport(j);
    }).catch(()=>{});
    return ()=>{ alive=false; };
  },[]);
  const [resolution,setResolution]= useState("D");
  const [fetching,  setFetching]  = useState(false);
  const [liveMeta,  setLiveMeta]  = useState(null);
  const [outlook,   setOutlook]   = useState(null); // Market Outlook → correction-period price (live only)
  const [fundaMeta, setFundaMeta] = useState(null); // provenance of auto-filled fundamentals
  const [fundaAuto, setFundaAuto] = useState({});   // which fields came from auto-fetch (vs hand-entered)
  const [fundaVerified, setFundaVerified] = useState(false); // user confirmed auto-data against a primary source
  // ─ Replay state ─
  const [replayIdx,     setReplayIdx]     = useState(0);
  const [replayPlaying, setReplayPlaying] = useState(false);
  const [replaySpeed,   setReplaySpeed]   = useState(220); // ms per bar
  const REPLAY_START = 30; // first scorable bar (matches backtest/analysis start)

  // Per-bar signal series — the signal/score AS IT WAS at each historical bar.
  // Same scorer the backtest uses, so the replay shows exactly what fired live.
  const replaySeries = useMemo(()=>{
    if(!rows||rows.length<REPLAY_START+1) return null;
    const scorer = mode==="position" ? scorePosition : scoreAt;
    const out=new Array(rows.length).fill(null);
    for(let i=REPLAY_START;i<rows.length;i++){
      const s=scorer(rows.slice(0,i+1));
      if(s) out[i]={score:s.score,signal:s.signal};
    }
    return out;
  },[rows,mode]);

  // Map each candle's date → its row index, so trade exit dates resolve to bars.
  const dateToIdx = useMemo(()=>{
    const m={}; rows.forEach((r,i)=>{m[r.date]=i;}); return m;
  },[rows]);

  // Backtest trades augmented with entry/exit bar indices for the overlay.
  const replayTrades = useMemo(()=>{
    if(!backtest?.trades) return [];
    return backtest.trades.map(t=>({
      ...t,
      entryIdx: t.openIndex,
      exitIdx: dateToIdx[t.exitDate] ?? (t.openIndex + (t.barsHeld||0)),
    }));
  },[backtest,dateToIdx]);

  // Integrity scan of the loaded bars — recomputed whenever the data changes,
  // so it covers every ingest path (CSV, paste, live fetch) without touching them.
  const dataAudit = useMemo(()=>auditData(rows),[rows]);

  // When fresh data loads, park the playhead at the latest bar and stop playback.
  useEffect(()=>{
    setReplayPlaying(false);
    setReplayIdx(rows.length ? rows.length-1 : 0);
  },[rows]);

  // Playback engine — advances one bar per tick; auto-stops at the end.
  useEffect(()=>{
    if(!replayPlaying) return;
    if(replayIdx>=rows.length-1){ setReplayPlaying(false); return; }
    const id=setTimeout(()=>setReplayIdx(i=>Math.min(i+1,rows.length-1)),replaySpeed);
    return ()=>clearTimeout(id);
  },[replayPlaying,replayIdx,rows.length,replaySpeed]);

  // ─── App-wide transparency rule ────────────────────────────────────────────
  // A persuasive surface (signal badge, chart marker, headline return) earns its
  // loud color ONLY when the backtested edge on THIS instrument is at least
  // suggestive. Below that we mute to gray — the UI gets quieter exactly when it
  // knows less. `significance` comes straight from the backtest's t-stat, so the
  // same evidence gates every surface. No backtest (too little data) ⇒ muted.
  const edgeVerdict = backtest?.stats?.significance;
  const edgeProven  = edgeVerdict==="SIGNIFICANT";                 // strong: full color earned
  const edgeShown   = edgeProven || edgeVerdict==="SUGGESTIVE";    // at least suggestive
  const edgeMuted   = !edgeShown;                                  // muted because the EDGE is unproven
  const dataSuspect = !!(dataAudit && dataAudit.suspect);          // muted because the INPUTS are corrupt
  const signalMuted = edgeMuted || dataSuspect;                    // either reason mutes persuasive surfaces

  // Phase-2 merit fusion — a DISPLAY overlay only (never touches scoreAt/runBacktest, so the
  // price-only backtest stays honest). Dormant unless fundamentals are verified AND the evidence
  // harness proved a forward-return edge; otherwise displaySignal === the raw price signal.
  const meritFusion  = analysis ? fuseMerit(analysis.signal, fundaResult?.grade, mode, {verified:fundaVerified, edgeProven:meritEdgeProven}) : null;
  const displaySignal= meritFusion ? meritFusion.signal : (analysis?analysis.signal:null);
  // Phase-3 macro regime (live only, from the OUTLOOK overlay). Conditions the
  // displayed conviction only when proven; otherwise informational.
  const macro        = outlook ? macroRegime(outlook) : null;

  async function fetchLive(){
    const usePoly=provider==="polygon";
    const key=(usePoly?polyKey:apiKey).trim();
    if(!key){setError(usePoly?"Enter your Polygon REST API key first (polygon.io → Accessing the API).":"Enter your free Twelve Data API key first (twelvedata.com).");setTab("live");return;}
    const sym=ticker.trim().toUpperCase();
    if(!sym){setError("Enter a ticker symbol.");return;}
    setFetching(true);setError("");setOutlook(null);setLiveFreshness(null);
    try{localStorage.setItem(usePoly?"sf_polygon_key":"sf_td_key",key);localStorage.setItem("sf_provider",provider);}catch(e){}
    try{
      const intervalMap={"1":"1min","5":"5min","15":"15min","30":"30min","60":"1h","D":"1day","W":"1week"};
      const interval=intervalMap[resolution]||"1day";
      let candles, quote=null;
      if(usePoly){
        const r=await polyFetchCandles(sym, resolution, key);
        candles=r.candles; quote=r.quote;
      }else{
        const url="https://api.twelvedata.com/time_series?symbol="+encodeURIComponent(sym)+"&interval="+interval+"&outputsize=300&apikey="+encodeURIComponent(key);
        const res=await fetch(url);
        const j=await res.json();
        if(j.status==="error"||j.code){
          const msg=j.message||"Request failed.";
          if(/api key/i.test(msg))throw new Error("Invalid API key. Check it at twelvedata.com dashboard.");
          if(/limit/i.test(msg))throw new Error("Daily limit reached (800/day free). Try again later.");
          throw new Error(msg);
        }
        if(!j.values||!j.values.length)throw new Error('No data for "'+sym+'". Stocks: AAPL. Forex: EUR/USD. Crypto: BTC/USD.');
        candles=j.values.slice().reverse().map(v=>({date:v.datetime,open:+parseFloat(v.open||v.close).toFixed(4),high:+parseFloat(v.high||v.close).toFixed(4),low:+parseFloat(v.low||v.close).toFixed(4),close:+parseFloat(v.close).toFixed(4),volume:parseFloat(v.volume)||0})).filter(d=>d.close>0);
      }
      if(candles.length<10)throw new Error("Only "+candles.length+" candles — try Daily/Weekly resolution.");
      const csvText="Date,Open,High,Low,Close,Volume\n"+candles.map(d=>d.date+","+d.open+","+d.high+","+d.low+","+d.close+","+d.volume).join("\n");
      setCsv(csvText);
      // Freshness (the lag test): Polygon carries a last-trade timestamp; TD does not.
      // Provisional isOpen=true here; the Outlook's index market_status refines it below.
      if(usePoly && quote && quote.lastTs!=null){
        const stale=Math.max(0,(Date.now()-quote.lastTs)/1000);
        setLiveFreshness({stalenessSec:stale, isOpen:true, band:classifyFreshness(stale,true), provider:"Polygon"});
      }else{
        setLiveFreshness({stalenessSec:null, isOpen:null, band:null, provider:usePoly?"Polygon":"Twelve Data"});
      }
      setLiveMeta({sym,when:new Date().toLocaleTimeString(),count:candles.length,resolution,provider:usePoly?"Polygon":"Twelve Data"});
      const isPos=mode==="position";
      const scorer=isPos?scorePosition:scoreAt;
      const hold=isPos;
      const SL=isPos?3.0:slMult, TP=isPos?6.0:tpMult, costs={slip:slipPct,comm:commPct};
      const result=analyze(candles,sym,market,strategy,SL,TP);
      const liveScore=scorer(candles); if(liveScore){result.signal=liveScore.signal;result.modeScore=liveScore.score;}
      setRows(candles);setAnalysis(result);
      const liveBt=candles.length>=40?runBacktest(candles,scorer,SL,TP,costs,null,hold):null;
      setBacktest(liveBt);
      setAbTest(candles.length>=40?{current:runBacktest(candles,scorer,SL,TP,costs,null,hold),legacy:runBacktest(candles,scoreFlat,SL,TP,costs)}:null);
      if(candles.length>=60){const sp=Math.floor(candles.length*0.7);setOosTest({splitIdx:sp,trainPct:70,testPct:30,inSample:runBacktest(candles,scorer,SL,TP,costs,{start:30,end:sp},hold),outSample:runBacktest(candles,scorer,SL,TP,costs,{start:sp,end:candles.length},hold)});}else{setOosTest(null);}
      setSweep(null);
      const liveVerdict=liveBt?.stats?.significance||null;
      const liveMutedFlag=(liveVerdict!=="SIGNIFICANT"&&liveVerdict!=="SUGGESTIVE")||auditData(candles).suspect;
      setHistory(h=>[{time:new Date().toLocaleTimeString(),ticker:sym,signal:result.signal,confidence:result.confidence,price:candles[candles.length-1].close,trend:result.trend,verdict:liveVerdict,muted:liveMutedFlag},...h].slice(0,10));
      // Fill the AUTOPSY from the precomputed SEC database (same-origin, instant).
      // P/E and P/B are derived from the live price; the rest are filed figures.
      // Auto-pulled numbers start UNVERIFIED until the user checks them against
      // a primary filing, consistent with the app's transparency rule.
      const fnd=fundamentalsFor(sym,market,candles[candles.length-1].close,fundaDB);
      if(fnd.map){
        setFunda(prev=>({...prev,...fnd.map}));
        setFundaAuto(Object.keys(fnd.map).reduce((a,k)=>(a[k]=true,a),{}));
        setFundaVerified(false);
      }
      setFundaMeta(fnd.meta?{...fnd.meta,sym}:null);
      // ── Market Outlook — real index session moves + freshness gate (best-effort) ──
      try{
        if(usePoly){
          const {idx, moves}=await polyFetchIndexMoves(resolution, key);
          const o=buildOutlook(candles, result.trend, idx, {proxies:OUTLOOK_INDICES, liveMoves:moves});
          setOutlook(o);
          // Refine the LIVE strip's freshness with the authoritative market_status.
          if(o&&o.fresh){ setLiveFreshness(f=>{ const st=(f&&f.stalenessSec!=null)?f.stalenessSec:o.fresh.stalenessSec; return {stalenessSec:st, isOpen:o.fresh.isOpen, band:classifyFreshness(st,o.fresh.isOpen), provider:"Polygon"}; }); }
        }else{
          const proxies=OUTLOOK_PROXIES.map(p=>p[0]);
          const idxArrs=await Promise.all(proxies.map(async ps=>{
            const u="https://api.twelvedata.com/time_series?symbol="+encodeURIComponent(ps)+"&interval="+interval+"&outputsize=300&apikey="+encodeURIComponent(key);
            const r=await fetch(u); const d=await r.json();
            if(!d.values||!d.values.length) throw new Error("no outlook data for "+ps);
            return d.values.slice().reverse().map(v=>({date:v.datetime,close:+parseFloat(v.close).toFixed(4)})).filter(x=>x.close>0);
          }));
          const idx={}; proxies.forEach((ps,i)=>idx[ps]=idxArrs[i]);
          setOutlook(buildOutlook(candles, result.trend, idx));
        }
      }catch(_){ setOutlook(null); }
      setTab("signals");
    }catch(e){setError(e.message||"Live fetch failed.");setTab("live");}
    finally{setFetching(false);}
  }

  function run(slOverride, tpOverride, costOverride) {
    setError("");
    setOutlook(null); // Outlook needs live market data; not available on the CSV path
    const data = parseCSV(csv);
    if (data.length < 10) { setError("Need at least 10 rows. Click LOAD SAMPLE to see the expected format."); return; }
    const isPos = mode==="position";
    const scorer = isPos ? scorePosition : scoreAt;
    const hold = isPos; // position mode holds until thesis break
    // Position mode uses wider stops/targets by default unless user overrides
    const SL = slOverride!=null?slOverride:(isPos?3.0:slMult);
    const TP = tpOverride!=null?tpOverride:(isPos?6.0:tpMult);
    const costs = costOverride || {slip:slipPct, comm:commPct};
    const result = analyze(data, ticker, market, strategy, SL, TP);
    // Override the live signal with the mode's scorer so the headline matches the mode
    const liveScore = scorer(data);
    if (liveScore) { result.signal = liveScore.signal; result.modeScore = liveScore.score; }
    setRows(data);
    setAnalysis(result);
    // Run backtest if we have enough history
    const bt = data.length >= 40 ? runBacktest(data, scorer, SL, TP, costs, null, hold) : null;
    setBacktest(bt);
    setAbTest(data.length >= 40 ? {
      current: runBacktest(data, scorer, SL, TP, costs, null, hold),
      legacy:  runBacktest(data, scoreFlat, SL, TP, costs),
    } : null);
    // Out-of-sample split: train on first 70%, test on last 30%
    if (data.length >= 60) {
      const splitIdx = Math.floor(data.length * 0.7);
      setOosTest({
        splitIdx,
        trainPct: 70, testPct: 30,
        inSample:  runBacktest(data, scorer, SL, TP, costs, {start:30, end:splitIdx}, hold),
        outSample: runBacktest(data, scorer, SL, TP, costs, {start:splitIdx, end:data.length}, hold),
      });
    } else {
      setOosTest(null);
    }
    // Freeze the transparency verdict AT LOG TIME — the history is an audit
    // trail of how confident the tool was then, not a number we re-judge later.
    const loggedVerdict = bt?.stats?.significance || null;
    const loggedMuted   = (loggedVerdict!=="SIGNIFICANT" && loggedVerdict!=="SUGGESTIVE") || auditData(data).suspect;
    setHistory(h => [{
      time: new Date().toLocaleTimeString(),
      ticker, signal: result.signal, confidence: result.confidence,
      price: data[data.length-1].close, trend: result.trend,
      verdict: loggedVerdict, muted: loggedMuted,
    }, ...h].slice(0,10));
    setTab("signals");
  }

  // Parameter sweep: test a grid of SL/TP combos, score each on full + OOS
  function runSweep() {
    const data = parseCSV(csv);
    if (data.length < 60) { setError("Parameter sweep needs at least 60 candles for a reliable in/out-of-sample split."); return; }
    setSweeping(true);
    setError("");
    const costs = {slip:slipPct, comm:commPct};
    const splitIdx = Math.floor(data.length * 0.7);
    const slRange = [1.0, 1.5, 2.0, 2.5];
    const tpRange = [1.5, 2.0, 3.0, 4.0];
    // Defer heavy compute so the "calculating" state can paint
    setTimeout(()=>{
      const results = [];
      slRange.forEach(sl => tpRange.forEach(tp => {
        const full = runBacktest(data, scoreAt, sl, tp, costs);
        const inS  = runBacktest(data, scoreAt, sl, tp, costs, {start:30, end:splitIdx});
        const outS = runBacktest(data, scoreAt, sl, tp, costs, {start:splitIdx, end:data.length});
        const robust  = full.stats.total>=5 && inS.stats.totalReturn>0 && outS.stats.totalReturn>0;
        const overfit = inS.stats.totalReturn>2 && outS.stats.totalReturn<=0;
        results.push({
          sl, tp, rr:parseFloat((tp/sl).toFixed(2)),
          fullRet: full.stats.totalReturn, trades: full.stats.total,
          pf: full.stats.profitFactor,
          inRet: inS.stats.totalReturn, outRet: outS.stats.totalReturn,
          robust, overfit,
        });
      }));
      results.sort((a,b)=>b.fullRet-a.fullRet);
      const bestRobust = results.find(r=>r.robust) || null;
      setSweep({results, bestRobust, slRange, tpRange});
      setSweeping(false);
    }, 50);
  }

  // Position sizing
  const accNum  = parseFloat(account)||10000;
  const riskNum = parseFloat(riskPct)||1;
  const riskAmt = accNum*(riskNum/100);
  const slDist  = analysis ? Math.abs(analysis.entry - analysis.sl) : 0;
  const posSize = slDist>0 ? Math.floor(riskAmt/slDist) : 0;
  const posVal  = analysis ? posSize*analysis.entry : 0;

  const last  = rows[rows.length-1];
  const first = rows[0];
  const pct   = last&&first ? ((last.close-first.close)/first.close*100).toFixed(2) : null;

  // ─ Design tokens ─
  const BG="#080b14",BG2="#0d1120",BG3="#0b0e1c",BORD="#1a2035",DIM="#546e7a",FADE="#37474f";
  const card={background:BG2,border:"1px solid "+BORD,borderRadius:6,padding:16,marginBottom:14};
  const lbl={fontSize:10,color:DIM,letterSpacing:2,marginBottom:8,display:"block"};
  const pill=on=>({background:on?"rgba(0,230,118,0.08)":BG,border:"1px solid "+(on?"#00e67699":BORD),color:on?"#00e676":"#78909c",padding:"4px 10px",borderRadius:3,cursor:"pointer",fontFamily:"inherit",fontSize:10,letterSpacing:1,marginRight:4,marginBottom:4});
  const inp={background:BG,border:"1px solid "+BORD,color:"#dce6f0",padding:"9px 12px",borderRadius:4,fontFamily:"inherit",fontSize:12,width:"100%",outline:"none",boxSizing:"border-box"};
  const runBtn={background:"linear-gradient(135deg,#00e676,#00bcd4)",border:"none",color:"#000",padding:"13px 0",fontFamily:"inherit",fontSize:12,fontWeight:700,letterSpacing:3,cursor:"pointer",borderRadius:4,width:"100%"};
  const tBtn=on=>({background:"none",border:"none",cursor:"pointer",padding:"10px 16px",fontFamily:"inherit",fontSize:11,letterSpacing:2,color:on?"#00e676":DIM,borderBottom:"2px solid "+(on?"#00e676":"transparent")});

  return (
    <div style={{minHeight:"100vh",background:BG,color:"#dce6f0",fontFamily:"'IBM Plex Mono',monospace",paddingBottom:60}}>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>

      {/* Header */}
      <div style={{background:BG3,borderBottom:"1px solid "+BORD,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:4,color:"#00e676"}}>SIGNAL</span>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:4,color:"#00bcd4"}}>FORGE</span>
          <span style={{fontSize:9,color:FADE,letterSpacing:2,marginLeft:10}}>PRO TRADING ANALYZER</span>
        </div>
        <div style={{fontSize:10,color:FADE}}>RSI · MACD · BB · STOCH · ADX · OBV · VWAP · PATTERNS · DIVERGENCE</div>
      </div>

      {/* Tabs */}
      <div style={{background:BG3,borderBottom:"1px solid "+BORD,padding:"0 20px",display:"flex"}}>
        {[["live","⚡ LIVE"],["input","▣ DATA"],["signals","◈ SIGNALS"],["outlook","◎ OUTLOOK"],["backtest","⟲ BACKTEST"],["replay","▶ REPLAY"],["value","✚ AUTOPSY"],["evidence","🔬 EVIDENCE"],["position","⊞ SIZE"],["history","◷ HISTORY"],["paper","📒 FORWARD TEST"]].map(([k,l])=>(
          <button key={k} style={tBtn(tab===k)} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>

      <div style={{maxWidth:920,margin:"0 auto",padding:"18px 14px"}}>

        {/* ── LIVE TAB ── */}
        {tab==="live"&&(
          <>
            <div style={{...card,border:"1px solid rgba(0,230,118,0.25)"}}>
              <span style={lbl}>⚡ LIVE MARKET DATA — {provider==="polygon"?"via Polygon.io":"via Twelve Data"}</span>
              <div style={{fontSize:11,color:"#90a4ae",lineHeight:1.8,marginBottom:14}}>Pulls real market data and runs the full engine — backtest, validation, sweep, signals — instantly. {provider==="polygon"?"Polygon serves real-time prices, TRUE index values (S&P 500 · Dow · Nasdaq) and a last-trade timestamp, so the app shows exactly how fresh the feed is.":"Free Twelve Data key (800 calls/day, no card) — fallback feed; no tick timestamp."}</div>
              <span style={lbl}>DATA PROVIDER</span>
              <div style={{display:"flex",gap:10,marginBottom:12}}>
                <button onClick={()=>setProvider("polygon")} style={{flex:1,padding:"9px 8px",borderRadius:6,cursor:"pointer",background:provider==="polygon"?"rgba(0,230,118,0.08)":"#060810",border:"1px solid "+(provider==="polygon"?"#00e676":"#1a2035"),color:provider==="polygon"?"#00e676":"#90a4ae",fontWeight:700,fontSize:11}}>◆ POLYGON · realtime + indices</button>
                <button onClick={()=>setProvider("twelvedata")} style={{flex:1,padding:"9px 8px",borderRadius:6,cursor:"pointer",background:provider==="twelvedata"?"rgba(0,188,212,0.08)":"#060810",border:"1px solid "+(provider==="twelvedata"?"#00bcd4":"#1a2035"),color:provider==="twelvedata"?"#00bcd4":"#90a4ae",fontWeight:700,fontSize:11}}>○ TWELVE DATA · fallback</button>
              </div>
              {provider==="polygon"?(
                <>
                  <span style={lbl}>POLYGON REST API KEY</span>
                  <input style={inp} type="password" value={polyKey} onChange={e=>setPolyKey(e.target.value)} placeholder="Paste your Polygon REST key…"/>
                  <div style={{fontSize:10,color:DIM,lineHeight:1.9,marginTop:8}}>Key from <a href="https://polygon.io/dashboard/api-keys" target="_blank" rel="noreferrer" style={{color:"#00bcd4"}}>polygon.io</a> → <b>Accessing the API</b> tab (the REST key — not the Flat-Files S3 secret). Free tier is 15-min delayed; Developer+ is real-time. Saved on this device only.</div>
                </>
              ):(
                <>
                  <span style={lbl}>TWELVE DATA API KEY</span>
                  <input style={inp} type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="Paste your free Twelve Data key…"/>
                  <div style={{fontSize:10,color:DIM,lineHeight:1.9,marginTop:8}}>No key? <a href="https://twelvedata.com" target="_blank" rel="noreferrer" style={{color:"#00bcd4"}}>twelvedata.com</a> → sign up free → copy key. Saved on this device only.</div>

                              else{verdict="tie";vcol="#ffd740";}

                              </tr>

                    </div>
                    <div style={{marginTop:12,padding:12,background:"#060810",borderRadius:4,fontSize:11,color:"#90a4ae",lineHeight:1.9}}>
                      {(()=>{
                        const o=abTest.legacy.stats, n=abTest.current.stats;
                        const oPF=o.profitFactor==="∞"?999:parseFloat(o.profitFactor);
                        const nPF=n.profitFactor==="∞"?999:parseFloat(n.profitFactor);
                        if(o.total===0&&n.total===0) return "Neither logic produced trades on this data — not enough signals fired. Try a longer history or more volatile instrument.";
                        const pfBetter=nPF>oPF, retBetter=n.totalReturn>o.totalReturn, wrBetter=n.winRate>o.winRate;
                        const wins=[pfBetter,retBetter,wrBetter].filter(Boolean).length;
                        if(wins>=2) return "✓ On this data, the NEW confluence logic improved risk-adjusted performance — higher "+[pfBetter?"profit factor":null,retBetter?"return":null,wrBetter?"win rate":null].filter(Boolean).join(", ")+". Fewer, higher-conviction trades paid off here.";
                        if(wins===0) return "✗ On this data, the NEW logic did NOT outperform — the stricter filter either missed winners or the old logic happened to suit this instrument. This is exactly why we test rather than assume.";
                        return "≈ Mixed result on this data — the new logic improved some metrics but not others. Risk profile shifted rather than strictly reduced. Test on more data before concluding.";
                      })()}
                    </div>
                    <div style={{marginTop:8,fontSize:9,color:FADE,lineHeight:1.7}}>
                      Higher profit factor &amp; expectancy = better risk/reward. This compares both logics on the exact same candles, so the numbers — not opinion — tell you whether the upgrade helped.
                    </div>
                  </div>
                )}

                {/* Summary stats */}
                <div style={{...card,background:"linear-gradient(135deg,#0e1320,#0b1025)"}}>
                  <span style={lbl}>⟲ BACKTEST RESULTS · {ticker} · {rows.length} candles · {strategy}</span>
                  <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap",marginBottom:8,padding:"10px 12px",background:"#060810",borderRadius:4}}>
                    <span style={{fontSize:9,color:DIM,letterSpacing:1}}>RE-TUNE:</span>
                    <label style={{fontSize:10,color:"#ff5252",display:"flex",alignItems:"center",gap:6}}>
                      SL {slMult.toFixed(1)}×
                      <input type="range" min="0.5" max="3" step="0.1" value={slMult} onChange={e=>{const v=parseFloat(e.target.value);setSlMult(v);run(v,tpMult,{slip:slipPct,comm:commPct});}} style={{accentColor:"#ff5252",width:90}}/>
                    </label>
                    <label style={{fontSize:10,color:"#00e676",display:"flex",alignItems:"center",gap:6}}>
                      TP {tpMult.toFixed(1)}×
                      <input type="range" min="0.5" max="5" step="0.1" value={tpMult} onChange={e=>{const v=parseFloat(e.target.value);setTpMult(v);run(slMult,v,{slip:slipPct,comm:commPct});}} style={{accentColor:"#00e676",width:90}}/>
                    </label>
                    <span style={{fontSize:10,color:"#ffd740",fontWeight:700}}>R/R 1:{(tpMult/slMult).toFixed(2)}</span>
                  </div>
                  <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap",marginBottom:14,padding:"10px 12px",background:"#060810",borderRadius:4}}>
                    <span style={{fontSize:9,color:DIM,letterSpacing:1}}>COSTS:</span>
                    <label style={{fontSize:10,color:"#ff8a80",display:"flex",alignItems:"center",gap:6}}>
                      SLIPPAGE {slipPct.toFixed(2)}%/side
                      <input type="range" min="0" max="0.3" step="0.01" value={slipPct} onChange={e=>{const v=parseFloat(e.target.value);setSlipPct(v);run(slMult,tpMult,{slip:v,comm:commPct});}} style={{accentColor:"#ff8a80",width:90}}/>
                    </label>
                    <label style={{fontSize:10,color:"#ffb74d",display:"flex",alignItems:"center",gap:6}}>
                      COMMISSION {commPct.toFixed(2)}%/side
                      <input type="range" min="0" max="0.2" step="0.01" value={commPct} onChange={e=>{const v=parseFloat(e.target.value);setCommPct(v);run(slMult,tpMult,{slip:slipPct,comm:v});}} style={{accentColor:"#ffb74d",width:90}}/>
                    </label>
                    <span style={{fontSize:9,color:FADE}}>round-trip cost: {((slipPct+commPct)*2).toFixed(2)}%/trade</span>
                  </div>
                  {/* Cost presets */}
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
                    <button style={{...pill(slipPct===0&&commPct===0),marginBottom:0}} onClick={()=>{setSlipPct(0);setCommPct(0);run(slMult,tpMult,{slip:0,comm:0});}}>Zero (ideal)</button>
                    <button style={{...pill(slipPct===0.02&&commPct===0),marginBottom:0}} onClick={()=>{setSlipPct(0.02);setCommPct(0);run(slMult,tpMult,{slip:0.02,comm:0});}}>Retail stock</button>
                    <button style={{...pill(slipPct===0.05&&commPct===0.01),marginBottom:0}} onClick={()=>{setSlipPct(0.05);setCommPct(0.01);run(slMult,tpMult,{slip:0.05,comm:0.01});}}>Typical retail</button>
                    <button style={{...pill(slipPct===0.08&&commPct===0.02),marginBottom:0}} onClick={()=>{setSlipPct(0.08);setCommPct(0.02);run(slMult,tpMult,{slip:0.08,comm:0.02});}}>Forex/CFD</button>
                  </div>
                  {/* Gross vs Net headline */}
                  {backtest.stats.total>0&&(
                    <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
                      <div style={{flex:1,minWidth:130,background:"#060810",padding:12,borderRadius:4,borderLeft:"3px solid #546e7a"}}>
                        <div style={{fontSize:9,color:DIM,letterSpacing:1,marginBottom:4}}>GROSS RETURN (no costs)</div>
                        <div style={{fontSize:18,fontWeight:700,color:backtest.stats.grossReturn>=0?"#90a4ae":"#ff8a80"}}>{backtest.stats.grossReturn>=0?"+":""}{backtest.stats.grossReturn}%</div>
                      </div>
                      <div style={{flex:1,minWidth:130,background:"#060810",padding:12,borderRadius:4,borderLeft:"3px solid #ffb74d"}}>
                        <div style={{fontSize:9,color:DIM,letterSpacing:1,marginBottom:4}}>COST DRAG</div>

                        <div style={{fontSize:9,color:DIM,letterSpacing:1,marginBottom:4}}>NET RETURN (after costs)</div>

                        </div>
                      </div>
                    </div>
                  )}
                  {backtest.stats.total>0&&backtest.stats.grossReturn>0&&backtest.stats.totalReturn<0&&(
                    <div style={{background:"rgba(255,82,82,0.08)",border:"1px solid rgba(255,82,82,0.3)",borderRadius:4,padding:10,fontSize:10,color:"#ff8a80",lineHeight:1.7,marginBottom:14}}>
                      ⚠ REALITY CHECK: This strategy is profitable on paper (+{backtest.stats.grossReturn}%) but <strong>loses money after costs</strong> ({backtest.stats.totalReturn}%). The edge doesn't survive real-world friction. This is the single most common reason backtested strategies fail live.
                    </div>
                  )}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginTop:6}}>
                    {[
                      {l:"TOTAL TRADES",v:backtest.stats.total,c:"#dce6f0"},
                      {l:"WIN RATE",v:backtest.stats.winRate+"%",c:backtest.stats.winRate>=50?"#00e676":"#ff5252"},
                      {l:"WINS",v:backtest.stats.wins,c:"#00e676"},
                      {l:"LOSSES",v:backtest.stats.losses,c:"#ff5252"},

                      {l:"PROFIT FACTOR",v:backtest.stats.profitFactor,c:backtest.stats.profitFactor>=1.5?"#00e676":backtest.stats.profitFactor>=1?"#ffd740":"#ff5252"},
                      {l:"EXPECTANCY",v:(backtest.stats.expectancy>=0?"+":"")+backtest.stats.expectancy+"%",c:backtest.stats.expectancy>=0?"#00e676":"#ff5252"},
                      {l:"AVG WIN / LOSS",v:"+"+backtest.stats.avgWin+"% / -"+backtest.stats.avgLoss+"%",c:"#90a4ae"},
                    ].map(x=>(
                      <div key={x.l} style={{background:"#060810",padding:12,borderRadius:4}}>
                        <div style={{fontSize:9,color:DIM,letterSpacing:1,marginBottom:4}}>{x.l}</div>
                        <div style={{fontSize:16,fontWeight:700,color:x.c}}>{x.v}</div>

                  </div>

                    {backtest.stats.total===0
                      ? "No completed trades in this dataset — the signal logic never produced a confirmed BUY/SELL entry that resolved. Try a longer history or a more volatile instrument."
                      : "Across "+rows.length+" candles, the strategy took "+backtest.stats.total+" trades with a "+backtest.stats.winRate+"% win rate. "+
                        "Profit factor "+backtest.stats.profitFactor+" ("+(backtest.stats.profitFactor==="∞"||backtest.stats.profitFactor>=1.5?"strong":backtest.stats.profitFactor>=1?"marginally profitable":"unprofitable")+"). "+
                        "Each trade averaged "+(backtest.stats.expectancy>=0?"+":"")+backtest.stats.expectancy+"% expectancy. "+
                        (backtest.openTrade?"One trade is still open at period end.":"")}
                  </div>
                </div>

                {/* Statistical Validation */}
                {backtest.stats.total>0&&(
                  <div style={card}>
                    <span style={lbl}>📐 STATISTICAL VALIDATION — can you trust these results?</span>
                    {(()=>{
                      const s=backtest.stats;
                      const sigCfg={
                        "SIGNIFICANT":{c:"#00e676",msg:"Strong evidence of a real edge — enough trades and the average result is well clear of random noise."},
                        "SUGGESTIVE":{c:"#ffd740",msg:"Hints of an edge, but not conclusive. Gather more trades before trusting it."},
                        "NOT SIGNIFICANT":{c:"#ff5252",msg:"Results are statistically indistinguishable from random. No proven edge here."},
                        "TOO FEW TRADES":{c:"#ff8a80",msg:"Sample far too small to mean anything. You need 30+ trades for any statistical confidence. Treat these numbers as anecdote, not evidence."},
                      };
                      const sc=sigCfg[s.significance]||sigCfg["NOT SIGNIFICANT"];
                      return(
                        <>
                          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginTop:6}}>
                            {[
                              {l:"SAMPLE SIZE",v:s.total+" trades",c:s.total>=30?"#00e676":s.total>=15?"#ffd740":"#ff5252"},
                              {l:"SHARPE (per trade)",v:s.sharpe,c:s.sharpe>=0.3?"#00e676":s.sharpe>=0?"#ffd740":"#ff5252"},
                              {l:"MAX DRAWDOWN",v:"-"+s.maxDrawdown+"%",c:"#ff5252"},
                              {l:"MAX CONSEC LOSSES",v:s.maxConsecLoss,c:s.maxConsecLoss>=5?"#ff5252":"#ffd740"},
                              {l:"RETURN STD DEV",v:s.stdDev+"%",c:"#90a4ae"},
                              {l:"T-STATISTIC",v:s.tStat,c:Math.abs(s.tStat)>2?"#00e676":Math.abs(s.tStat)>1.5?"#ffd740":"#ff5252"},
                            ].map(x=>(
                              <div key={x.l} style={{background:"#060810",padding:12,borderRadius:4}}>
                                <div style={{fontSize:9,color:DIM,letterSpacing:1,marginBottom:4}}>{x.l}</div>
                                <div style={{fontSize:16,fontWeight:700,color:x.c}}>{x.v}</div>
                              </div>
                            ))}
                          </div>
                          <div style={{marginTop:12,padding:12,borderRadius:4,background:sc.c+"11",border:"1px solid "+sc.c+"44"}}>
                            <div style={{fontSize:11,fontWeight:700,color:sc.c,letterSpacing:1,marginBottom:4}}>VERDICT: {s.significance}</div>
                            <div style={{fontSize:10,color:"#90a4ae",lineHeight:1.8}}>{sc.msg}</div>
                          </div>
                          <div style={{marginTop:8,fontSize:9,color:FADE,lineHeight:1.7}}>
                            Sharpe = avg return ÷ volatility (higher = smoother gains). Max drawdown = worst peak-to-trough drop. Max consecutive losses = the losing streak you'd have had to stomach. T-stat &gt; 2 with 30+ trades ≈ 95% confidence the edge isn't luck.
                          </div>
                        </>
                      );
                    })()}
                  </div>
                )}

                {/* Out-of-Sample Validation */}
                {oosTest&&(()=>{
                  const isR=oosTest.inSample.stats.totalReturn, osR=oosTest.outSample.stats.totalReturn;
                  const osN=oosTest.outSample.stats.total;
                  let vCol,verdict,msg;
                  if(osN<3){vCol="#ff8a80";verdict="INCONCLUSIVE";msg="Too few trades in the test window to judge. Need more data for a reliable out-of-sample read.";}
                  else if(isR>0&&osR>0){vCol="#00e676";verdict="EDGE HELD";msg="The strategy stayed profitable on data it was never tuned against — the strongest sign the edge is real, not curve-fit.";}
                  else if(isR>0&&osR<=0){vCol="#ff5252";verdict="LIKELY OVERFIT";msg="Profitable in-sample but NOT out-of-sample. Classic overfitting signature — the 'edge' fit past noise and didn't generalize. Do not trust it.";}
                  else if(isR<=0&&osR>0){vCol="#ffd740";verdict="REGIME SHIFT?";msg="Weak in-sample but better out-of-sample — could be a market regime change, or small-sample luck. Inconclusive.";}
                  else{vCol="#ff5252";verdict="NO EDGE";msg="Unprofitable in both halves. No evidence of any edge on this instrument with current settings.";}
                  return(
                  <div style={{...card,border:"1px solid rgba(0,188,212,0.25)"}}>
                    <span style={lbl}>🔬 OUT-OF-SAMPLE TEST — does the edge survive on unseen data?</span>
                    <div style={{fontSize:10,color:DIM,lineHeight:1.7,marginBottom:12}}>
                      Trained on first 70% of candles ({oosTest.splitIdx} bars), tested on the last 30% it never "saw." If performance collapses out-of-sample, the edge was likely curve-fit to past noise.
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                      {[
                        {label:"IN-SAMPLE (train, 70%)",d:oosTest.inSample,accent:"#546e7a"},
                        {label:"OUT-OF-SAMPLE (test, 30%)",d:oosTest.outSample,accent:"#00bcd4"},
                      ].map(col=>(
                        <div key={col.label} style={{background:"#060810",padding:12,borderRadius:4,borderTop:"2px solid "+col.accent}}>
                          <div style={{fontSize:9,color:DIM,letterSpacing:1,marginBottom:8}}>{col.label}</div>
                          {[
                            {l:"Trades",v:col.d.stats.total},
                            {l:"Win rate",v:col.d.stats.winRate+"%"},
                            {l:"Return",v:(col.d.stats.totalReturn>=0?"+":"")+col.d.stats.totalReturn+"%",c:col.d.stats.totalReturn>=0?"#00e676":"#ff5252"},
                            {l:"Profit factor",v:col.d.stats.profitFactor},
                            {l:"Expectancy",v:(col.d.stats.expectancy>=0?"+":"")+col.d.stats.expectancy+"%",c:col.d.stats.expectancy>=0?"#00e676":"#ff5252"},
                          ].map(row=>(
                            <div key={row.l} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid "+BG2,fontSize:11}}>
                              <span style={{color:DIM}}>{row.l}</span>
                              <span style={{color:row.c||"#dce6f0",fontWeight:700}}>{row.v}</span>
                            </div>
                          ))}
                        </div>
                      ))}
                    </div>
                    <div style={{marginTop:12,padding:12,borderRadius:4,background:vCol+"11",border:"1px solid "+vCol+"44"}}>
                      <div style={{fontSize:11,fontWeight:700,color:vCol,letterSpacing:1,marginBottom:4}}>VERDICT: {verdict}</div>
                      <div style={{fontSize:10,color:"#90a4ae",lineHeight:1.8}}>{msg}</div>
                    </div>
                  </div>
                  );
                })()}

                {/* Parameter Sweep */}
                <div style={{...card,border:"1px solid rgba(224,64,251,0.2)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:8}}>
                    <span style={{...lbl,marginBottom:0}}>⚗ PARAMETER SWEEP — auto-find the best SL/TP combo</span>
                    <button style={{...pill(false),marginBottom:0,background:"rgba(224,64,251,0.1)",border:"1px solid #e040fb88",color:"#e040fb",fontWeight:700}}
                      onClick={runSweep} disabled={sweeping}>
                      {sweeping?"⏳ TESTING…":"▶ RUN SWEEP (16 combos)"}
                    </button>
                  </div>
                  <div style={{fontSize:10,color:DIM,lineHeight:1.7,marginBottom:10}}>
                    Tests 16 stop-loss / take-profit combinations, ranks them by net return, and checks each against the out-of-sample split. <span style={{color:"#e040fb"}}>This is how you find robust settings — but beware: picking the single best in-sample combo is itself overfitting. Prefer combos flagged ROBUST (profitable in AND out of sample).</span>
                  </div>
                  {!sweep&&!sweeping&&(
                    <div style={{textAlign:"center",padding:"20px 0",color:FADE,fontSize:11}}>Click RUN SWEEP to test the grid. Needs 60+ candles.</div>
                  )}
                  {sweep&&(
                    <>
                      {sweep.bestRobust?(
                        <div style={{padding:12,borderRadius:4,background:"rgba(0,230,118,0.08)",border:"1px solid rgba(0,230,118,0.3)",marginBottom:12}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#00e676",letterSpacing:1,marginBottom:4}}>★ BEST ROBUST COMBO: SL {sweep.bestRobust.sl}× / TP {sweep.bestRobust.tp}× (R/R 1:{sweep.bestRobust.rr})</div>
                          <div style={{fontSize:10,color:"#90a4ae",lineHeight:1.7}}>
                            Full {sweep.bestRobust.fullRet>=0?"+":""}{sweep.bestRobust.fullRet}% · in-sample {sweep.bestRobust.inRet>=0?"+":""}{sweep.bestRobust.inRet}% · out-of-sample {sweep.bestRobust.outRet>=0?"+":""}{sweep.bestRobust.outRet}%. Profitable in both halves — the most trustworthy choice.
                            <button style={{...pill(false),marginTop:8,marginBottom:0,fontSize:9}} onClick={()=>{setSlMult(sweep.bestRobust.sl);setTpMult(sweep.bestRobust.tp);run(sweep.bestRobust.sl,sweep.bestRobust.tp,{slip:slipPct,comm:commPct});}}>APPLY THIS COMBO</button>
                          </div>
                        </div>
                      ):(
                        <div style={{padding:12,borderRadius:4,background:"rgba(255,82,82,0.07)",border:"1px solid rgba(255,82,82,0.25)",marginBottom:12,fontSize:10,color:"#ff8a80",lineHeight:1.7}}>
                          ⚠ No combo was profitable in BOTH in-sample and out-of-sample. No robust settings found — the strategy may not have a real edge on this instrument, regardless of SL/TP tuning. Don't cherry-pick the best in-sample row; that's the overfitting trap.
                        </div>
                      )}
                      <div style={{overflowX:"auto"}}>
                        <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                          <thead>
                            <tr style={{color:DIM,fontSize:9,letterSpacing:1}}>
                              {["SL×","TP×","R/R","FULL RET","TRADES","IN-S","OUT-S","FLAG"].map(h=>(
                                <td key={h} style={{padding:"5px 6px",borderBottom:"1px solid "+BORD,textAlign:h==="SL×"||h==="TP×"||h==="R/R"?"left":"right"}}>{h}</td>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {sweep.results.map((r,i)=>(
                              <tr key={i} style={{borderBottom:"1px solid "+BG2,background:r.robust?"rgba(0,230,118,0.05)":r.overfit?"rgba(255,82,82,0.05)":"transparent"}}>
                                <td style={{padding:"6px",color:"#90a4ae"}}>{r.sl.toFixed(1)}</td>
                                <td style={{padding:"6px",color:"#90a4ae"}}>{r.tp.toFixed(1)}</td>
                                <td style={{padding:"6px",color:"#ffd740"}}>1:{r.rr}</td>
                                <td style={{padding:"6px",textAlign:"right",color:r.fullRet>=0?"#00e676":"#ff5252",fontWeight:700}}>{r.fullRet>=0?"+":""}{r.fullRet}%</td>

                                <td style={{padding:"6px",textAlign:"right",color:r.inRet>=0?"#69f0ae":"#ff8a80"}}>{r.inRet>=0?"+":""}{r.inRet}%</td>

                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                      <div style={{marginTop:8,fontSize:9,color:FADE,lineHeight:1.7}}>
                        Green rows = profitable in &amp; out of sample (robust). Red rows = profitable in-sample only (overfit). The full-return ranking is tempting but the FLAG column is what matters — a lower-return robust combo beats a high-return overfit one every time.
                      </div>
                    </>
                  )}
                </div>

                {/* Equity curve */}
                {backtest.curve.length>1&&(
                  <div style={card}>
                    <span style={lbl}>◈ EQUITY CURVE (cumulative % return)</span>
                    <EquityCurve curve={backtest.curve}/>
                  </div>
                )}

                {/* Trade log */}
                <div style={card}>
                  <span style={lbl}>◈ TRADE LOG ({backtest.trades.length})</span>
                  {backtest.trades.length===0
                    ? <div style={{color:FADE,fontSize:11}}>No completed trades.</div>
                    : (
                      <div style={{overflowX:"auto"}}>
                        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                          <thead>
                            <tr style={{color:DIM,fontSize:9,letterSpacing:1}}>
                              {["#","DIR","ENTRY","EXIT","RESULT","P&L %","BARS"].map(h=>(
                                <td key={h} style={{padding:"4px 8px",borderBottom:"1px solid "+BORD}}>{h}</td>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {backtest.trades.map((t,i)=>(
                              <tr key={i} style={{borderBottom:"1px solid "+BG2}}>

                          <td style={{padding:"8px 8px",color:DIM}}>{e.rr}</td>
                          <td style={{padding:"8px 8px",color:pnlCol(unreal),fontWeight:700}}>{unreal==null?"—":(unreal>0?"+":"")+unreal.toFixed(2)+"%"}</td>
                          <td style={{padding:"8px 8px",fontSize:9,fontWeight:700,color:muted?MUT:"#00e676"}}>{edgeTxt[e.tags&&e.tags.edgeVerdict]||"—"}</td>
                        </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )}
                <div style={{marginTop:8,fontSize:9,color:FADE}}>Unrealized P&L shows only for a ticker you currently have loaded above; the CI job marks every open trade to market on each run.</div>
              </div>

              {/* Closed trades */}
              <div style={card}>
                <span style={lbl}>CLOSED TRADES ({closed.length})</span>
                {closed.length===0?(
                  <div style={{color:FADE,fontSize:11,padding:12,textAlign:"center"}}>No closed paper trades yet.</div>
                ):(
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr style={{color:DIM,fontSize:9,letterSpacing:1}}>
                      {["AS OF","TICKER","SIGNAL","ENTRY","EXIT","P&L%","BARS","EXITED","TAG"].map(h=>(
                        <td key={h} style={{padding:"4px 8px",borderBottom:"1px solid "+BORD}}>{h}</td>))}
                    </tr></thead>
                    <tbody>
                      {closed.slice().reverse().map((e,i)=>{
                        const muted=!!(e.tags&&e.tags.signalMuted);
                        const win=e.status==="WIN";
                        return(
                        <tr key={i} style={{borderBottom:"1px solid "+BG2}}>
                          <td style={{padding:"8px 8px",color:FADE}}>{e.dataAsOf?e.dataAsOf.date:"—"}</td>
                          <td style={{padding:"8px 8px",color:"#dce6f0",fontWeight:700}}>{e.ticker}</td>
                          <td style={{padding:"8px 8px",color:sCol(e.signal,muted),fontWeight:700}}>{e.signal}{muted?" ·":""}</td>
                          <td style={{padding:"8px 8px",color:"#90a4ae"}}>{fmt(e.entry)}</td>
                          <td style={{padding:"8px 8px",color:"#90a4ae"}}>{fmt(e.exit)}</td>
                          <td style={{padding:"8px 8px",color:pnlCol(e.pnlPct),fontWeight:700}}>{e.pnlPct>0?"+":""}{e.pnlPct}%</td>
                          <td style={{padding:"8px 8px",color:DIM}}>{e.barsHeld}</td>
                          <td style={{padding:"8px 8px",color:FADE}}>{e.exitDate||"—"}</td>
                          <td style={{padding:"8px 8px",fontSize:9,fontWeight:700,color:win?"#00e676":"#ff5252"}}>{e.status}{e.tags&&e.tags.dataSuspect?" ⚠":""}</td>
                        </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )}
              </div>

              {/* HOLD observations (no position) */}
              {obs.length>0&&(
                <div style={card}>
                  <span style={lbl}>OBSERVATIONS — HOLD signals ({obs.length})</span>
                  <div style={{fontSize:10,color:FADE,lineHeight:1.8}}>
                    {obs.slice().reverse().slice(0,30).map((e,i)=>(
                      <span key={i} style={{display:"inline-block",marginRight:12}}>{e.dataAsOf?e.dataAsOf.date:""} <b style={{color:"#90a4ae"}}>{e.ticker}</b> HOLD</span>
                    ))}
                  </div>
                </div>
              )}
            </>
            )}
          </>
          );
        })()}
      </div>
    </div>
  );
}

// Small stat row used by the FORWARD TEST segmented cards.
function Row({k,v,c}){
  return(
    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,padding:"2px 0"}}>
      <span style={{color:"#546e7a"}}>{k}</span>
      <span style={{color:c||"#b0bec5",fontWeight:600}}>{v}</span>
    </div>
  );
}

const container = document.getElementById("root");
ReactDOM.createRoot(container).render(<App/>);
</script>
</body>
</html>
