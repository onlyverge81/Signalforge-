            </div>
            {backtest.curve.length>1&&(<div style={card}><span style={lbl}>◈ EQUITY CURVE</span><EquityCurve curve={backtest.curve}/></div>)}
            <div style={card}><span style={lbl}>◈ TRADE LOG ({backtest.trades.length})</span>{backtest.trades.length===0?<div style={{color:FADE,fontSize:11}}>No trades.</div>:(<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}><thead><tr style={{color:DIM,fontSize:9}}>{["#","DIR","ENTRY","EXIT","RESULT","P&L%"].map(h=>(<td key={h} style={{padding:"4px 8px",textAlign:"left"}}>{h}</td>))}</tr></thead><tbody>{backtest.trades.map((t,i)=>(<tr key={i} style={{borderTop:"1px solid "+BG2}}><td style={{padding:"7px 8px",color:FADE}}>{i+1}</td><td style={{padding:"7px 8px",color:t.dir==="BUY"?"#00e676":"#ff5252",fontWeight:700}}>{t.dir}</td><td style={{padding:"7px 8px",color:"#90a4ae"}}>{fmt(t.entry)}</td><td style={{padding:"7px 8px",color:"#90a4ae"}}>{fmt(t.exit)}</td><td style={{padding:"7px 8px",color:t.result==="WIN"?"#00e676":"#ff5252",fontWeight:700}}>{t.result}</td><td style={{padding:"7px 8px",color:t.pnlPct>=0?"#00e676":"#ff5252",fontWeight:700}}>{t.pnlPct>=0?"+":""}{t.pnlPct.toFixed(2)}%</td></tr>))}</tbody></table></div>)}</div>
          </>
        )}

        {tab==="position"&&(
          <div style={card}>
            <span style={lbl}>⊞ POSITION SIZE CALCULATOR</span>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
              <div><span style={lbl}>ACCOUNT ($)</span><input style={inp} type="number" value={account} onChange={e=>setAccount(e.target.value)}/></div>
              <div><span style={lbl}>RISK (%)</span><input style={inp} type="number" value={riskPct} step="0.1" onChange={e=>setRiskPct(e.target.value)}/></div>
            </div>
            {analysis?(<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10}}>{[{l:"RISK AMOUNT",v:"$"+riskAmt.toFixed(2),c:"#ffd740"},{l:"ENTRY",v:fmt(analysis.entry),c:"#00bcd4"},{l:"STOP LOSS",v:fmt(analysis.sl),c:"#ff5252"},{l:"POSITION SIZE",v:posSize+" units",c:"#00e676"},{l:"POSITION VALUE",v:"$"+posVal.toFixed(2),c:"#69f0ae"},{l:"MAX LOSS",v:"$"+(posSize*slDist).toFixed(2),c:"#ff5252"}].map(x=>(<div key={x.l} style={{background:"#060810",padding:12,borderRadius:4,borderLeft:"3px solid "+x.c}}><div style={{fontSize:9,color:DIM,marginBottom:4}}>{x.l}</div><div style={{fontSize:14,fontWeight:700,color:x.c}}>{x.v}</div></div>))}</div>):<div style={{color:FADE,textAlign:"center",padding:20,fontSize:12}}>Run an analysis first.</div>}
          </div>
        )}

        {tab==="history"&&(
          <div style={card}><span style={lbl}>◷ HISTORY</span>{history.length===0?<div style={{color:FADE,textAlign:"center",padding:20,fontSize:12}}>No history yet.</div>:(<table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}><thead><tr style={{color:DIM,fontSize:9}}>{["TIME","TICKER","SIGNAL","CONF","PRICE"].map(h=>(<td key={h} style={{padding:"4px 8px",textAlign:"left"}}>{h}</td>))}</tr></thead><tbody>{history.map((h,i)=>(<tr key={i} style={{borderTop:"1px solid "+BG2}}><td style={{padding:"7px 8px",color:FADE}}>{h.time}</td><td style={{padding:"7px 8px",fontWeight:700}}>{h.ticker}</td><td style={{padding:"7px 8px",color:h.signal==="BUY"?"#00e676":h.signal==="SELL"?"#ff5252":"#ffd740",fontWeight:700}}>{h.signal}</td><td style={{padding:"7px 8px",color:"#90a4ae"}}>{h.confidence}%</td><td style={{padding:"7px 8px",color:"#90a4ae"}}>{fmt(h.price)}</td></tr>))}</tbody></table>)}</div>
        )}

      </div>
    </div>
  );
}

const container = document.getElementById("root");
ReactDOM.createRoot(container).render(<App/>);
</script>
</body>
</html>
