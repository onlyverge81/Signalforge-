    ws.onclose=()=>{ if(!this.closed) setTimeout(()=>{ if(!this.closed) this.connect(); }, 3000); };
    ws.onerror=()=>{ try{ ws.close(); }catch(_){} };
  }
  close(){ this.closed=true; if(this.ws){ try{ this.ws.close(); }catch(_){} this.ws=null; } }
}
// Stock OHLC bars + a best-effort freshness quote → {candles, quote:{lastTs,isOpen}}
async function polyFetchCandles(sym, resolution, key){
  const [mult,span]=POLY_RES[resolution]||[1,"day"];
  const to=new Date(), from=new Date(to.getTime()-polyWindowMs(span)), fmt=d=>d.toISOString().slice(0,10);
  const j=await polyGet("https://api.polygon.io/v2/aggs/ticker/"+encodeURIComponent(sym)+"/range/"+mult+"/"+span+"/"+fmt(from)+"/"+fmt(to)+"?adjusted=true&sort=desc&limit=5000&apiKey="+encodeURIComponent(key));
  if(!j.results||!j.results.length) throw new Error('No Polygon data for "'+sym+'". US stocks/ETFs only (e.g. AAPL, SPY).');
  // US equities (no "/" in the symbol) → drop pre/post-market intraday bars so the signal/levels
  // anchor to a real regular-session price. Crypto/forex (BTC/USD, EUR/USD) are 24/7 → untouched.
  const isEquity=!sym.includes("/");
  // sort=desc returns the MOST-RECENT bars first (so a large window can't truncate to the oldest
  // bars and leave the chart ending months in the past); reverse back to chronological for the engine.
  const candles=polyBars(filterRthResults(j.results,span,isEquity),span).reverse().slice(-1500);
  let quote=null;
  try{
    const sj=await (await fetch("https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/tickers/"+encodeURIComponent(sym)+"?apiKey="+encodeURIComponent(key))).json();
    const t=sj&&sj.ticker; if(t){ const lastTs=polyTsToMs(t.lastTrade&&t.lastTrade.t!=null?t.lastTrade.t:(t.updated!=null?t.updated:(t.min&&t.min.t))); const price=(t.lastTrade&&t.lastTrade.p!=null)?t.lastTrade.p:(t.day&&t.day.c!=null?t.day.c:(t.min&&t.min.c!=null?t.min.c:null)); quote={lastTs, price, changePct:(t.todaysChangePerc!=null?t.todaysChangePerc:null)}; }
  }catch(_){}
  return {candles, quote};
}
// ── CONTENDER-MONITOR pure logic, MIRRORED byte-for-byte from scripts/contender-monitor.mjs ──
// so the BROWSER on-demand scan (scanMonitor) produces the SAME leads board + honesty as the CI
// sweep. Keep these byte-identical to the .mjs (only `export ` is dropped); they are pure.
const PATTERN_EDGE_NOTE =
  "Convergence (coil→pop) universe edge ≈ −0.71% over 20 bars — a geometry TRIGGER, not a proven signal. Treat leads as candidates for your own eyes, never as a buy.";
// Classify one scanned record into a lead. A lead fires on ANY notable signal (extensible —
// add future setups to the OR); "grounded" is the evidence-leaning case (vetted quality + a
// live engine BUY). The convergence flag is labeled as geometry-only so it never reads as proof.
function classifyLead(rec){
  const buy  = !!(rec.engine && rec.engine.signal === "BUY");
  const conv = !!(rec.conv && rec.conv.detected);
  // FORMING is the EARLY stage — only while it has NOT yet broken out (once it pops it's a BREAKOUT).
  const forming = !!(rec.forming && rec.forming.forming) && !conv;
  const lead = buy || conv || forming;
  const grounded = !!(rec.allBoxes && buy);
  const stage = conv ? "BREAKOUT" : forming ? "FORMING" : null; // convergence lifecycle stage (null = pure engine read)
  const reasons = [];
  if(buy)  reasons.push("engine BUY (intraday — tactical, unproven)");
  if(conv) reasons.push("coil→pop BREAKOUT (geometry only; pattern edge ≈ −0.71%)");
  if(forming) reasons.push(`⏳ convergence FORMING — ribbon tightening ${(rec.forming && rec.forming.barsForming) || 0} bars (early-warning; ~1 bar to pop once it pinches)`);
  if(rec.allBoxes) reasons.push("vetted all-boxes (A/B + momentum + filing)");
  // NOTE: return `stage` (not a `forming` boolean) so the spread {...rec, ...classifyLead(rec)} never
  // clobbers rec.forming — the OBJECT carrying barsForming/tightness/startDate the UI needs.
  return { lead, grounded, stage, reasons };
}
// Rank leads: grounded first, then live BUYs, then BREAKOUT before FORMING, then by strength/tightness
// — so the dead-pattern geometry can NEVER outrank a quality-grounded engine read, and a confirmed pop
// outranks a still-forming squeeze.
function rankLeads(records){
  const stageRank = r => r.stage === "BREAKOUT" ? 2 : r.stage === "FORMING" ? 1 : 0;
  return (records || []).filter(r => r.lead).sort((a, b) => {
    if(a.grounded !== b.grounded) return a.grounded ? -1 : 1;
    const ab = a.engine && a.engine.signal === "BUY" ? 1 : 0;
    const bb = b.engine && b.engine.signal === "BUY" ? 1 : 0;
    if(ab !== bb) return bb - ab;
    if(stageRank(a) !== stageRank(b)) return stageRank(b) - stageRank(a); // BREAKOUT before FORMING
    const as = a.stage === "FORMING" ? ((a.forming && a.forming.tightness) || 0) : ((a.conv && a.conv.strength) || 0);
    const bs = b.stage === "FORMING" ? ((b.forming && b.forming.tightness) || 0) : ((b.conv && b.conv.strength) || 0);
    return bs - as;
  });
}
// Assemble the committed report. Pure → the honesty caveats + the pattern-edge note are
// guaranteed present on every report (unit-tested), and the ranking is deterministic.
function buildReport({ generatedAt, session, records = [], scanned = 0, withData = 0, dataFresh = false }){
  const ranked   = rankLeads(records.map(r => ({ ...r, ...classifyLead(r) })));
  const grounded = ranked.filter(l => l.grounded);
  return {
    generatedAt,
    sessionET: session ? { weekday: session.weekday, etMin: session.etMin } : null,
    marketOpen: !!(session && session.open),
    delayedMin: 15,
    dataFresh: !!dataFresh,
    scanned, withData,
    counts: {
      leads: ranked.length,
      grounded: grounded.length,
      buys: records.filter(r => r.engine && r.engine.signal === "BUY").length,
      convergence: records.filter(r => r.conv && r.conv.detected).length,
      forming: records.filter(r => r.forming && r.forming.forming && !(r.conv && r.conv.detected)).length,
    },
    patternEdgeNote: PATTERN_EDGE_NOTE,
    leads: ranked.slice(0, 120),
    caveats: [
      "Feed is 15-MINUTE DELAYED (Polygon Stocks Starter) — every read is ~15 min behind. Awareness, NOT real-time execution.",
      "The convergence (coil→pop) pattern is a MEASURED LOSER universe-wide (edge ≈ −0.71%); shown as a geometry trigger only.",
      "The intraday engine verdict is itself unproven (the tactical confluence is an in-sample loser, t ≈ −12.6); leads are candidates for the human, never proven signals.",
      "Grounded = a vetted all-boxes (A/B + momentum + filing) name with a live engine BUY — the most evidence-leaning case, still not OOS-proven.",
    ],
  };
}

// ─── Backtest engine ─────────────────────────────────────────────────────────
// Computes the signal score using the same logic as analyze(), but for a given
// slice of data ending at index i. Returns just the score + signal.
// Legacy flat-scoring logic (pre-confluence) — kept only for A/B comparison.
// POSITION mode: long-horizon trend-following (the "patient" philosophy).
// Only goes long, only inside an established long-term uptrend, buys pullbacks,
// holds through noise, exits only when the long trend actually breaks.
// NOTE: price-based trend-following — NOT fundamental value investing. It cannot
// see earnings, debt, or business quality, which is the real core of Buffett's edge.
function scorePosition(slice){
  if(slice.length<30)return null;
  const cl=slice.map(d=>d.close),last=slice[slice.length-1];
  // The long-term trend filter is only meaningful with a TRUE 200-bar window. With less
  // history we must NOT silently trade a short-SMA proxy (the old Math.min(200,len) bug) —
  // report "not engaged" honestly so POSITION holds instead of acting on a fake trend.
  if(cl.length<200) return {score:0, signal:"HOLD", atr:atr(slice), engaged:false,
    reason:"long-term trend needs 200 bars; have "+cl.length, trendStrength:0, dipDepth:0};
  const s50=sma(cl,50), s200=sma(cl,200), R=rsi(cl);
  if(!s50||!s200) return {score:0, signal:"HOLD", atr:atr(slice), engaged:false,
    reason:"insufficient data", trendStrength:0, dipDepth:0};
  const longUptrend = last.close>s200 && s50>s200;
  const longDowntrend = last.close<s200 && s50<s200;
  let signal="HOLD", score=0;
  if(longUptrend){
    score=3;
    if(R!=null && R<45){ signal="BUY"; score=6; }  // buy a pullback within the uptrend
  } else if(longDowntrend){
    score=-6; signal="SELL";                        // long-term thesis broken — exit/avoid
  }
  // Position-native conviction inputs (used instead of the tactical confluence number):
  //  trendStrength = how far SMA50 sits above SMA200 (regime conviction);
  //  dipDepth      = how far RSI is below the 45 buy threshold (entry conviction).
  return { score, signal, atr:atr(slice), engaged:true,
    trendStrength: s200>0 ? (s50-s200)/s200 : 0,
    dipDepth: (longUptrend && R!=null) ? Math.max(0, 45-R) : 0 };
}

// Display-only (app, not engine): in POSITION mode the verdict comes from scorePosition, so the
// number beside it must be POSITION's own conviction (regime strength + dip depth) — NOT the
// tactical confluence confidence (which would cross the wires). Also surfaces the honest
// "long-term trend filter not engaged" state when there aren't 200 bars yet.
function positionDisplay(result, liveScore){
  if(!liveScore) return result;
  result.positionEngaged = liveScore.engaged!==false;
  result.positionReason  = liveScore.reason || null;
  if(!result.positionEngaged){ result.confidence = 0; return result; }      // trend not engaged
  if(liveScore.signal==="HOLD"){ result.confidence = Math.min(result.confidence, 50); return result; }
  result.confidence = Math.min(95, Math.round(40 + (liveScore.trendStrength||0)*300 + (liveScore.dipDepth||0)));
  return result;
}

function scoreFlat(slice){
  if(slice.length<26)return null;
  const cl=slice.map(d=>d.close),last=slice[slice.length-1];
  const R=rsi(cl),M=macd(cl),B=bb(cl),S=stoch(slice);
  const s5=sma(cl,5),s10=sma(cl,10),s20=sma(cl,20),s50=sma(cl,Math.min(50,cl.length));
  const pats=patterns(slice),div=divergence(cl);
  const ADX=adxCalc(slice),OBV=obvCalc(slice),VWAP=vwapCalc(slice);
  const chg=(last.close-cl[0])/cl[0]*100,trend=chg>2?"UPTREND":chg<-2?"DOWNTREND":"SIDEWAYS";
  let s=0;
  if(R!=null)s+=R<40?3:R>70?-3:R<50?1:-1;
  if(M)s+=M.macd>0?2:-2;
  if(s5&&s10)s+=s5>s10?1:-1;
  if(s10&&s20)s+=s10>s20?1:-1;
  if(s20&&s50)s+=s20>s50?1:-1;
  s+=trend==="UPTREND"?2:trend==="DOWNTREND"?-2:0;
  if(S!=null)s+=S<25?2:S>75?-2:0;
  if(B)s+=last.close<B.lower?2:last.close>B.upper?-2:0;
  pats.forEach(p=>{s+=p.type==="BULLISH"?2:p.type==="BEARISH"?-2:0;});
  if(div?.type==="BULLISH")s+=3; if(div?.type==="BEARISH")s-=3;
  if(ADX&&ADX.adx>25)s+=ADX.plusDI>ADX.minusDI?2:-2;else if(ADX&&ADX.adx>20)s+=ADX.plusDI>ADX.minusDI?1:-1;
  if(OBV)s+=OBV.rising?1:-1;
  if(VWAP)s+=last.close>VWAP?1:-1;
  return{score:s,signal:s>=4?"BUY":s<=-4?"SELL":"HOLD",atr:atr(slice)};
}

function scoreAt(slice, drop=null, corrected=false) {
  if (slice.length < 26) return null; // need enough for MACD/SMA
  const closes = slice.map(d=>d.close), vols = slice.map(d=>d.volume);
  const last = slice[slice.length-1];

  const s5=sma(closes,5), s10=sma(closes,10), s20=sma(closes,20), s50=sma(closes,Math.min(50,closes.length));
  const pats=patterns(slice), div=divergence(closes);
  const ADX=adxCalc(slice), OBV=obvCalc(slice), VWAP=vwapCalc(slice);
  const chg=(last.close-closes[0])/closes[0]*100;
  const trend=chg>2?"UPTREND":chg<-2?"DOWNTREND":"SIDEWAYS";
  const avgV=vols.slice(0,-3).reduce((a,b)=>a+b,0)/Math.max(vols.length-3,1);

  const volSig=recV>avgV*1.15?"CONFIRMING":recV<avgV*0.85?"DIVERGING":"NEUTRAL";
  // `drop` (shadow backtests): run the same team signal with named votes removed. Default null = unchanged.
  // `corrected` (R5 shadow-corrected team): drop Div/Trend/Pat and inject their corrected forms (candidate
  // votes from the self-audit, judged OOS). Default false = unchanged byte-for-byte.
  const extra = corrected ? correctedVotes(closes, slice) : [];
  const dropList = corrected ? (drop||[]).concat(CORRECTED_DROP) : drop;
  const r=computeSignal({R,M,s5,s10,s20,s50,trend,S,B,last,pats,div,volSig,ADX,OBV,VWAP}, extra, (dropList&&dropList.length)?{drop:dropList}:{});
  return {score:r.score, signal:r.signal, atr:atr(slice)};
}

// ─── Shared trade-exit + stats helpers ───────────────────────────────────────
// Factored out of runBacktest so the forward-test ledger (scripts/forward-log +
// the FORWARD TEST tab) marks positions to market with the IDENTICAL math. These
// are mirrored VERBATIM in scripts/engine.mjs; engine.test.mjs pins the parity.

// One bar's exit test. SL is checked FIRST so a bar that straddles both SL and
// TP counts as a LOSS (pessimistic) — the original convention, kept intact.
function checkBarExit(t, candle){
  if(t.dir==="BUY"){
    if(candle.low<=t.sl)   return {exit:t.sl, result:"LOSS"};
    if(candle.high>=t.tp)  return {exit:t.tp, result:"WIN"};
  } else { // SELL
    if(candle.high>=t.sl)  return {exit:t.sl, result:"LOSS"};
    if(candle.low<=t.tp)   return {exit:t.tp, result:"WIN"};
  }
  return null;
}

// Net P&L of a closed trade after round-trip costs (slip+comm, entry+exit).
function tradeNet(dir, entry, exit, costPerTrade){
  const pnl = dir==="BUY" ? (exit-entry) : (entry-exit);
  const grossPct = pnl/entry*100;
  const pnlPct = parseFloat((grossPct - (costPerTrade||0)).toFixed(4));
  return {pnl, grossPct, pnlPct};
}

// Aggregate stats + equity curve over an array of CLOSED trades (each with
// .result and .pnlPct/.grossPct). Single source of the significance verdict.
function realizedStats(trades){
  const wins=trades.filter(t=>t.result==="WIN");
  const losses=trades.filter(t=>t.result==="LOSS");
  const totalPnlPct=trades.reduce((a,t)=>a+t.pnlPct,0);
  const totalGrossPct=trades.reduce((a,t)=>a+(t.grossPct||t.pnlPct),0);
  const grossWin=wins.reduce((a,t)=>a+t.pnlPct,0);
  const grossLoss=Math.abs(losses.reduce((a,t)=>a+t.pnlPct,0));
  const winRate=trades.length?wins.length/trades.length*100:0;
  const avgWin=wins.length?grossWin/wins.length:0;
  const avgLoss=losses.length?grossLoss/losses.length:0;
  const profitFactor=grossLoss>0?grossWin/grossLoss:(grossWin>0?Infinity:0);
  const expectancy=trades.length?totalPnlPct/trades.length:0;
  const totalCostDrag=totalGrossPct-totalPnlPct;
  const netWins=trades.filter(t=>t.pnlPct>0).length;

  let equity=0;
  const curve=trades.map(t=>{equity+=t.pnlPct; return parseFloat(equity.toFixed(2));});

  const rets=trades.map(t=>t.pnlPct);
  const nT=rets.length;
  const mean=nT?rets.reduce((a,b)=>a+b,0)/nT:0;
  const variance=nT?rets.reduce((a,b)=>a+Math.pow(b-mean,2),0)/nT:0;
  const stdDev=Math.sqrt(variance);
  const sharpe=stdDev>0?mean/stdDev:0;
  let peak=0,maxDD=0;
  curve.forEach(eq=>{if(eq>peak)peak=eq;const dd=peak-eq;if(dd>maxDD)maxDD=dd;});
  let cl=0,maxConsecLoss=0;
  rets.forEach(x=>{if(x<=0){cl++;if(cl>maxConsecLoss)maxConsecLoss=cl;}else cl=0;});
  const se=stdDev>0?stdDev/Math.sqrt(nT):0;
  const tStat=se>0?mean/se:0;
  let significance="NOT SIGNIFICANT";
  if(nT<10) significance="TOO FEW TRADES";
  else if(nT>=30&&Math.abs(tStat)>2) significance="SIGNIFICANT";
  else if(nT>=20&&Math.abs(tStat)>1.5) significance="SUGGESTIVE";

  return {
    stats:{
      total:trades.length, wins:wins.length, losses:losses.length,
      winRate:parseFloat(winRate.toFixed(1)),
      avgWin:parseFloat(avgWin.toFixed(2)),
      avgLoss:parseFloat(avgLoss.toFixed(2)),
      totalReturn:parseFloat(totalPnlPct.toFixed(2)),
      grossReturn:parseFloat(totalGrossPct.toFixed(2)),
      costDrag:parseFloat(totalCostDrag.toFixed(2)),
      netWins,
      profitFactor:profitFactor===Infinity?"∞":parseFloat(profitFactor.toFixed(2)),
      expectancy:parseFloat(expectancy.toFixed(2)),
      sharpe:parseFloat(sharpe.toFixed(2)),
      maxDrawdown:parseFloat(maxDD.toFixed(2)),
      maxConsecLoss,
      stdDev:parseFloat(stdDev.toFixed(2)),
      tStat:parseFloat(tStat.toFixed(2)),
      significance,
    },
    curve,
  };
}

// A backtested edge earns a loud, *actionable* surface only when it is BOTH
// statistically resolved AND positive. Keying on the t-stat's magnitude alone let
// a SIGNIFICANT *negative* edge (a proven money-loser) read as "proven" and show
// loud — this mutes it instead. Mirrored VERBATIM from scripts/engine.mjs.
function edgeStatus(stats){
  const verdict  = stats?.significance ?? null;
  const exp      = stats?.expectancy ?? 0;
  const resolved = verdict==="SIGNIFICANT" || verdict==="SUGGESTIVE";
  const positive = exp > 0;
  return {
    verdict,
    proven:       verdict==="SIGNIFICANT" && positive,
    shown:        resolved && positive,
    muted:        !(resolved && positive),
    negativeEdge: resolved && !positive,
  };
}

// Walks through history, opens a trade on each BUY/SELL signal, then checks the
// NEXT candles to see whether TP or SL was hit first. ATR-based SL/TP, same as live.
function runBacktest(data, scorer, slMult, tpMult, costs, range, holdMode) {
  const scoreFn = scorer || scoreAt;
  const SLM = slMult || 1.5;
  const TPM = tpMult || 2.0;
  const TRAIL_MULT = 3;               // POSITION trailing-stop width in ATRs (hold mode only)
  const slipPct = costs?.slip || 0;   // % per side
  const commPct = costs?.comm || 0;   // % per side
  const costPerTrade = (slipPct + commPct) * 2; // entry + exit
  const startIdx = range?.start!=null ? Math.max(30, range.start) : 30;
  const endIdx   = range?.end!=null   ? range.end : data.length;
  const trades=[];
  let openTrade=null;
  let pending=null; // signal queued on prior bar, fills at THIS bar's open (no lookahead)
  // start once we have enough lookback for indicators
  for (let i=startIdx; i<endIdx; i++) {
    const slice=data.slice(0,i+1);
    const candle=data[i];

    // 1) Fill any pending entry at THIS bar's OPEN (realistic — no lookahead)
    if (pending && !openTrade) {
      const entry=candle.open;
      const A=pending.atr;
      openTrade={
        dir:pending.dir, entry, openIndex:i, entryDate:candle.date,
        // Custom per-trade targets (e.g. the Outlook correction levels) override the ATR
        // default when the scorer supplies them; otherwise the ATR fallback is unchanged.
        sl: pending.customSl!=null ? pending.customSl : (pending.dir==="BUY"?entry-A*SLM:entry+A*SLM),
        tp: pending.customTp!=null ? pending.customTp : (pending.dir==="BUY"?entry+A*TPM:entry-A*TPM),
        score:pending.score, atr:A, highWater:entry,
      };
      pending=null;
    }

    // 2) Manage an open trade
    if (openTrade) {
      const t=openTrade;
      let closed=false;
      if (holdMode && t.dir==="BUY") {
        // POSITION: a TRAILING stop (let winners run — no fixed TP cap) ratcheting up from the
        // initial wide stop, plus a thesis-break exit. The trail level uses the high-water mark
        // as of PRIOR bars (updated only AFTER this bar's exit check → no intrabar lookahead).
        const trailStop = Math.max(t.sl, t.highWater - t.atr*TRAIL_MULT);
        if (candle.low <= trailStop) {
          t.exit=trailStop; t.result = trailStop>=t.entry ? "WIN" : "LOSS"; closed=true;
        } else {
          t.highWater = Math.max(t.highWater, candle.high);
          const sNow=scoreFn(slice);                      // exit if the long-term thesis breaks
          if (sNow && sNow.signal==="SELL") {
            t.exit=candle.close; t.result = candle.close>=t.entry ? "WIN" : "LOSS"; closed=true;
          }
        }
      } else {
        const ex=checkBarExit(t, candle);                 // tactical: SL/TP touch, SL-first tie
        if (ex) { t.exit=ex.exit; t.result=ex.result; closed=true; }
      }
      if (closed) {
        t.exitDate=candle.date;
        const net=tradeNet(t.dir, t.entry, t.exit, costPerTrade);
        t.pnl=net.pnl; t.grossPct=net.grossPct; t.pnlPct=net.pnlPct;
        t.barsHeld = i - t.openIndex;
        trades.push(t);
        openTrade=null;
      }
    }

    // 3) Generate a signal on THIS bar's close → queue it for NEXT bar's open
    if (!openTrade && !pending) {
      const r=scoreFn(slice);
      if (r && (r.signal==="BUY"||r.signal==="SELL") && r.atr>0) {
        pending={dir:r.signal, atr:r.atr, score:r.score, customSl:r.customSl, customTp:r.customTp};
      }
    }
  }

  // Tally results
  const wins=trades.filter(t=>t.result==="WIN");
  const losses=trades.filter(t=>t.result==="LOSS");
  const totalPnlPct=trades.reduce((a,t)=>a+t.pnlPct,0);
  const totalGrossPct=trades.reduce((a,t)=>a+(t.grossPct||t.pnlPct),0);
  const grossWin=wins.reduce((a,t)=>a+t.pnlPct,0);
  const grossLoss=Math.abs(losses.reduce((a,t)=>a+t.pnlPct,0));
  const winRate=trades.length?wins.length/trades.length*100:0;
  const avgWin=wins.length?grossWin/wins.length:0;
  const avgLoss=losses.length?grossLoss/losses.length:0;
  const profitFactor=grossLoss>0?grossWin/grossLoss:(grossWin>0?Infinity:0);
  const expectancy=trades.length?totalPnlPct/trades.length:0;
  const totalCostDrag=totalGrossPct-totalPnlPct;
  // Net-profitable trades (a TP "win" can still be net-negative after costs)
  const netWins=trades.filter(t=>t.pnlPct>0).length;

  // Equity curve (cumulative % return)
  let equity=0;
  const curve=trades.map(t=>{equity+=t.pnlPct; return parseFloat(equity.toFixed(2));});

  // ─── Statistical validation ───
  const rets=trades.map(t=>t.pnlPct);
  const nT=rets.length;
  const mean=nT?rets.reduce((a,b)=>a+b,0)/nT:0;
  const variance=nT?rets.reduce((a,b)=>a+Math.pow(b-mean,2),0)/nT:0;
  const stdDev=Math.sqrt(variance);
  const sharpe=stdDev>0?mean/stdDev:0;               // per-trade Sharpe-like ratio
  // Max drawdown from equity curve
  let peak=0,maxDD=0;
  curve.forEach(eq=>{if(eq>peak)peak=eq;const dd=peak-eq;if(dd>maxDD)maxDD=dd;});
  // Max consecutive losses
  let cl=0,maxConsecLoss=0;
  rets.forEach(x=>{if(x<=0){cl++;if(cl>maxConsecLoss)maxConsecLoss=cl;}else cl=0;});
  // Significance via rough t-stat
  const se=stdDev>0?stdDev/Math.sqrt(nT):0;
  const tStat=se>0?mean/se:0;
  let significance="NOT SIGNIFICANT";
  if(nT<10) significance="TOO FEW TRADES";
  else if(nT>=30&&Math.abs(tStat)>2) significance="SIGNIFICANT";
  else if(nT>=20&&Math.abs(tStat)>1.5) significance="SUGGESTIVE";

  return {
    trades, openTrade,
    stats:{
      total:trades.length, wins:wins.length, losses:losses.length,
      winRate:parseFloat(winRate.toFixed(1)),
      avgWin:parseFloat(avgWin.toFixed(2)),
      avgLoss:parseFloat(avgLoss.toFixed(2)),
      totalReturn:parseFloat(totalPnlPct.toFixed(2)),
      grossReturn:parseFloat(totalGrossPct.toFixed(2)),
      costDrag:parseFloat(totalCostDrag.toFixed(2)),
      netWins,
      profitFactor:profitFactor===Infinity?"∞":parseFloat(profitFactor.toFixed(2)),
      expectancy:parseFloat(expectancy.toFixed(2)),
      sharpe:parseFloat(sharpe.toFixed(2)),
      maxDrawdown:parseFloat(maxDD.toFixed(2)),
      maxConsecLoss,
      stdDev:parseFloat(stdDev.toFixed(2)),
      tStat:parseFloat(tStat.toFixed(2)),
      significance,
    },
    curve,
  };
}

// ─── Outlook "market correction period" projection math (mirrors engine.mjs) ──
// The OUTLOOK tab projects a stock's near-term price from the AVERAGE trailing-window
// gain of the three major indexes, with an error-buffered target/stop. Pure so the app
// and the tests share one implementation; kept byte-for-byte with scripts/engine.mjs.

// Average cumulative % move of N index series over a trailing `period`, keyed by date.
// Point-in-time per index ((close[p]-close[p-period])/close[p-period]); a date is only
// emitted when EVERY index has a full-window value for it (exact date alignment).
function avgIndexGainByDate(idxArrays, period=20){
  const arrs=(idxArrays||[]).filter(a=>Array.isArray(a)&&a.length>period);
  if(!arrs.length) return new Map();
  const perIdx=arrs.map(a=>{
    const m=new Map();
    for(let p=period;p<a.length;p++){
      const c0=a[p-period].close, c1=a[p].close;
      if(c0>0&&c1!=null) m.set(a[p].date,(c1-c0)/c0*100);
    }
    return m;
  });
  const out=new Map();
  for(const [date,v0] of perIdx[0]){
    let sum=v0, ok=true;
    for(let k=1;k<perIdx.length;k++){ const v=perIdx[k].get(date); if(v==null){ok=false;break;} sum+=v; }
    if(ok) out.set(date, sum/perIdx.length);
  }
  return out;
}

// Error-buffered target/stop from a projected gain. mag = |entry·gain%|; the target ADDS
// the average projection error as a buffer (generous — let it run); the stop SUBTRACTS the
// LESSER of the projection magnitude and the error (tight — an early red-flag exit level).
function correctionLevels({entry, gainsPct, avgErr=0}){
  const delta=entry*(gainsPct||0)/100;
  const mag=Math.abs(delta);
  const err=Math.abs(avgErr||0);
  return { delta, mag, tp: entry+mag+err, sl: entry-Math.min(mag,err) };
}

// Full P&L backtest of the correction projection vs matched buy-&-hold (alpha-honest).
// Long-only (BUY when close≥SMA20); per bar the projected gain (as-of that date) plus an
// EXPANDING-window avg projection error (PRIOR bars only → no lookahead) set the custom
// TP/SL fed through runBacktest. Reports realized stats, directional accuracy, and the
// per-trade alpha vs a price-only buy-&-hold over the identical entry→exit window. The
// `proven` gate is alpha-honest: never green without ≥20 trades, significance, AND meanAlpha>0.
function backtestCorrection(stockData, gainByDate, opts={}){
  const period=opts.period||20;
  const costs=opts.costs||{slip:0,comm:0};
  const data=stockData||[];
  if(data.length<period+2||!gainByDate) return null;
  const closes=data.map(d=>d.close);

  // Per-bar projection error (point-in-time): projected = close ± (close·gain%) in the
  // trend's direction; error vs the NEXT close. Feeds both the accuracy stats and the
  // expanding avgErr buffer (which only ever reads bars whose outcome is already known).
  const projErr=new Array(data.length).fill(null);
  let n=0,hits=0,baseHits=0,errSum=0,pctErrSum=0;
  for(let i=period;i<data.length-1;i++){
    const g=gainByDate.get(data[i].date); if(g==null) continue;
    const sma20=sma(closes.slice(0,i+1),20); if(sma20==null) continue;
    const trendUp=closes[i]>=sma20;
    const predMove=(trendUp?1:-1)*closes[i]*g/100;
    const projected=closes[i]+predMove;
    const actualMove=closes[i+1]-closes[i];
    projErr[i]=Math.abs(projected-closes[i+1]);
    if(predMove!==0&&actualMove!==0){
      n++;
      if(Math.sign(predMove)===Math.sign(actualMove)) hits++;
      if((trendUp?1:-1)===Math.sign(actualMove)) baseHits++;
      errSum+=projErr[i]; pctErrSum+=projErr[i]/closes[i+1]*100;
    }
  }
  // avgErrBefore[k] = mean projection error over bars strictly before k (no lookahead).
  const avgErrBefore=new Array(data.length).fill(0);
  { let s=0,c=0; for(let k=0;k<data.length;k++){ avgErrBefore[k]=c?s/c:0; if(projErr[k]!=null){s+=projErr[k];c++;} } }

  // Long-only correction scorer → custom error-buffered TP/SL via correctionLevels.
  const scorer=(slice)=>{
    const i=slice.length-1;
    const cl=slice.map(d=>d.close);
    const sma20=sma(cl,20); if(sma20==null) return {signal:"HOLD"};
    const a=atr(slice,14);
    const g=gainByDate.get(slice[i].date);
    if(g==null||g===0||!(cl[i]>=sma20)) return {signal:"HOLD", atr:a};
    const lv=correctionLevels({entry:cl[i], gainsPct:g, avgErr:avgErrBefore[i]});
    return {signal:"BUY", atr:a, score:g, customSl:lv.sl, customTp:lv.tp};
  };
  const bt=runBacktest(data, scorer, 1.5, 2.0, costs, null, false);

  // Alpha vs matched buy-&-hold: same entry, held to the SAME exit bar's close (price-only;
  // the forward-perf buyHoldGrossPct pattern, inlined for engine↔app parity).
  const legs=bt.trades.map(t=>{
    const exitIdx=t.openIndex+t.barsHeld;
    const benchClose=data[exitIdx]?data[exitIdx].close:t.exit;
    const benchPct=(benchClose-t.entry)/t.entry*100;
    return { stratPct:t.pnlPct, benchPct, alpha:t.pnlPct-benchPct, beat:t.pnlPct>benchPct };
  });
  const m=legs.length;
  const meanAlpha=m?legs.reduce((a,l)=>a+l.alpha,0)/m:null;
  const beatRate=m?legs.filter(l=>l.beat).length/m*100:null;
  const sig=bt.stats.significance;
  const proven=m>=20 && (sig==="SIGNIFICANT"||sig==="SUGGESTIVE") && meanAlpha>0;

  return {
    n, acc:n?hits/n*100:null, baseline:n?baseHits/n*100:null,
    edge:n?(hits-baseHits)/n*100:null,
    avgErr:n?errSum/n:null, avgPctErr:n?pctErrSum/n:null,
    trades:m, stats:bt.stats, meanAlpha, beatRate, proven,
  };
}

// ─── ESD: Estimated Stock Destination (SMA20 "nautical heading" projection) ───
// DISPLAY/RESEARCH ONLY — never touches the verdict or any gate. Treats the SMA20 (purple) line as a
// navigational heading: measure its kinematics, and when it SEPARATES from the faster-line pack and leans,
// project a straight ray at its slope to the nearest direction-appropriate price level → the destination.
// HONEST: an MA's slope is a LAGGING echo that decelerates as price mean-reverts, so a straight ray
// OVERSHOOTS (beta-by-construction) — the ESD is a labeled PROJECTION, and esdAccuracyBacktest is the only
// thing that can ever call it "proven" (n≥20 + significant + meanAlpha>0). Mirrored byte-for-byte into index.html.

// Kinematics of ANY line series (SMA20, SMA5, SFA12, BB-mid, VMA…): velocity, ATR-normalized angle, lift,
// curvature (acceleration / change-of-direction), trajectory cleanliness. angleDeg is normalized by ATR so
// the degree means the same on every stock/timeframe/zoom (a raw on-screen degree is scale-dependent).
function lineKinematics(series, W=20, atrVal=0){
  const s=(series||[]).filter(v=>typeof v==="number"&&isFinite(v));
  if(s.length<W+1) return null;
  const last=s[s.length-1], prev=s[s.length-1-W];
  const lift=last-prev;                                   // signed net change over the window
  const slopePerBar=lift/W;                               // signed velocity (price/bar)
  const speed=Math.abs(slopePerBar);
  const norm=atrVal>0?slopePerBar/atrVal:(last>0?slopePerBar/last*100:slopePerBar);
  const angleDeg=(atrVal>0||last>0)?+(Math.atan(norm)*180/Math.PI).toFixed(2):null;
  const h=Math.max(1,Math.floor(W/2));
  let curvature=null;                                     // 2nd difference: recent slope − prior slope
  if(s.length>=2*h+1){
    const a=s[s.length-1], b=s[s.length-1-h], c=s[s.length-1-2*h];
    curvature=+(((a-b)/h)-((b-c)/h)).toFixed(6);
  }
  const er=efficiencyRatio(s,Math.min(W,s.length-1));
  const eps=atrVal>0?atrVal*0.05:Math.abs(last)*0.0005;
  const dir=lift>eps?"up":lift<-eps?"down":"flat";
  return { slopePerBar:+slopePerBar.toFixed(6), angleDeg, lift:+lift.toFixed(4), speed:+speed.toFixed(6),
    curvature, efficiencyRatio:er==null?null:+er.toFixed(3), dir };
}

// The "event": does the SMA20 SEPARATE from the fast-MA pack (SMA5/SMA10 mean) AND establish a slope, at bar i?
// Point-in-time (reads only bars[0..i]); gap measured in ATRs so it is comparable across names. `side` = where
// SMA20 sits vs the pack (above/below), `leaning` = its slope direction → the two cases the user described.
function headingEvent(bars, i, opts={}){
  const sepATR=opts.sep!=null?opts.sep:0.25, slopeWin=opts.slopeWin!=null?opts.slopeWin:10;
  const end=(i==null?(bars?bars.length:0):i+1);
  const data=(bars||[]).slice(0,end);
  if(data.length<20+slopeWin+1) return null;
  const cl=data.map(b=>b&&b.close);
  const s20=sma(cl,20), s5=sma(cl,5), s10=sma(cl,10);
  if(s20==null||s5==null||s10==null) return null;
  const pack=(s5+s10)/2;                                  // the fast-MA cluster the SMA20 separates from
  const a=atr(data,14)||0;
  const gapATR=a>0?(s20-pack)/a:0;
  const side=s20>pack?"above":s20<pack?"below":"level";
  const s20prev=sma(cl.slice(0,cl.length-slopeWin),20);
  const slope=(s20!=null&&s20prev!=null)?(s20-s20prev):0;
  const leaning=slope>0?"up":slope<0?"down":"flat";
  const separated=Math.abs(gapATR)>=sepATR&&leaning!=="flat";
  return { separated, side, leaning, gapATR:+gapATR.toFixed(3),
    slopePerBar:+(slope/slopeWin).toFixed(6), s20:+s20.toFixed(4), pack:+pack.toFixed(4), atr:+a.toFixed(4) };
}

// Project the SMA20 ray forward to the nearest DIRECTION-AWARE level → the Estimated Stock Destination.
// Up-lean → a level ABOVE the line (TP1, else resistance); down-lean → a level BELOW (SL, else support) —
// a rising ray can't reach a stop sitting below price, so "always SL" is geometrically wrong. Returns the
// ray anchored to BAR-INDEX (so data gaps don't distort the ETA) + the ATR-normalized angle. valid:false
// when the ray diverges from every level (no honest destination).
function esdProject(bars, levels, opts={}){
  const slopeWin=opts.slopeWin!=null?opts.slopeWin:10;
  const data=bars||[];
  const cl=data.map(b=>b&&b.close);
  if(cl.length<20+slopeWin+1) return null;
  const s20=sma(cl,20), s20prev=sma(cl.slice(0,cl.length-slopeWin),20);
  if(s20==null||s20prev==null) return null;
  const m=(s20-s20prev)/slopeWin;                          // SMA20 slope (price/bar)
  const a=atr(data,14)||0;
  const leaning=m>0?"up":m<0?"down":"flat";
  const lv=levels||{};
  let targetName=null, targetPrice=null;
  if(leaning==="up"){                                       // rising → nearest level ABOVE the line
    const c=[["tp1",lv.tp1],["resistance",lv.resistance]].filter(([,v])=>v!=null&&v>s20).sort((x,y)=>x[1]-y[1]);
    if(c.length){ targetName=c[0][0]; targetPrice=c[0][1]; }
  } else if(leaning==="down"){                              // falling → nearest level BELOW the line
    const c=[["sl",lv.sl],["support",lv.support]].filter(([,v])=>v!=null&&v<s20).sort((x,y)=>y[1]-x[1]);
    if(c.length){ targetName=c[0][0]; targetPrice=c[0][1]; }
  }
  const etaBars=(targetPrice!=null&&m!==0)?(targetPrice-s20)/m:null;
  const ok=targetPrice!=null&&etaBars!=null&&etaBars>0&&isFinite(etaBars);
  const angleDeg=a>0?+(Math.atan(m/a)*180/Math.PI).toFixed(2):null;
  return {
    valid:!!ok, leaning, slopePerBar:+m.toFixed(6), angleDeg, sma20:+s20.toFixed(4), atr:+a.toFixed(4),
    targetName:ok?targetName:null, targetPrice:ok?+targetPrice.toFixed(4):null, etaBars:ok?+etaBars.toFixed(2):null,
    ray:ok?{x0:cl.length-1,y0:+s20.toFixed(4),x1:+(cl.length-1+etaBars).toFixed(2),y1:+targetPrice.toFixed(4)}:null,
  };
}

// Honest accuracy/overshoot backtest of the SMA20 straight-line projection. (1) DIAGNOSTIC: project the
// SMA20 `H` bars ahead at its current slope and compare to the realized SMA20 → avgErr + overshootBias
// (signed; >0 = the ray lands ABOVE reality = the lag/deceleration overshoot the charter warns about).
// (2) ALPHA leg: BUY on a below→up heading with a custom TP at the projected destination (buffered by the
// expanding-window avg error, no-lookahead) through runBacktest → realized stats + alpha vs matched
// buy-&-hold. `proven` is alpha-honest: never green without ≥20 trades, significance, AND meanAlpha>0.
function esdAccuracyBacktest(bars, opts={}){
  const slopeWin=opts.slopeWin!=null?opts.slopeWin:10;
  const H=opts.horizon!=null?opts.horizon:Math.max(5,slopeWin);
  const sepATR=opts.sep!=null?opts.sep:0.25;
  const costs=opts.costs||{slip:0,comm:0};
  const data=bars||[];
  if(data.length<20+slopeWin+H+2) return null;
  const cl=data.map(d=>d&&d.close);
  const projErr=new Array(data.length).fill(null);
  let n=0,absSum=0,signSum=0,pctSum=0;
  for(let i=20+slopeWin;i+H<data.length;i++){
    const s20now=sma(cl.slice(0,i+1),20), s20prev=sma(cl.slice(0,i+1-slopeWin),20);
    if(s20now==null||s20prev==null) continue;
    const m=(s20now-s20prev)/slopeWin;
    const proj=s20now+m*H;                                   // straight-line projection H bars out
    const s20fut=sma(cl.slice(0,i+1+H),20); if(s20fut==null) continue;
    const e=proj-s20fut;                                     // + = overshoot (projected above realized)
    projErr[i]=Math.abs(e); n++; absSum+=Math.abs(e); signSum+=e; pctSum+=Math.abs(e)/(Math.abs(s20fut)||1)*100;
  }
  const avgErr=n?absSum/n:null, overshootBias=n?signSum/n:null, avgPctErr=n?pctSum/n:null;
  const avgErrBefore=new Array(data.length).fill(0);
  { let s=0,c=0; for(let k=0;k<data.length;k++){ avgErrBefore[k]=c?s/c:0; if(projErr[k]!=null){s+=projErr[k];c++;} } }
  const scorer=(slice)=>{
    const j=slice.length-1, a=atr(slice,14);
    const ev=headingEvent(slice,j,{sep:sepATR,slopeWin});
    if(!ev||!ev.separated||ev.leaning!=="up"||ev.side!=="below") return {signal:"HOLD", atr:a};
    const sc=slice.map(d=>d&&d.close), s20=sma(sc,20), entry=sc[j], dest=s20+ev.slopePerBar*H;
    if(!(dest>entry)) return {signal:"HOLD", atr:a};
    return {signal:"BUY", atr:a, score:ev.slopePerBar, customTp:dest+avgErrBefore[j], customSl:entry-a*1.5};
  };
  const bt=runBacktest(data, scorer, 1.5, 2.0, costs, null, false);
  const legs=bt.trades.map(t=>{
    const exitIdx=t.openIndex+t.barsHeld, benchClose=data[exitIdx]?data[exitIdx].close:t.exit;
    const benchPct=(benchClose-t.entry)/t.entry*100;
    return { alpha:t.pnlPct-benchPct, beat:t.pnlPct>benchPct };
  });
  const m2=legs.length;
  const meanAlpha=m2?legs.reduce((a,l)=>a+l.alpha,0)/m2:null;
  const beatRate=m2?legs.filter(l=>l.beat).length/m2*100:null;
  const sig=bt.stats.significance;
  const proven=m2>=20&&(sig==="SIGNIFICANT"||sig==="SUGGESTIVE")&&meanAlpha>0;
  return {
    n, avgErr:avgErr==null?null:+avgErr.toFixed(4), overshootBias:overshootBias==null?null:+overshootBias.toFixed(4),
    avgPctErr:avgPctErr==null?null:+avgPctErr.toFixed(2),
    trades:m2, stats:bt.stats, meanAlpha:meanAlpha==null?null:+meanAlpha.toFixed(4),
    beatRate:beatRate==null?null:+beatRate.toFixed(1), proven,
  };
}

// ─── Buffett-style fundamental VALUE score ──────────────────────────────────
// Grades cheapness + financial health + growth into a composite, the way a
// quantitative value screen would. Covers the SCREENABLE part of value investing
// — NOT the qualitative moat/management judgment that needs reading annual reports.
function valueScore(m){
  if(!m) return null;
  const flags=[], reasons=[];
  let cheap=0, healthy=0, growing=0;
  const num=v=>(v==null||isNaN(v))?null:Number(v);
  const pe=num(m.peTTM), pb=num(m.pbAnnual), de=num(m["totalDebt/totalEquityAnnual"]);
  const roe=num(m.roeTTM), cr=num(m.currentRatioAnnual);
  let npm=num(m.netProfitMarginTTM);
  if(npm!=null&&Math.abs(npm)>1.5){flags.push("Net margin "+(npm*100).toFixed(0)+"% implausible — likely a filing-data error, ignored"); npm=null;}
  const revG=num(m.revenueGrowthTTMYoy), epsG=num(m.epsGrowthTTMYoy);

  if(pe!=null){
    if(pe>0&&pe<15){cheap+=2; reasons.push("P/E "+pe.toFixed(1)+" — attractively valued");}
    else if(pe>=15&&pe<25){cheap+=1; reasons.push("P/E "+pe.toFixed(1)+" — fairly valued");}
    else if(pe>=25){cheap-=1; reasons.push("P/E "+pe.toFixed(1)+" — expensive");}
    else if(pe<=0){flags.push("Negative earnings — no positive P/E");}
  }
  if(pb!=null){
    if(pb>0&&pb<1.5){cheap+=2; reasons.push("P/B "+pb.toFixed(2)+" — near/below book value");}
    else if(pb>=1.5&&pb<3){cheap+=1;}
    else if(pb>=5){cheap-=1; reasons.push("P/B "+pb.toFixed(2)+" — pricey vs assets");}
  }
  if(de!=null){
    if(de<0.5){healthy+=2; reasons.push("Debt/equity "+de.toFixed(2)+" — strong balance sheet");}
    else if(de<1){healthy+=1;}
    else if(de>2){healthy-=2; flags.push("High debt/equity "+de.toFixed(2));}
  }
  if(roe!=null){
    if(roe>0.15){healthy+=2; reasons.push("ROE "+(roe*100).toFixed(0)+"% — efficient capital use");}
    else if(roe>0.08){healthy+=1;}
    else if(roe<0){healthy-=2; flags.push("Negative ROE");}
  }
  if(npm!=null){
    if(npm>0.20){healthy+=2; reasons.push("Net margin "+(npm*100).toFixed(0)+"% — highly profitable");}
    else if(npm>0.10){healthy+=1;}
    else if(npm<0){healthy-=2; flags.push("Unprofitable — negative margin");}
  }
  if(cr!=null){
    if(cr>1.5){healthy+=1; reasons.push("Current ratio "+cr.toFixed(1)+" — liquid");}
    else if(cr<1){healthy-=1; flags.push("Current ratio <1 — liquidity risk");}
  }
  if(revG!=null){
    if(revG>0.15){growing+=2; reasons.push("Revenue +"+(revG*100).toFixed(0)+"% — expanding strongly");}
    else if(revG>0.05){growing+=1;}
    else if(revG<0){growing-=1; flags.push("Revenue shrinking");}
  }
  if(epsG!=null){
    if(epsG>0.15){growing+=2; reasons.push("EPS +"+(epsG*100).toFixed(0)+"% — earnings rising");}
    else if(epsG>0){growing+=1;}
    else if(epsG<0){growing-=1;}
  }

  const total=cheap+healthy+growing;
  let grade,verdict;
  if(total>=10){grade="A";verdict="STRONG VALUE — cheap, healthy, and growing. The kind of business a value screen flags for deeper study.";}
  else if(total>=6){grade="B";verdict="GOOD — solid fundamentals with real appeal. Worth a closer look.";}
  else if(total>=2){grade="C";verdict="FAIR — mixed picture. Some strengths, some concerns.";}
  else if(total>=-2){grade="D";verdict="WEAK — limited fundamental appeal at current price.";}
  else{grade="F";verdict="POOR — expensive and/or financially strained. A value investor would likely pass.";}

  const hasData = [pe,pb,de,roe,npm,cr,revG,epsG].some(v=>v!=null);
  return hasData ? {cheap,healthy,growing,total,grade,verdict,reasons,flags} : null;
}

// ─── Company Performance Autopsy — graded categories over valueScore ─────────
// valueScore (above) stays the scoring core. companyAutopsy groups its three
// pillars into letter-graded categories so the thresholds live in ONE place:
// Valuation ← cheapness, Quality ← financial health, Growth ← trajectory.
function letterFromScore(s){ return s>=3?"A":s===2?"B":s>=0?"C":s===-1?"D":"F"; }
function companyAutopsy(m){
  const vs=valueScore(m); if(!vs) return null;
  const has=(...ks)=>ks.some(k=>{const v=m[k];return v!=null&&!isNaN(v);});
  const categories=[
    {name:"VALUATION", score:vs.cheap,   has:has("peTTM","pbAnnual"),                                                                note:"Price vs earnings & book value"},
    {name:"QUALITY",   score:vs.healthy, has:has("totalDebt/totalEquityAnnual","roeTTM","netProfitMarginTTM","currentRatioAnnual"), note:"Returns, margins & balance-sheet strength"},
    {name:"GROWTH",    score:vs.growing, has:has("revenueGrowthTTMYoy","epsGrowthTTMYoy"),                                           note:"Revenue & earnings trajectory"},
  ].map(c=>({...c, grade:c.has?letterFromScore(c.score):null}));
  return {...vs, overall:vs.grade, categories};
}

// ─── Engine conviction modifier — the autopsy as an OVERLAY, not a rewrite ───
// The raw price signal/confidence from analyze() is never touched. This derives
// a SEPARATE "adjusted conviction" the UI shows alongside it. POSITION treats
// the business as the thesis (A/B boost; D/F vetoes a long); TACTICAL only
// nudges — there fundamentals are a context filter, not the trigger.
function convictionModifier(overall, mode, analysis){
  if(!overall||!analysis) return null;
  const base=Math.round(analysis.confidence), sig=analysis.signal, isPos=mode==="position";
  const good=overall<="B", fair=overall==="C";
  let adj=base, note="", capped=false;
  if(isPos){
    if(good){ adj=Math.min(95,base+12); note="Grade-"+overall+" business strengthens the owner's conviction."; }
    else if(fair){ note="Grade C — conviction held; an owner demands a wider margin of safety."; }
    else if(sig==="BUY"){ adj=Math.min(base,30); capped=true; note="Fundamental veto — a grade-"+overall+" business caps long conviction in POSITION mode."; }
    else { note="Grade-"+overall+" business — weak fundamentals; no long thesis to support conviction."; }
  } else {
    if(good){ adj=Math.min(95,base+5); note="Grade-"+overall+" business is a tailwind — small conviction lift."; }
    else if(overall>="D"){ adj=Math.max(20,base-5); note="Grade-"+overall+" business — trim conviction and keep the trade short."; }
    else { note="Grade C — neutral; trade the signal on its own merits."; }
  }
  adj=Math.round(adj);
  return {adjConfidence:adj, base, delta:adj-base, note, capped};
}

// ─── Phase-2 merit fusion — gated, bounded, and OFF until evidence earns it ───
// Unlike convictionModifier (which only nudges CONFIDENCE), this may change the
// SIGNAL itself — but ONLY when BOTH gates are open: the fundamentals are
// user-verified AND the cross-sectional study established a real, OOS-consistent
// merit→return edge (study.json → meritEdgeProven). Until then it is a no-op, so
// the trade signal stays purely technical and the price-only backtest that gates
// everything is never contaminated. Bounded to one defensible step: verified-weak
// fundamentals veto a long; a verified grade-A business can lift a neutral price
// signal to a long in the owner's (POSITION) lens. Never invents a short, never
// overrides a price SELL.
function fuseMerit(rawSignal, grade, mode, gates){
  const g=gates||{};
  if(!g.verified || !g.edgeProven){
    return {signal:rawSignal, changed:false, active:false,
      reason: !g.edgeProven
        ? "Merits gated out — the evidence harness hasn't established a forward-return edge, so the signal is price-only."
        : "Merits gated out — these fundamentals aren't verified yet (AUTOPSY tab)."};
  }
  if(!grade) return {signal:rawSignal, changed:false, active:true, reason:"Edge established, but no fundamentals to fuse for this name."};
  let signal=rawSignal, reason="Verified merits are consistent with the price signal.";
  if(rawSignal==="BUY" && grade>="D"){
    signal="HOLD"; reason="Verified weak fundamentals (grade "+grade+") veto the long — the business doesn't back the breakout.";
  } else if(mode==="position" && rawSignal==="HOLD" && grade==="A"){
    signal="BUY"; reason="Verified grade-A business lifts a neutral price signal to a long (owner's lens, edge established).";
  }
  return {signal, changed:signal!==rawSignal, active:true, reason};
}

// ─── Valuation anchor — Graham-number margin of safety (transparent) ──────────
// Intrinsic ≈ √(22.5 · EPS · BVPS) (Graham's rule of thumb). With P/E and P/B
// already in hand, intrinsic/price reduces to √(22.5 / (P/E · P/B)), so the
// margin of safety needs no extra inputs. mosPct > 0 ⇒ price below fair value.
function valuationAnchor(m){
  if(!m) return null;
  const num=v=>(v==null||isNaN(v))?null:Number(v);
  const pe=num(m.peTTM), pb=num(m.pbAnnual);
  if(!(pe>0)||!(pb>0)) return null;
  const intrinsicOverPrice=Math.sqrt(22.5/(pe*pb));
  const mosPct=(1 - 1/intrinsicOverPrice)*100;
  const verdict = mosPct>=25?"DEEP DISCOUNT" : mosPct>=0?"BELOW FAIR VALUE" : mosPct>=-25?"ABOVE FAIR VALUE" : "RICHLY PRICED";
  return {intrinsicOverPrice, mosPct, verdict};
}

// ─── Fundamentals from the precomputed SEC database ──────────────────────────
// SEC EDGAR is the authoritative source (figures filed under oath in 10-K/10-Q),
// but a browser can't fetch it directly (CORS). So a nightly GitHub Action pulls
// and distills it SERVER-SIDE into fundamentals.json (see scripts/), which this
// app reads same-origin — instant, no key, no proxy. The JSON holds the
// price-INDEPENDENT figures; we derive P/E and P/B here from the live price, so
// the ratios stay current between nightly runs. Shaped exactly like the former
// fetchFundamentals return ({map, meta}), so call sites and rendering are intact.
function fundamentalsFor(sym, market, price, db){
  if(market!=="Stocks"){
    return {meta:{ok:false,skip:true,msg:market==="ETFs"?"ETFs are funds — they don't file company income statements, so a P/E-style grade doesn't apply.":market+" has no company filings — the VALUE grade applies to US-listed stocks."}};
  }
  if(!db) return {meta:{ok:false,msg:"The fundamentals database hasn't loaded yet — try again in a moment, or enter the numbers manually using the verify links."}};
  const rec=db[sym];
  if(!rec) return {meta:{ok:false,msg:"\""+sym+"\" isn't in the precomputed set yet. Add it to scripts/tickers.txt (the nightly job picks it up), or enter the numbers manually using the verify links."}};
  const map={}, put=(k,v)=>{ if(v!=null&&isFinite(v)) map[k]=String(+(+v).toFixed(4)); };
  const n=v=>(v==null||isNaN(v))?null:Number(v);
  const eps=n(rec.epsTTM), bvps=n(rec.bvps);
  if(price>0&&eps>0)  put("peTTM", price/eps);          // live price ÷ filed TTM EPS
  if(price>0&&bvps>0) put("pbAnnual", price/bvps);      // live price ÷ filed book value/share
  put("totalDebt/totalEquityAnnual", n(rec.de));
  put("roeTTM", n(rec.roe));
  put("netProfitMarginTTM", n(rec.npm));
  put("currentRatioAnnual", n(rec.cr));
  put("revenueGrowthTTMYoy", n(rec.revG));
  put("epsGrowthTTMYoy", n(rec.epsG));
  const filled=Object.keys(map).length;
  if(!filled) return {meta:{ok:false,msg:"No usable precomputed figures for "+sym+" yet. Enter the numbers manually using the verify links."}};
  return {map, meta:{ok:true,source:"SEC EDGAR",entity:rec.entity||sym,cik:rec.cik,asof:rec.asof||null,basis:rec.basis||"TTM",precomputed:true,when:new Date().toLocaleTimeString(),filled,sym}};
}

// ─── Formatting ────────────────────────────────────────────────────────────
function fmt(v,dec) {
  if(v==null||isNaN(v)) return "—";
  const d=dec!=null?dec:Math.abs(v)>=100?2:4;
  return "$"+Number(v).toFixed(d);
}

// ─── Candlestick Chart ─────────────────────────────────────────────────────
function Chart({rows,analysis,muted,convStartIdx,projection}) {
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current; if(!cv||rows.length<2) return;
    const ctx=cv.getContext("2d"),W=cv.width,H=cv.height;
    const PAD={l:58,r:10,t:12,b:24},cH=(H-PAD.t-PAD.b)*0.72,vH=(H-PAD.t-PAD.b)*0.2,gap=(H-PAD.t-PAD.b)*0.08;
    ctx.clearRect(0,0,W,H);
    const n=Math.min(rows.length,80),data=rows.slice(-n);
    const hi=Math.max(...data.map(d=>d.high)),lo=Math.min(...data.map(d=>d.low)),rng=hi-lo||1;
    const maxVol=Math.max(...data.map(d=>d.volume))||1;
    const cw=(W-PAD.l-PAD.r)/n;
    const toX=i=>PAD.l+i*cw+cw/2;
    const toY=v=>PAD.t+(1-(v-lo)/rng)*cH;
    const vBase=PAD.t+cH+gap+vH;
    const toVY=v=>vBase-Math.max((v/maxVol)*vH,1);
    // Background
    ctx.fillStyle="#080b14"; ctx.fillRect(0,0,W,H);
    // Grid
    [0,.25,.5,.75,1].forEach(f=>{
      const price=lo+rng*(1-f),y=PAD.t+f*cH;
      ctx.strokeStyle="#1a2035"; ctx.lineWidth=.5;
      ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
      ctx.fillStyle="#37474f";ctx.font="9px monospace";ctx.textAlign="right";
      ctx.fillText(price>=100?price.toFixed(2):price.toFixed(4),PAD.l-3,y+3);
    });
    // SMAs
    const closes=data.map(d=>d.close);
    [[5,"#ffd74099"],[10,"#00bcd499"],[20,"#e040fb99"]].forEach(([p,col])=>{
      const per=parseInt(p); if(closes.length<per) return;
      ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=1.2;let first=true;
      data.forEach((d,i)=>{
        if(i<per-1)return;
        const v=closes.slice(i-per+1,i+1).reduce((a,b)=>a+b,0)/per;
        first?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v));first=false;
      });ctx.stroke();
    });
    // SFA12 tracker line — composite of SMA5/10/20, color-coded by trend state.
    // series[] holds GLOBAL indices (starting at c30); map to the visible window
    // exactly like the ANALYSIS-START marker so the line begins at that point.
    {
      const sfa12=analysis?.sfa12;
      if(sfa12?.series?.length){
        const offset=rows.length-n;
        const sfaCol=sfa12.state==="UPTREND"?"#00e676":sfa12.state==="DOWNTREND"?"#ff5252":"#ffd740";
        ctx.beginPath();ctx.strokeStyle=sfaCol;ctx.lineWidth=2.4;
        ctx.shadowColor=sfaCol;ctx.shadowBlur=6;
        let first=true,lastPt=null;
        sfa12.series.forEach(pt=>{
          const vi=pt.i-offset; if(vi<0||vi>=n) return;
          const x=toX(vi),y=toY(pt.value);
          first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;lastPt={x,y};
        });
        ctx.stroke();ctx.shadowBlur=0;
        if(lastPt){
          ctx.fillStyle=sfaCol;ctx.font="bold 9px monospace";ctx.textAlign="left";
          ctx.fillText("SFA12",lastPt.x+4,lastPt.y-4);
        }
      }
    }
    // BB bands
    const bbV=analysis?.indicators?.bb?.v;
    if(bbV){
      [bbV.upper,bbV.middle,bbV.lower].forEach((v,i)=>{
        ctx.beginPath();ctx.strokeStyle=i===1?"#546e7a55":"#546e7a33";
        ctx.setLineDash(i===1?[4,4]:[]); ctx.lineWidth=.8;
        ctx.moveTo(PAD.l,toY(v));ctx.lineTo(W-PAD.r,toY(v));ctx.stroke();
        ctx.setLineDash([]);
      });
    }
    // Candles
    data.forEach((d,i)=>{
      const up=d.close>=d.open,col=up?"#00e676":"#ff5252",x=toX(i);
      const bt=toY(Math.max(d.open,d.close)),bb_=toY(Math.min(d.open,d.close));
      ctx.strokeStyle=col;ctx.lineWidth=.8;
      ctx.beginPath();ctx.moveTo(x,toY(d.high));ctx.lineTo(x,toY(d.low));ctx.stroke();
      ctx.fillStyle=up?"#00e676":"#cc3333";
      ctx.fillRect(x-cw*.38,bt,cw*.76,Math.max(bb_-bt,1));
      if(!up){ctx.strokeStyle="#ff5252";ctx.lineWidth=.5;ctx.strokeRect(x-cw*.38,bt,cw*.76,Math.max(bb_-bt,1));}
      // Live FORMING bar: the streamed price folded into the last visible candle — drawn hollow +
      // cyan with a "LIVE" tag so it's unmistakably unsettled. Cosmetic only: it never re-runs
      // analyze(), so the verdict is unchanged (no real-time signal faked on the delayed feed). On
      // a Polygon tier upgrade the cluster flips to realtime (one-word mode change) and this SAME
      // bar becomes a genuine real-time forming candle — its future status, revealed automatically.
      if(d.forming){
        ctx.fillStyle="#080b14";ctx.fillRect(x-cw*.38+.7,bt+.7,Math.max(cw*.76-1.4,0),Math.max(bb_-bt-1.4,0));
        ctx.strokeStyle="#00e5ff";ctx.lineWidth=1;ctx.strokeRect(x-cw*.38,bt,cw*.76,Math.max(bb_-bt,1));
        ctx.fillStyle="#00e5ff";ctx.font="bold 7px monospace";ctx.textAlign="center";
        ctx.fillText("● LIVE",x,toY(d.high)-4);
      }
    });
    // Entry/SL lines
    if(analysis){
      [[analysis.entry,"#00bcd4","ENTRY"],[analysis.sl,"#ff5252","SL"],[analysis.tp1,"#00e676","TP1"]].forEach(([v,col,lbl])=>{
        if(!v||v<lo||v>hi) return;
        ctx.beginPath();ctx.strokeStyle=col+"cc";ctx.lineWidth=1;ctx.setLineDash([5,4]);
        ctx.moveTo(PAD.l,toY(v));ctx.lineTo(W-PAD.r,toY(v));ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle=col;ctx.font="bold 8px monospace";ctx.textAlign="left";
        ctx.fillText(lbl,PAD.l+2,toY(v)-2);
      });
    }
    // Labeled SUPPORT / RESISTANCE lines (strong levels)
    if(analysis&&analysis.levels){
      const strongSup=analysis.levels.find(l=>l.type==="SUPPORT"&&l.strength==="STRONG");
      const strongRes=analysis.levels.find(l=>l.type==="RESISTANCE"&&l.strength==="STRONG");
      if(strongRes&&strongRes.price>=lo&&strongRes.price<=hi){
        const y=toY(strongRes.price);
        ctx.beginPath();ctx.strokeStyle="#ff5252";ctx.lineWidth=1.4;ctx.setLineDash([2,2]);
        ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle="#ff5252";ctx.font="bold 9px monospace";ctx.textAlign="right";
        ctx.fillText("RESISTANCE "+fmt(strongRes.price),W-PAD.r-2,y-3);
      }
      if(strongSup&&strongSup.price>=lo&&strongSup.price<=hi){
        const y=toY(strongSup.price);
        ctx.beginPath();ctx.strokeStyle="#00e676";ctx.lineWidth=1.4;ctx.setLineDash([2,2]);
        ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle="#00e676";ctx.font="bold 9px monospace";ctx.textAlign="right";
        ctx.fillText("SUPPORT "+fmt(strongSup.price),W-PAD.r-2,y+11);
      }
    }
    // Candle-30 "analysis starts" vertical marker
    // The backtest begins at index 30 of the FULL dataset; map that to the visible window.
    {
      const fullLen=rows.length;
      const startIdx=30;
      if(fullLen>startIdx){
        // visible window shows the last n candles; find where index 30 falls
        const offset=fullLen-n; // how many candles trimmed from the front
        const visibleIdx=startIdx-offset;
        if(visibleIdx>=0&&visibleIdx<n){
          const x=toX(visibleIdx);
          ctx.beginPath();ctx.strokeStyle="#ffa726";ctx.lineWidth=1;ctx.setLineDash([3,3]);
          ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+cH);ctx.stroke();ctx.setLineDash([]);
          ctx.fillStyle="#ffa726";ctx.font="bold 8px monospace";ctx.textAlign="left";
          ctx.fillText("◀ ANALYSIS START (c30)",x+3,PAD.t+10);
        }
      }
    }
    // ⚡ Convergence-coil START marker (MONITOR setup chart) — a vertical line at the bar the coil began.
    if(convStartIdx!=null && convStartIdx>=0){
      const off=rows.length-n, vis=convStartIdx-off;
      if(vis>=0&&vis<n){
        const x=toX(vis);
        ctx.beginPath();ctx.strokeStyle="#26c6da";ctx.lineWidth=1.4;ctx.setLineDash([2,2]);
        ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+cH);ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle="#26c6da";ctx.font="bold 8px monospace";
        // Flip the label to the LEFT of the line when the coil started near the right edge, so the
        // text never runs off the canvas (a coil that just fired sits at the newest bars → far right).
        if(x+104 > W-PAD.r){ ctx.textAlign="right"; ctx.fillText("⚡ CONVERGENCE START",x-3,PAD.t+10); }
        else { ctx.textAlign="left"; ctx.fillText("⚡ CONVERGENCE START",x+3,PAD.t+10); }
        ctx.textAlign="left";
      }
    }
    // 🚀 ESD projection ray + error cone (ESD tab) — the SMA20 heading extended toward its destination.
    // Display-only: the ray starts at the last bar's SMA20 (ray.y0) and rises/falls at the measured slope;
    // the cone is the ±avgErr band (the projection OVERSHOOTS by construction, so this is honest width).
    if(projection && projection.ray){
      const p=projection, up=p.leaning==="up", col=up?"#00e676":"#ff5252";
      const startX=toX(n-1), startY=toY(p.ray.y0);
      const slope=(p.ray.y1-p.ray.y0)/((p.ray.x1-p.ray.x0)||1);     // price per bar
      const clampY=y=>Math.max(PAD.t,Math.min(PAD.t+cH,y));
      const kEdge=Math.max(1,(W-PAD.r-startX)/cw), endX=W-PAD.r;
      const endPrice=p.ray.y0+slope*kEdge, endY=clampY(toY(endPrice));
      const err=p.avgErr||0;
      if(err>0){
        ctx.strokeStyle=up?"rgba(0,230,118,0.25)":"rgba(255,82,82,0.25)"; ctx.lineWidth=1; ctx.setLineDash([3,3]);
        [err,-err].forEach(e=>{ ctx.beginPath(); ctx.moveTo(startX,clampY(toY(p.ray.y0+e))); ctx.lineTo(endX,clampY(toY(endPrice+e))); ctx.stroke(); });
        ctx.setLineDash([]);
      }
      ctx.beginPath(); ctx.strokeStyle=col; ctx.lineWidth=2; ctx.setLineDash([5,3]);
      ctx.moveTo(startX,startY); ctx.lineTo(endX,endY); ctx.stroke(); ctx.setLineDash([]);
      const ang=Math.atan2(endY-startY,endX-startX);                // arrowhead at the destination edge
      ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(endX,endY);
      ctx.lineTo(endX-8*Math.cos(ang-0.4),endY-8*Math.sin(ang-0.4)); ctx.lineTo(endX-8*Math.cos(ang+0.4),endY-8*Math.sin(ang+0.4));
      ctx.closePath(); ctx.fill();
      ctx.fillStyle=col; ctx.font="bold 9px monospace"; ctx.textAlign="right";
      const lbl="🚀 ESD "+(p.targetName?("→ "+p.targetName.toUpperCase()+" "):"")+(p.targetPrice!=null?("$"+p.targetPrice):"")+(p.etaBars!=null?(" ~"+Math.round(p.etaBars)+"b"):"")+(p.angleDeg!=null?(" · "+p.angleDeg+"°"):"");
      ctx.fillText(lbl,endX-2,clampY(endY)-6); ctx.textAlign="left";
    }
    // Latest-signal marker on the most recent candle
    if(analysis){
      const li=data.length-1;
      const d=data[li];
      const x=toX(li);
      const sig=analysis.signal;
      // Muted when the backtested edge isn't established — the chart shouldn't
      // scream BUY in green when the strategy has no demonstrated edge here.
      const col=muted?"#90a4ae":(sig==="BUY"?"#00e676":sig==="SELL"?"#ff5252":"#ffa726");
      // Glow ring around the last candle's body
      const bt=toY(Math.max(d.open,d.close)),bbm=toY(Math.min(d.open,d.close));
      ctx.strokeStyle=col;ctx.lineWidth=2;
      ctx.strokeRect(x-cw*.5,bt-3,cw,(bbm-bt)+6);
      // Marker symbol + label
      ctx.fillStyle=col;ctx.font="bold 11px monospace";ctx.textAlign="center";
      if(sig==="BUY"){
        ctx.fillText("▲ BUY",x,toY(d.high)-14);
        ctx.fillText("$$$",x,toY(d.high)-4);
      } else if(sig==="SELL"){
        ctx.fillText("▼ SELL",x,toY(d.low)+22);
        ctx.fillText("$$$",x,toY(d.low)+12);
      } else {
        ctx.fillText("◆ HOLD",x,toY(d.high)-6);
      }
    }
    // Volume — bars colored by RELATIVE volume (RVOL = vol ÷ 20-bar avg): brighter on conviction
    // bars, dim on quiet ones, outlined when RVOL≥1.5; the VMA line ("SFA12 for volume") is overlaid.
    const volOff=rows.length-n; const {vma:vmaS,rvol:rvolS}=relVolSeries(rows,20);
    data.forEach((d,i)=>{
      const rv=rvolS[volOff+i], up=d.close>=d.open;
      const a=rv==null?0.4:Math.max(0.22,Math.min(0.9,0.25+(rv-0.6)*0.45));
      ctx.fillStyle=up?("rgba(0,230,118,"+a.toFixed(2)+")"):("rgba(255,82,82,"+a.toFixed(2)+")");
      const bh=Math.max((d.volume/maxVol)*vH,1);
      ctx.fillRect(toX(i)-cw*.38,vBase-bh,cw*.76,bh);
      if(rv!=null&&rv>=1.5){ ctx.strokeStyle=up?"#69f0ae":"#ff8a80"; ctx.lineWidth=1; ctx.strokeRect(toX(i)-cw*.38,vBase-bh,cw*.76,bh); }
    });
    // VMA line (the volume moving average)
    ctx.beginPath(); ctx.strokeStyle="#ffd740"; ctx.lineWidth=1.1; ctx.setLineDash([]); let vmaStarted=false;
    data.forEach((d,i)=>{ const m=vmaS[volOff+i]; if(m==null) return; const y=toVY(m); if(!vmaStarted){ctx.moveTo(toX(i),y);vmaStarted=true;} else ctx.lineTo(toX(i),y); });
    if(vmaStarted) ctx.stroke();
    // VOL label + current RVOL
    ctx.fillStyle="#37474f";ctx.font="8px monospace";ctx.textAlign="left";
    const lastRv=rvolS[rows.length-1];
    ctx.fillText("VOL · VMA20"+(lastRv!=null?(" · RVOL "+lastRv.toFixed(1)+"×"):""),PAD.l+2,PAD.t+cH+gap+8);
    // X axis dates
    ctx.fillStyle="#2a3a4a";ctx.font="8px monospace";ctx.textAlign="center";
    const step=Math.max(1,Math.floor(n/6));
    data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.date?.slice(5)||"",toX(i),H-4);});
  },[rows,analysis,muted]);
  return <canvas ref={ref} width={820} height={260} style={{width:"100%",height:260,display:"block"}}/>;
}

// Equity curve mini-chart for backtest results
function EquityCurve({curve}) {
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current; if(!cv||!curve||curve.length<2) return;
    const dpr=window.devicePixelRatio||1, W=cv.offsetWidth, H=140;
    cv.width=W*dpr; cv.height=H*dpr; cv.style.height=H+"px";
    const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
    const PAD={l:46,r:10,t:12,b:18};
    ctx.fillStyle="#060810"; ctx.fillRect(0,0,W,H);
    const pts=[0,...curve];
    const max=Math.max(...pts,0.5), min=Math.min(...pts,-0.5), rng=max-min||1;
    const cw=(W-PAD.l-PAD.r)/(pts.length-1);
    const toX=i=>PAD.l+i*cw;
    const toY=v=>PAD.t+(1-(v-min)/rng)*(H-PAD.t-PAD.b);
    // Zero line
    const zeroY=toY(0);
    ctx.strokeStyle="#546e7a55"; ctx.lineWidth=.5; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(PAD.l,zeroY); ctx.lineTo(W-PAD.r,zeroY); ctx.stroke(); ctx.setLineDash([]);
    // Grid labels
    ctx.fillStyle="#37474f"; ctx.font="9px monospace"; ctx.textAlign="right";
    ctx.fillText(max.toFixed(1)+"%",PAD.l-3,PAD.t+4);
    ctx.fillText("0%",PAD.l-3,zeroY+3);
    ctx.fillText(min.toFixed(1)+"%",PAD.l-3,H-PAD.b);
    // Area fill
    const ends=curve[curve.length-1]>=0;
    const grad=ctx.createLinearGradient(0,PAD.t,0,H-PAD.b);
    grad.addColorStop(0, ends?"rgba(0,230,118,0.25)":"rgba(255,82,82,0.25)");
    grad.addColorStop(1,"rgba(0,0,0,0)");
    ctx.beginPath(); ctx.moveTo(toX(0),toY(pts[0]));
    pts.forEach((v,i)=>ctx.lineTo(toX(i),toY(v)));
    ctx.lineTo(toX(pts.length-1),zeroY); ctx.lineTo(toX(0),zeroY); ctx.closePath();
    ctx.fillStyle=grad; ctx.fill();
    // Line
    ctx.beginPath(); ctx.moveTo(toX(0),toY(pts[0]));
    pts.forEach((v,i)=>ctx.lineTo(toX(i),toY(v)));
    ctx.strokeStyle=ends?"#00e676":"#ff5252"; ctx.lineWidth=1.8; ctx.stroke();
    // X label
    ctx.fillStyle="#37474f"; ctx.font="8px monospace"; ctx.textAlign="center";
    ctx.fillText("Trade #"+curve.length,W/2,H-4);
  },[curve]);
  return <canvas ref={ref} style={{width:"100%",height:140,display:"block"}}/>;
}

// ─── Replay chart ───────────────────────────────────────────────────────────
// Draws the candle window ENDING at `upTo`, so dragging the timeline scrubs the
// chart through history. Overlays the signal that fired at the current bar (from
// the precomputed `series`) and any trade entries/exits/levels up to that bar —
// no lookahead: nothing past `upTo` is ever drawn.
function ReplayChart({rows,upTo,series,trades}) {
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current; if(!cv||rows.length<2) return;
    const ctx=cv.getContext("2d"),W=cv.width,H=cv.height;
    const PAD={l:58,r:10,t:12,b:24},cH=(H-PAD.t-PAD.b)*0.72,vH=(H-PAD.t-PAD.b)*0.2,gap=(H-PAD.t-PAD.b)*0.08;
    ctx.clearRect(0,0,W,H);
    const end=Math.max(1,Math.min(upTo,rows.length-1));
    const n=Math.min(end+1,80);
    const off=end+1-n;                 // global index of the first visible candle
    const data=rows.slice(off,end+1);
    const hi=Math.max(...data.map(d=>d.high)),lo=Math.min(...data.map(d=>d.low)),rng=hi-lo||1;
    const maxVol=Math.max(...data.map(d=>d.volume))||1;
    const cw=(W-PAD.l-PAD.r)/n;
    const toX=i=>PAD.l+i*cw+cw/2;       // i is a VISIBLE index
    const gX=g=>toX(g-off);             // g is a GLOBAL index
    const toY=v=>PAD.t+(1-(v-lo)/rng)*cH;
    const vBase=PAD.t+cH+gap+vH;
    // Background + grid
    ctx.fillStyle="#080b14"; ctx.fillRect(0,0,W,H);
    [0,.25,.5,.75,1].forEach(f=>{
      const price=lo+rng*(1-f),y=PAD.t+f*cH;
      ctx.strokeStyle="#1a2035"; ctx.lineWidth=.5;
      ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
      ctx.fillStyle="#37474f";ctx.font="9px monospace";ctx.textAlign="right";
      ctx.fillText(price>=100?price.toFixed(2):price.toFixed(4),PAD.l-3,y+3);
    });
    // SMAs
    const closes=data.map(d=>d.close);
    [[5,"#ffd74099"],[10,"#00bcd499"],[20,"#e040fb99"]].forEach(([p,col])=>{
      const per=parseInt(p); if(closes.length<per) return;
      ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=1.2;let first=true;
      data.forEach((d,i)=>{
        if(i<per-1)return;
        const v=closes.slice(i-per+1,i+1).reduce((a,b)=>a+b,0)/per;
        first?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v));first=false;
      });ctx.stroke();
    });
    // Active trade (open at the current bar) → draw entry / SL / TP levels
    const active=trades.find(t=>t.entryIdx<=end&&end<t.exitIdx);
    if(active){
      [[active.entry,"#00bcd4","ENTRY"],[active.sl,"#ff5252","SL"],[active.tp,"#00e676","TP"]].forEach(([v,col,lbl])=>{
        if(v<lo||v>hi) return;
        ctx.beginPath();ctx.strokeStyle=col+"cc";ctx.lineWidth=1;ctx.setLineDash([5,4]);
        ctx.moveTo(PAD.l,toY(v));ctx.lineTo(W-PAD.r,toY(v));ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle=col;ctx.font="bold 8px monospace";ctx.textAlign="left";
        ctx.fillText(lbl,PAD.l+2,toY(v)-2);
      });
    }
    // Candles
    data.forEach((d,i)=>{
      const up=d.close>=d.open,col=up?"#00e676":"#ff5252",x=toX(i);
      const bt=toY(Math.max(d.open,d.close)),bb_=toY(Math.min(d.open,d.close));
      ctx.strokeStyle=col;ctx.lineWidth=.8;
      ctx.beginPath();ctx.moveTo(x,toY(d.high));ctx.lineTo(x,toY(d.low));ctx.stroke();
      ctx.fillStyle=up?"#00e676":"#cc3333";
      ctx.fillRect(x-cw*.38,bt,cw*.76,Math.max(bb_-bt,1));
    });
    // Trade entry / exit markers that have happened within the visible window
    trades.forEach(t=>{
      if(t.entryIdx>=off&&t.entryIdx<=end){
        const x=gX(t.entryIdx),d=rows[t.entryIdx];
        const col=t.dir==="BUY"?"#00e676":"#ff5252";
        ctx.fillStyle=col;ctx.font="bold 10px monospace";ctx.textAlign="center";
        t.dir==="BUY"?ctx.fillText("▲",x,toY(d.low)+13):ctx.fillText("▼",x,toY(d.high)-6);
      }
      if(t.exitIdx>=off&&t.exitIdx<=end&&t.exitIdx<=rows.length-1){
        const x=gX(t.exitIdx),d=rows[t.exitIdx];
        const col=t.result==="WIN"?"#00e676":"#ff5252";
        ctx.fillStyle=col;ctx.font="9px monospace";ctx.textAlign="center";
        ctx.fillText("✕",x,toY((d.high+d.low)/2));
      }
    });
    // Current-bar marker + the signal that fired there
    {
      const li=data.length-1,d=data[li],x=toX(li);
      const sg=series&&series[end];
      const sig=sg?sg.signal:"HOLD";
      const col=sig==="BUY"?"#00e676":sig==="SELL"?"#ff5252":"#ffa726";
      const bt=toY(Math.max(d.open,d.close)),bbm=toY(Math.min(d.open,d.close));
      ctx.strokeStyle=col;ctx.lineWidth=2;
      ctx.strokeRect(x-cw*.5,bt-3,cw,(bbm-bt)+6);
      ctx.fillStyle=col;ctx.font="bold 10px monospace";ctx.textAlign="center";
      if(sig==="BUY")      ctx.fillText("▲ BUY",x,toY(d.high)-6);
      else if(sig==="SELL")ctx.fillText("▼ SELL",x,toY(d.low)+20);
      else                 ctx.fillText("◆",x,toY(d.high)-6);
      // Vertical "now" line
      ctx.strokeStyle=col+"55";ctx.lineWidth=.8;ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+cH);ctx.stroke();ctx.setLineDash([]);
    }
    // Volume
    data.forEach((d,i)=>{
      ctx.fillStyle=d.close>=d.open?"rgba(0,230,118,0.4)":"rgba(255,82,82,0.35)";
      const bh=Math.max((d.volume/maxVol)*vH,1);
      ctx.fillRect(toX(i)-cw*.38,vBase-bh,cw*.76,bh);
    });
    ctx.fillStyle="#37474f";ctx.font="8px monospace";ctx.textAlign="left";
    ctx.fillText("VOL",PAD.l+2,PAD.t+cH+gap+8);
    // X axis dates
    ctx.fillStyle="#2a3a4a";ctx.font="8px monospace";ctx.textAlign="center";
    const step=Math.max(1,Math.floor(n/6));
    data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.date?.slice(5)||"",toX(i),H-4);});
  },[rows,upTo,series,trades]);
  return <canvas ref={ref} width={820} height={300} style={{width:"100%",height:300,display:"block"}}/>;
}

  // ── Live streaming control (Polygon WebSocket) ──
  function stopLive(){
    if(liveWatchRef.current){ clearInterval(liveWatchRef.current); liveWatchRef.current=null; }
    liveEndRef.current=null;
    if(liveSockRef.current){ liveSockRef.current.close(); liveSockRef.current=null; }
    // Clear the forming flag so the chart's last bar settles back to a normal candle.
    setRows(prev=>{ if(!prev||!prev.length||!prev[prev.length-1].forming) return prev;
      const last={...prev[prev.length-1]}; delete last.forming;
      return [...prev.slice(0,-1), last]; });
    setStreaming(false);
  }
  function goLive(){
    const sym=(liveMeta?.sym||ticker||"").trim().toUpperCase();
    const key=(polyKey||"").trim();
    if(!sym || provider!=="polygon" || !key){ setError("Streaming needs a Polygon key and a fetched symbol."); return; }
    stopLive();
    const sock=new PolyLiveSocket({ key, tickers:[sym], channel:"AM", mode:"delayed",
      onBar:(b)=>{ liveEndRef.current=b.end; const f=wsBand(b.end);
        setLiveFreshness(prev=>({ ...(prev||{}), provider:"Polygon", band:f.band, stalenessSec:f.stalenessSec, isOpen:f.band!=="STALE", price:b.close, lastTs:b.end }));
        // Cosmetic: fold the streamed price into the LAST visible candle (a forming bar). Never
        // recomputes analyze() — the verdict stays frozen; only the chart breathes with the feed.
        setRows(prev=>{ if(!prev||!prev.length) return prev;
          const last={...prev[prev.length-1], close:b.close,
            high:Math.max(prev[prev.length-1].high, b.high, b.close),
            low:Math.min(prev[prev.length-1].low, b.low, b.close), forming:true };
          return [...prev.slice(0,-1), last]; }); },
      onStatus:(s)=>{ if(s && (s.status==="auth_failed"||/max|error/i.test(s.status||""))){ setError("Polygon stream: "+(s.message||s.status)); stopLive(); } } });
    liveSockRef.current=sock; sock.connect(); setStreaming(true);
    // Staleness watchdog: re-age the badge from the LAST bar's end-time even when no new bar
    // arrives, so a stalled stream (disconnect / lunch lull / market close) honestly decays
    // toward STALE instead of freezing at "DELAYED". Pure wsBand math on a timer; no fake freshness.
    liveWatchRef.current=setInterval(()=>{
      const end=liveEndRef.current; if(end==null) return;
      const f=wsBand(end);
      setLiveFreshness(prev=> prev ? { ...prev, band:f.band, stalenessSec:f.stalenessSec, isOpen:f.band!=="STALE" } : prev);
    }, 15000);
  }

  function run(slOverride, tpOverride, costOverride) {
    setError("");
    setOutlook(null);setOutlookError(null); // Outlook needs live market data; not available on the CSV path
    const data = parseCSV(csv);
    if (data.length < 10) { setError("No data yet — fetch it on the ⚡ LIVE tab first, then RUN to re-analyze."); return; }
    const isPos = mode==="position";
    const scorer = isPos ? scorePosition : scoreAt;
    const hold = isPos; // position mode holds until thesis break
    // Position mode uses wider stops/targets by default unless user overrides
    const SL = slOverride!=null?slOverride:(isPos?3.0:slMult);
    const TP = tpOverride!=null?tpOverride:(isPos?6.0:tpMult);
    const costs = costOverride || {slip:slipPct, comm:commPct};
    const result = analyze(data, ticker, market, strategy, SL, TP);
    // Override the live signal with the mode's scorer so the headline matches the mode
    const liveScore = scorer(data);
    if (liveScore) { result.signal = liveScore.signal; result.modeScore = liveScore.score; if(isPos) positionDisplay(result, liveScore); }
    setRows(data);
    setAnalysis(result);
    // Run backtest if we have enough history
    const bt = data.length >= 40 ? runBacktest(data, scorer, SL, TP, costs, null, hold) : null;
    setBacktest(bt);
    setAbTest(data.length >= 40 ? {
      current: runBacktest(data, scorer, SL, TP, costs, null, hold),
      legacy:  runBacktest(data, scoreFlat, SL, TP, costs),
    } : null);
    // Out-of-sample split: train on first 70%, test on last 30%
    if (data.length >= 60) {
      const splitIdx = Math.floor(data.length * 0.7);
      setOosTest({
        splitIdx,
        trainPct: 70, testPct: 30,
        inSample:  runBacktest(data, scorer, SL, TP, costs, {start:30, end:splitIdx}, hold),
        outSample: runBacktest(data, scorer, SL, TP, costs, {start:splitIdx, end:data.length}, hold),
      });
    } else {
      setOosTest(null);
    }
    // Freeze the transparency verdict AT LOG TIME — the history is an audit
    // trail of how confident the tool was then, not a number we re-judge later.
    const loggedVerdict = bt?.stats?.significance || null;
    const loggedMuted   = (loggedVerdict!=="SIGNIFICANT" && loggedVerdict!=="SUGGESTIVE") || auditData(data).suspect;
    setHistory(h => [{
      time: new Date().toLocaleTimeString(),
      ticker, signal: result.signal, confidence: result.confidence,
      price: data[data.length-1].close, trend: result.trend,
      verdict: loggedVerdict, muted: loggedMuted,
    }, ...h].slice(0,10));
    setTab("signals");
  }

  // Parameter sweep: test a grid of SL/TP combos, score each on full + OOS
  function runSweep() {
    const data = parseCSV(csv);
    if (data.length < 60) { setError("Parameter sweep needs at least 60 candles for a reliable in/out-of-sample split."); return; }
    setSweeping(true);
    setError("");
    const costs = {slip:slipPct, comm:commPct};
    const splitIdx = Math.floor(data.length * 0.7);
    const slRange = [1.0, 1.5, 2.0, 2.5];
    const tpRange = [1.5, 2.0, 3.0, 4.0];
    // Defer heavy compute so the "calculating" state can paint
    setTimeout(()=>{
      const results = [];
      slRange.forEach(sl => tpRange.forEach(tp => {
        const full = runBacktest(data, scoreAt, sl, tp, costs);
        const inS  = runBacktest(data, scoreAt, sl, tp, costs, {start:30, end:splitIdx});
        const outS = runBacktest(data, scoreAt, sl, tp, costs, {start:splitIdx, end:data.length});
        const robust  = full.stats.total>=5 && inS.stats.totalReturn>0 && outS.stats.totalReturn>0;
        const overfit = inS.stats.totalReturn>2 && outS.stats.totalReturn<=0;
        results.push({
          sl, tp, rr:parseFloat((tp/sl).toFixed(2)),
          fullRet: full.stats.totalReturn, trades: full.stats.total,
          pf: full.stats.profitFactor,
          inRet: inS.stats.totalReturn, outRet: outS.stats.totalReturn,
          robust, overfit,
        });
      }));
      results.sort((a,b)=>b.fullRet-a.fullRet);
      const bestRobust = results.find(r=>r.robust) || null;
      setSweep({results, bestRobust, slRange, tpRange});
      setSweeping(false);
    }, 50);
  }

  // Position sizing — fixed-fractional risk (shares = risk$ ÷ stop-distance), with a CONCENTRATION CAP
  // (R4 #1): a tight stop can otherwise recommend a position worth >100% of the account. We cap at
  // MAX_POS_PCT of account and recommend the SMALLER of the two — never over-concentrate.
  const accNum  = parseFloat(account)||10000;
  const riskNum = parseFloat(riskPct)||1;
  const riskAmt = accNum*(riskNum/100);
  const slDist  = analysis ? Math.abs(analysis.entry - analysis.sl) : 0;
  const riskBasedSize = slDist>0 ? Math.floor(riskAmt/slDist) : 0;        // size from the 1-2% risk rule alone
  const MAX_POS_PCT = 20;                                                 // concentration cap (% of account)
  const concCapSize = (analysis && analysis.entry>0) ? Math.floor(accNum*(MAX_POS_PCT/100)/analysis.entry) : 0;
  const posSize = Math.min(riskBasedSize, concCapSize);                  // recommend the smaller — never over-concentrate
  const sizeCapped = analysis && riskBasedSize > concCapSize;            // the concentration cap is binding
  const posVal  = analysis ? posSize*analysis.entry : 0;
  const effRiskAmt = posSize*slDist;                                     // ACTUAL $ risked at the recommended size (≤ riskAmt when capped)

  // Shared cross-sectional study harness renderer — merit (study.json) and momentum
  // (momentum.json) share the SAME pack() shape, so one view renders both honestly.
  const studyHarness = (s, copy) => {
    const H=s.H, six=s.six;

    const placeboOk=H.placebo.verdict==="NOT SIGNIFICANT"||H.placebo.verdict==="TOO FEW PERIODS";

    const pctOrDash=v=>v==null?"—":((v>=0?"+":"")+(v*100).toFixed(1)+"%");
    const wf=H.walkForward||{}, df=H.deflated||{};
    return (
      <>
        <div style={{...card,background:"linear-gradient(135deg,#0e1320,#0b1025)"}}>

          <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,alignItems:"flex-start"}}>

              <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>

              <div style={{fontSize:11,color:"#90a4ae",marginTop:6}}>
                mean rank-IC <b style={{color:vCol(H.significance)}}>{H.meanIC>=0?"+":""}{H.meanIC}</b> (t {H.icT}) — {H.meanIC>0?copy.posPhrase:copy.negPhrase}.
              </div>
            </div>
            <span style={{fontSize:9,fontWeight:700,letterSpacing:1,padding:"5px 11px",borderRadius:3,textAlign:"right",
              color:proven?"#00e676":"#90a4ae",
              background:(proven?"rgba(0,230,118,0.10)":"rgba(144,164,174,0.10)"),
              border:"1px solid "+(proven?"#00e67644":"#90a4ae44")}}>
